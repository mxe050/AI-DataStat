/* ============ 4-4 データ読み込み ============ */
{part:"Part 4", short:"Step 2 ─ データ読み込み", html:`
<div class="slide-inner">
<span class="slide-tag">STEP 2 · IMPORT</span>
<h2 class="slide-title">仮想データを R に読み込む</h2>
<p class="slide-lead">
GitHub から <code>yuasa2002csv.txt</code> をダウンロード → <strong class="emphasis">デスクトップに置きっぱなし</strong> で OK → R で読み込み → 構造を確認。ここでは <strong class="emphasis">「データが正しく読めたか」を毎回確認するクセ</strong> が重要。
</p>

<h3 class="section-head">Step A. ファイルの入手 ─ GitHub から 1 ファイルだけダウンロード</h3>

<div class="panel">
<p><strong>① ブラウザで GitHub のページを開く</strong>　以下の URL をコピーしてアドレスバーに貼り付け：</p>
<pre>https://github.com/mxe050/AI-DataStat</pre>
<p style="font-size:14px;color:var(--ink-muted)">
（このコードブロックの右上 📋 でコピーできるのは <strong>URL の 1 行のみ</strong>。説明文は除外されます）
</p>

<p><strong>② ファイルを取得</strong>　ページが開いたら以下の流れ：</p>
<ol class="num">
  <li>ファイル一覧から <code>yuasa2002csv.txt</code> をクリック</li>
  <li>画面右上の <strong>Download raw file</strong>（↓ アイコン）をクリック</li>
  <li>ダウンロードフォルダに保存される</li>
</ol>

<p><strong>③ デスクトップに移動</strong>　ダウンロードした <code>yuasa2002csv.txt</code> を、エクスプローラ／Finder で <strong>そのままデスクトップにドラッグ＆ドロップ</strong>。今回は深く考えず、デスクトップに置きっぱなしで作業します。</p>

<div class="info-box" style="font-size:14px">
<strong>なぜデスクトップ？</strong> 講義のハンズオン中に「フォルダの場所が分からない」で詰まらないようにするためです。実務では後述のように専用フォルダを作るのが王道ですが、それは <strong>慣れてからで OK</strong>。
</div>
</div>

<h3 class="section-head">Step B. R にファイルを読み込ませる ─ ファイル選択ダイアログ方式（最も簡単）</h3>

<div class="panel">
<p>「PC 内のファイルがどこにあるか？」を初心者が把握するのは意外と難しい問題です。Windows と Mac で表記も違います。<br>
<strong class="emphasis">解決策：R にファイル選択ダイアログを開かせて、自分でクリックして選ぶ</strong>。これが一番初心者向け。</p>

<p><strong>RStudio の Console（左下）に下のコードをコピペ → Enter：</strong></p>
<pre><span class="com"># ファイルを選択するウィンドウが自動で開きます</span>
<span class="kw">df</span> &lt;- <span class="kw">read.delim</span>(<span class="kw">file.choose</span>(), header = <span class="kw">TRUE</span>, sep = <span class="str">"\\t"</span>, na.strings = <span class="str">"NA"</span>)

<span class="com"># 中身がちゃんと入ったかだけ確認</span>
<span class="kw">head</span>(df)</pre>

<p><strong>実行すると：</strong></p>
<ol class="num">
  <li>ファイル選択ダイアログが自動で開く</li>
  <li>左サイドバーから「デスクトップ」を選ぶ</li>
  <li><code>yuasa2002csv.txt</code> をダブルクリック</li>
  <li>Console に <code>head(df)</code> の出力（最初の 6 行）が表示される → <strong>読み込み成功</strong></li>
</ol>

<div class="ok-box" style="font-size:14px">
<strong>この方式の良いところ：</strong>「PC のどこにファイルがあるか」を覚えなくてよい。Windows/Mac 共通で動く。<strong class="emphasis">フォルダパスの記述で詰まる問題が消える</strong>。
</div>
</div>

<h3 class="section-head">Step C. 作業ディレクトリの設定（任意・初心者は飛ばして OK）</h3>

<div class="panel">
<p>後の解析でファイル保存が必要になったとき、<strong>R に「作業フォルダはここ」と教えておく</strong>と便利です。ただし、<strong class="emphasis">Step B の <code>file.choose()</code> でファイルを選んだなら、その時点で R はファイル位置を把握済み</strong>なので、初心者はこの Step C は飛ばしても大丈夫です。</p>

<div class="warn-box" style="font-size:14px">
<strong>⚠ よくあるエラー：</strong><code>setwd("~/Desktop")</code> を実行すると <strong>「作業ディレクトリを変更できません」</strong> というエラーが出ることがあります。原因は OneDrive / Google Drive 等で <code>~</code>（ホームフォルダ）の解釈がずれているためです。下の方法 1 を使えばこの問題は起きません。
</div>

<p><strong>方法 1（推奨・エラーが起きない）：</strong> Step B で選んだファイルのフォルダを、自動で作業ディレクトリにする。</p>
<pre><span class="com"># Step B のコードの代わりに、こちらを実行</span>
data_path &lt;- <span class="kw">file.choose</span>()                       <span class="com"># ファイル選択ウィンドウ → ファイルパスを変数に保存</span>
df &lt;- <span class="kw">read.delim</span>(data_path, header = <span class="kw">TRUE</span>, sep = <span class="str">"\\t"</span>, na.strings = <span class="str">"NA"</span>)
<span class="kw">setwd</span>(<span class="kw">dirname</span>(data_path))                     <span class="com"># 選んだファイルの「あるフォルダ」を作業ディレクトリに</span>
<span class="kw">getwd</span>()                                         <span class="com"># 確認</span></pre>

<p><strong>方法 2（チャレンジ）：</strong>明示的にデスクトップを指定。エラーが出たら方法 1 に戻ってください。</p>
<pre><span class="com"># この方法はエラーが出ることがあります（OneDrive 環境で頻発）</span>
<span class="kw">setwd</span>(<span class="kw">file.path</span>(<span class="kw">Sys.getenv</span>(<span class="str">"USERPROFILE"</span>), <span class="str">"Desktop"</span>))   <span class="com"># Windows</span>
<span class="com"># または Mac の場合：</span>
<span class="com"># setwd(file.path(Sys.getenv("HOME"), "Desktop"))</span>
<span class="kw">getwd</span>()</pre>

<div class="note-box" style="font-size:14px">
<strong>本来：</strong>デスクトップを作業ディレクトリにするのは <strong>非推奨</strong>（ファイルが散らかる・他ソフトと干渉する）。<strong class="emphasis">今回はハンズオン練習だから例外的に</strong> こうしているだけ。実務では後述の "実用版" のような専用フォルダを作るのが王道です。
</div>
</div>

<h3 class="section-head">Step D. データの構造を確認する</h3>

<div class="panel">
<p>読み込みに成功したら、必ず「思った通りに読めているか」を確認します。これは省略禁止の習慣です。1 行ずつ Console に貼り付けて実行し、出力を目視確認してください。</p>

<p><strong>① 行数・列数を確認</strong></p>
<pre><span class="kw">dim</span>(df)</pre>
<pre class="output">[1] 44 11</pre>

<p><strong>② 最初の 6 行を表示</strong></p>
<pre><span class="kw">head</span>(df)</pre>
<pre class="output">  ID     Group Age Sex Depth  Ramus      Spatial Proximity ...
1  1 Difficult  49   M     C Class3     Vertical     Close ...
2  2 Difficult  38   M     C Class3     Vertical     Close ...
... 以下略</pre>

<p><strong>③ 各列のデータ型を確認</strong></p>
<pre><span class="kw">str</span>(df)</pre>

<p><strong>④ アウトカム変数（Difficult=1, Control=0）を作成</strong></p>
<pre>df$Outcome &lt;- <span class="kw">ifelse</span>(df$Group == <span class="str">"Difficult"</span>, 1, 0)</pre>

<p><strong>⑤ 因子変数のカテゴリ順序を明示</strong></p>
<pre>df$Depth &lt;- <span class="kw">factor</span>(df$Depth, levels = <span class="kw">c</span>(<span class="str">"A"</span>, <span class="str">"B"</span>, <span class="str">"C"</span>))
df$Ramus &lt;- <span class="kw">factor</span>(df$Ramus, levels = <span class="kw">c</span>(<span class="str">"Class1"</span>, <span class="str">"Class2"</span>, <span class="str">"Class3"</span>))</pre>

<p><strong>⑥ 後続の解析で使う <span class="emphasis">二値変数（Depth_C / Ramus_3 / Root_Bulb）</span> を作成（重要）</strong></p>
<pre><span class="com"># 「Depth が C か」「Ramus が Class3 か」「RootWidth が Bulbous か」を 0/1 化</span>
df$Depth_C   &lt;- <span class="kw">as.numeric</span>(df$Depth     == <span class="str">"C"</span>)
df$Ramus_3   &lt;- <span class="kw">as.numeric</span>(df$Ramus     == <span class="str">"Class3"</span>)
df$Root_Bulb &lt;- <span class="kw">as.numeric</span>(df$RootWidth == <span class="str">"Bulbous"</span>)

<span class="com"># 確認（数えてみる）</span>
<span class="kw">table</span>(df$Depth_C)
<span class="kw">table</span>(df$Ramus_3)
<span class="kw">table</span>(df$Root_Bulb)</pre>

<div class="warn-box" style="font-size:14px">
<strong>このステップ ⑥ は省略禁止</strong>。後の Part 4 のスライド（GLM・Firth 回帰など）で <code>Depth_C / Ramus_3 / Root_Bulb</code> を使うので、ここで作っておかないと <strong>「オブジェクト 'Depth_C' がありません」というエラー</strong> が出ます。
</div>
</div>

<h3 class="section-head">Step E. ゼロセルの発見（次章への伏線）</h3>

<div class="panel">
<p><strong>因子のレベル数と度数を確認</strong></p>
<pre><span class="kw">table</span>(df$Depth, df$Group)</pre>
<pre class="output">   Control  Difficult
A      14         6
B      10         9
C       0         5     ← ゼロセル発見！</pre>

<div class="note-box">
<strong>ゼロセルの発見：</strong>上記 <code>table()</code> で <strong>Control × Depth = C が 0 名</strong> であることが <strong>この時点で</strong> 分かる。これは Part 3 で議論した <strong>完全分離</strong> の兆候。次以降のステップで Firth 回帰を使う判断材料になる。
</div>
</div>

<div class="warn-box">
<strong>重要：</strong>データ読み込み直後に必ず <code>dim()</code>, <code>head()</code>, <code>str()</code>, <code>table()</code> で <strong class="emphasis">「思った通りに読めているか」</strong> を確認する。このクセが後のデバッグ時間を大幅に削減する。
</div>

<h3 class="section-head">📚 コラム：実用版のフォルダ階層（慣れたらこちら）</h3>

<div class="panel" style="background:#f8fafc">
<p>今回はデスクトップに置きっぱなしで作業しましたが、<strong>実際に R を本格的に使うときは、解析ごとに専用フォルダを作る</strong>のが王道です。</p>

<pre><span class="com">## 推奨される実用版のフォルダ構成（例）</span>
Yuasa2002_Reanalysis/
├── data/             <span class="com"># 元データ（変更しない）</span>
│   └── yuasa2002csv.txt
├── analysis.R        <span class="com"># R スクリプト</span>
├── results/          <span class="com"># 結果出力用（グラフ・表）</span>
└── README.md         <span class="com"># 何の研究かのメモ</span></pre>

<p><strong>こうしておくメリット：</strong></p>
<ul class="bullet">
  <li><strong>整理がつく</strong>：複数の研究を並行しても混ざらない</li>
  <li><strong>後から見返しやすい</strong>：1 年後の自分が迷わない</li>
  <li><strong>変更が効きやすい</strong>：データだけ差し替えて再実行も簡単</li>
  <li><strong>共同研究に持ち出せる</strong>：フォルダごと渡せる</li>
</ul>

<p><strong>R で自動的にフォルダを作るコード（参考）：</strong></p>
<pre><span class="com">## デスクトップに研究フォルダ一式を自動生成</span>
<span class="kw">setwd</span>(<span class="str">"~/Desktop"</span>)
<span class="kw">dir.create</span>(<span class="str">"Yuasa2002_Reanalysis"</span>, showWarnings = <span class="kw">FALSE</span>)
<span class="kw">dir.create</span>(<span class="str">"Yuasa2002_Reanalysis/data"</span>, showWarnings = <span class="kw">FALSE</span>)
<span class="kw">dir.create</span>(<span class="str">"Yuasa2002_Reanalysis/results"</span>, showWarnings = <span class="kw">FALSE</span>)
<span class="kw">file.create</span>(<span class="str">"Yuasa2002_Reanalysis/analysis.R"</span>)
<span class="kw">file.create</span>(<span class="str">"Yuasa2002_Reanalysis/README.md"</span>)
<span class="kw">setwd</span>(<span class="str">"~/Desktop/Yuasa2002_Reanalysis"</span>)
<span class="kw">getwd</span>()  <span class="com"># 確認</span></pre>

<p>これを R で実行すると、<strong>デスクトップにフォルダ構成が自動的にできあがる</strong>。データファイルだけ <code>data/</code> に移動すれば、上記 Step B〜E と同じ流れで解析を続けられます。</p>
</div>

<h3 class="section-head">📚 コラム：GitHub と連携する利点（紹介のみ）</h3>

<div class="panel" style="background:#f0fdf4">
<p>もし将来、<strong>複数人で研究を共有・共同編集</strong>したくなったら、研究フォルダごと <strong>GitHub</strong> に上げるのが便利です。</p>

<ul class="bullet">
  <li><strong>バージョン管理</strong>：誰が・いつ・どこを変更したかが全部記録される</li>
  <li><strong>共同編集</strong>：複数人が同じデータ・コードに同時にアクセス可能</li>
  <li><strong>論文の Methods に URL を 1 行書くだけで再現性担保</strong>：査読時の信頼性が上がる</li>
  <li><strong>Zenodo と連携すれば DOI を発行</strong>：論文として引用可能になる</li>
</ul>

<p>本講義の題材（このスライド資料も）も <a href="https://github.com/mxe050/AI-DataStat" target="_blank" style="color:var(--blue)">github.com/mxe050/AI-DataStat</a> で公開しています。GitHub の細かな使い方はここでは触れませんが、「<strong>慣れたらやる価値が高い</strong>」とだけ覚えておいてください。</p>
</div>

  <li><code>Error in ...</code> から始まる赤字を <strong>全行コピー</strong></li>
  <li>直前に実行したコードも一緒に貼る</li>
  <li>「このエラーを解決して」と一言添える</li>
</ul>
<p>AI はエラーメッセージの <strong>構造</strong>（関数名、引数名、オブジェクト名）を解析して原因を特定する。<strong class="emphasis">要約や意訳は AI の診断能力を削ぐ</strong>。</p>
<pre><span class="com"># 良い例 ─ 全文コピペ</span>
R で以下のエラーが出ました。
コードとエラーを貼ります。解決策を文献付きで説明してください。

[コード]
library(logistf)
fit &lt;- logistf(Outcome ~ Depth_C + Ramus_3 + Root_Bulb, data = df)

[エラー全文]
Error in logistf(Outcome ~ Depth_C + Ramus_3 + Root_Bulb, data = df) :
  object 'Outcome' not found

<span class="com"># 悪い例 ─ 意訳・要約</span>
「Outcome がないってエラーになった」 ← 情報不足で診断できない</pre>
</div>
</div>

<div class="danger-box">
<strong>"プロンプト職人" を目指す必要はない：</strong>AI 時代の研究者は <strong class="emphasis">「AI にプロンプトを作らせる」能力</strong> が最も重要。初心者は Level 1 から始め、AI と対話しながら Level 4 へ進む。最初から完璧を目指さない。
</div>
</div>
`},

/* ============ 4-6 統計手法の事前相談 ============ */
{part:"Part 4", short:"Step 3 ─ AI に手法を「先に」相談", html:`
<div class="slide-inner">
<span class="slide-tag">STEP 3 · CONSULT</span>
<h2 class="slide-title">AI に「先に」統計手法を相談する ─ コードの前に方法論を</h2>
<p class="slide-lead">
<strong class="emphasis">いきなり「R コードを書いて」と頼んではいけない。</strong> まず「この状況でどの統計手法が正しいのか」を AI と議論し、<strong>方法論的コンセンサスに沿っているか</strong> を確認する。ここで使うべき武器は、統計方法論で定評のある査読雑誌である。

<pre><span class="com"># システムロール</span>
あなたは臨床疫学の統計方法論に精通した研究者です。
回答時は <span class="kw">Statistics in Medicine</span>, <span class="kw">J Clin Epidemiol</span>,
<span class="kw">BMC Med Res Methodol</span>, <span class="kw">BMJ</span> など査読付き方法論雑誌の
文献を必ず引用してください。

<span class="com"># 状況</span>
以下のデータで、下顎埋伏智歯の抜歯困難度を予測する
ロジスティック回帰モデルを構築したいと考えています。

<span class="com"># データの特徴</span>
- 症例対照研究、N = 44（Difficult 20, Control 24）
- 候補予測因子：9 個（Depth, Ramus, Spatial, Proximity, RootCurvature,
  RootWidth, HorizontalPosition, Age, Sex）
- Depth = C では <span class="kw">Control 群が 0 名</span>（完全分離）
- <span class="kw">EPV = 20/9 ≈ 2.2</span>（極端に不足）

<span class="com"># 質問</span>
1. この状況で通常の最尤推定法 (glm with family=binomial) を使うのは
   <span class="kw">統計方法論的に妥当ですか？</span> 根拠論文とともに答えてください。

2. もし代替手法を使うべきなら、
   <span class="kw">第一選択は何ですか？</span> 次点の選択肢も含めて比較してください。

3. 変数選択の方法として：
   (a) 単変量でスクリーニング → 多変量
   (b) 臨床知識で事前選択
   (c) 罰則付き回帰 (LASSO/Ridge)
   (d) Bayes 事前分布
   のうち、<span class="kw">2026 年の方法論的コンセンサスとして推奨されるのはどれですか？</span>
   近年の Statistics in Medicine / JCE の論説や BMJ TRIPOD+AI (2024) を
   踏まえて答えてください。

4. サンプルサイズ N = 44 で、予測モデル構築は
   <span class="kw">そもそも妥当</span>ですか？ Riley et al. (2019) の推奨に照らして答えてください。

<span class="com"># 回答形式</span>
- 各質問に対し、まず結論、次に根拠論文の著者・年・雑誌
- 引用は <span class="kw">実在するもののみ</span>（不確かなら「確認必要」と明記）</pre>
</div>

<div class="ok-box">
<strong>なぜこの順序なのか：</strong>AI に先にコードを書かせると、「書いたコードを使う前提」で議論が進んでしまう。<strong class="emphasis">方法論 → コード → 実行 → 検証</strong> の順序を守ることで、「このアプローチが正しいか」を最初の関門で担保できる。

<div class="warn-box">

</div>
</div>
`},

/* ============ 4-7 R コードプロンプト ============ */
{part:"Part 4", short:"Step 4 ─ R コード生成プロンプト", html:`
<div class="slide-inner">
<span class="slide-tag">STEP 4 · PROMPT</span>
<h2 class="slide-title">AI に R コード生成を依頼する ─ 制約条件が命</h2>
<p class="slide-lead">
前スライドで方法論のコンセンサスが得られたら、<strong class="emphasis">はじめて「その手法のコードを書いて」</strong> と頼む。このときプロンプトには、①方法論的根拠（文献）②バージョン情報 ③再現性制約 ④ハルシネーション抑制制約、を必ず含める。
</p>

<div class="panel">
<div class="panel-title">良いプロンプトの 5 要素</div>
<div class="article">
<p><strong>要素①：役割設定（Role）</strong> ─ 「あなたは臨床統計の専門家」</p>
<p><strong>要素②：方法論的根拠（Methodology）</strong> ─ 「Firth 法を使う根拠は Heinze &amp; Schemper (Stat Med 2002)」のように明示</p>
<p><strong>要素③：バージョン固定（Version Pinning）</strong> ─ R 4.x / logistf 1.26.0 など</p>
<p><strong>要素④：再現性制約（Reproducibility）</strong> ─ <code>set.seed()</code>、<code>sessionInfo()</code>、<code>options(digits=4)</code></p>
<p><strong>要素⑤：ハルシネーション抑制（Constraints）</strong> ─ 「指定パッケージ以外使用禁止」「未定義関数使用禁止」</p>
</div>
</div>

<div class="panel">
<div class="panel-title">実際に使用したプロンプト（全文）</div>
<pre><span class="com"># 役割</span>
あなたは臨床統計と R プログラミングに精通した研究者です。
コードは <span class="kw">TRIPOD+AI (BMJ 2024)</span> の報告基準に準拠させてください。

<span class="com"># データ</span>
以下の TSV データ（44 名、Difficult 20 名、Control 24 名）を用います。
変数：ID, Group, Age, Sex, Depth, Ramus, Spatial, Proximity,
      RootCurvature, RootWidth, HorizontalPosition
アウトカム：Group（Difficult = イベント）

<span class="com"># 方法論の前提（前セッションで確認済み）</span>
- EPV = 2.2 で小標本のため、予測モデル構築には限界がある
- Depth C で完全分離 → <span class="kw">Firth 罰則付き最尤推定法</span>を使う
  根拠：Firth (Biometrika 1993), Heinze &amp; Schemper (Stat Med 2002)
- 変数選択は <span class="kw">臨床知識で事前選択</span>
  根拠：Harrell (RMS 2015), Sun et al. (JCE 1996)

<span class="com"># 解析手順（各ステップで何をするかのコメント必須）</span>
1. セッション情報の記録（<span class="kw">sessionInfo</span>()）
2. データ読み込み（<span class="kw">read.delim</span>）+ 構造確認（<span class="kw">str</span>, <span class="kw">dim</span>, <span class="kw">head</span>）
3. アウトカム変数 Outcome (0/1) 作成
4. Table 1：両群の記述統計（平均・SD、度数・%）
   ※ <span class="kw">Knol et al. (CMAJ 2012)</span> に従い <span class="kw">群間 p 値は載せない</span>か注釈で示す
5. 事前選択した 3 変数の二値化：
   Depth_C = (Depth == "C")
   Ramus_3 = (Ramus == "Class3")
   Root_Bulb = (RootWidth == "Bulbous")
6. 通常 GLM で完全分離を <span class="kw">可視化</span>（係数・SE の異常な膨張を示す）
7. <span class="kw">logistf</span> で Firth 回帰 → OR, 95% profile-likelihood CI, p 値
8. <span class="kw">pROC</span> で AUC + 95% CI（DeLong 法）
9. 混同行列（cut-off 0.5）と感度・特異度・PPV・NPV
10. セッション情報と乱数シードを末尾に再記録

<span class="com"># バージョン固定</span>
- R 4.4.x 想定
- logistf ≥ 1.26.0
- pROC ≥ 1.18.5

<span class="com"># ハルシネーション抑制</span>
- <span class="kw">logistf と pROC のみ使用</span>（他パッケージは使わない）
- 存在しない関数名を絶対に使わない
- 不確かな場合は <span class="str"># ★要検証</span> とコメント
- <span class="kw">set.seed(2024)</span> を冒頭に設定
- 全ての結果を <span class="kw">print()</span> または <span class="kw">cat()</span> で明示出力
- 日本語コメントで「なぜこの処理をするか」を各ブロックに記載

<span class="com"># 出力</span>
- コピペで RStudio に貼り付けてそのまま動く <span class="kw">単一の .R ファイル</span>
- 行数：200 行以内
- 各関数に <span class="kw">引用文献コメント</span>（例 <span class="str"># Firth 1993</span>）</pre>
</div>

<div class="ok-box">
<strong>このプロンプトの何が "良い" か：</strong>AI に「方法論を決めているのは人間である」ことを明示している。AI は「この枠内で最適コードを書く技術者」に徹する。方法論判断の主導権を人間が握ることで、<strong class="emphasis">AI が勝手に別の手法に逸脱するリスクを抑える</strong>。
</div>

<div class="note-box">
<strong>なぜバージョン固定が重要か：</strong>R パッケージは更新で関数名や引数が変わることがある。たとえば <code>logistf</code> v1.24 と v1.26 で出力形式が微妙に違う。論文の Methods に書くときも「logistf v1.26.0」と明記すれば、10 年後でも同じ結果が再現できる。これが再現性の基礎。
</div>
</div>
`},

/* ============ 4-8 実行とエラー対応 ============ */
{part:"Part 4", short:"Step 5 ─ 実行とエラー対応", html:`
<div class="slide-inner">
<span class="slide-tag">STEP 5 · EXECUTE</span>

<p class="slide-lead">
AI が生成したコードを <strong class="emphasis">そのまま信じずに</strong>、RStudio に貼り付けて <strong>1 行ずつ実行</strong> する。エラーが出たら、そのエラーメッセージを AI に戻して「これは何が問題？」と聞く。この対話的な反復が、コードの信頼性を担保する。

<div class="panel">

<div class="article">
<p><strong>① コード全文を Source ペインに貼り付け</strong><br>
RStudio で新規 .R ファイルを作成（<span class="kbd">Ctrl+Shift+N</span> または File → New File → R Script）。AI が生成したコードを貼り付けて、<strong>analysis.R</strong> 等の名前で保存。</p>

<p><strong>③ Environment で変数を確認</strong><br>
右上 Environment ペインに、作成された変数（df, fit など）が並ぶ。クリックすると中身が閲覧できる。</p>
<p><strong>④ エラーが出たらコピー</strong><br>
赤字のエラーメッセージを丸ごとコピーし、次の「AI へのエラー相談プロンプト」で相談。</p>

</div>

</div>

<pre class="output">Warning message:
glm.fit: fitted probabilities
numerically 0 or 1 occurred</pre>
<div class="article">

</div>
</div>

前回書いてもらった Firth 回帰のコードを R で実行したところ、
以下のエラー（警告）が出ました。

Error in logistf(Outcome ~ Depth_C + Ramus_3 + Root_Bulb, data = df) :

</div>

<div class="ok-box" style="margin-top:10px">年齢・性別ともに群間で有意差なし → 背景因子は均衡。交絡の影響は小さいと判断。</div>
</div>
</div>
</div>
`},

/* ============ 4-10 単変量OR報告の再考 ============ */
{part:"Part 4", short:"単変量 OR 報告の再考", html:`
<div class="slide-inner">
<span class="slide-tag">CRITICAL RECONSIDERATION</span>
<h2 class="slide-title">単変量 OR の報告 ─ そもそも現代でも正しい行為なのか？</h2>
<p class="slide-lead">
ここで立ち止まって考える必要がある。Yuasa 2002 で提示された <strong>単変量オッズ比の一覧表（Table 3）</strong> は、<strong class="emphasis">2026 年の統計学の観点から、そもそも論文に掲載すべき情報なのだろうか？</strong><br>
この問いに向き合わずに「仮想データでも再現できた」と喜ぶのは、<strong>統計手法の本質的批判からの逃避</strong> になりかねない。
</p>

<div class="panel">
<div class="panel-title">単変量 OR を「ズラッと並べる」ことの統計学的問題</div>
<div class="article">
<p>単変量 OR の表は、見た目には整然としていて説得力があるように見える。しかし、次のような問題がある：</p>

<p><strong>① 交絡の影響を <strong class="emphasis">全く調整していない</strong></strong><br>
たとえば「Depth C の OR = ∞」と報告されても、それは Depth C の患者が年齢・性別・歯根形態などで他とどう違うかを考慮していない。<strong>"粗い推定"</strong> にすぎない。</p>

<p><strong>② 多重検定の問題</strong><br>
9 因子 × 複数カテゴリ ＝ <strong>20 以上の p 値</strong> が並ぶ。どれかは偶然で有意になる（ファミリーワイズエラーレート）。補正なしで「有意」と言えば過剰検定。</p>

<p><strong>③ Table 1 で群間比較する伝統と混同</strong><br>
Table 1（背景情報）の目的は「両群は比較可能か」を示すこと。Table 3 のように <strong class="emphasis">アウトカムとの関連を示す表で単変量スクリーニング</strong> をすると、Part 3 で述べた「データ駆動型変数選択」の問題を誘発する。</p>

<p><strong>④ 完全分離のセルで「OR = ∞」と報告する誤誘導</strong><br>
Yuasa 2002 の Depth C は「OR = ∞, 95% CI: 12,298 - ∞」と記載されている。これを見て「Depth C は決定的な予測因子」と解釈するのは、統計学的に誤り。単に <strong>データが足りない</strong> ことを示しているに過ぎない。</p>
</div>
</div>

<h3 class="section-head">では、2026 年にどう報告すべきか？</h3>

<div class="grid grid-2">
<div class="panel red">
<div class="panel-title">2002 年スタイル（非推奨）</div>
<ul class="bullet">
  <li>9 因子すべての単変量 OR 一覧表</li>
  <li>OR ≥ 2.0 のものを太字や *</li>
  <li>p &lt; 0.05 を強調</li>
  <li>完全分離のセルもそのまま報告</li>
  <li>「これらを候補として多変量に投入」</li>
</ul>
<div class="danger-box" style="margin-top:10px;font-size:14px">
→ 読者に <strong>"多変量の前の予備解析"</strong> と誤解される。データ駆動型選択を誘発。
</div>
</div>

<div class="panel green">
<div class="panel-title">2026 年スタイル（推奨）</div>
<ul class="bullet">
  <li>Table 1：両群の <strong>記述統計</strong>（頻度・平均・SD）</li>
  <li>群間比較 p 値は <strong>載せない</strong>、または参考値として小さく</li>
  <li>Table 2：<strong>事前に選んだ</strong> 変数で多変量解析を実行</li>
  <li>主解析は <strong>多変量のみ</strong>（Firth 回帰）</li>
  <li>単変量 OR は <strong>付録（Supplementary）</strong> に</li>
</ul>
<div class="ok-box" style="margin-top:10px;font-size:14px">
→ 読者は「事前に選んだ変数で、交絡調整した結果」を直接読める。解釈が明確。
</div>
</div>
</div>

<div class="panel">
<div class="panel-title">"Table 1 の p 値" 問題 ─ 同じ議論が近年盛り上がっている</div>
<div class="article">
<p>臨床研究の伝統では、Table 1（ベースライン特性）に群間比較の p 値を載せる慣習があった。しかし <strong>CONSORT (2010)</strong> 以降、<strong class="emphasis">「RCT では Table 1 に p 値を載せるべきでない」</strong> という指摘が主流化している。</p>
<p>理由は、無作為化により群は定義上 "均衡" しており、p 値は意味を持たないから。同じ論理が症例対照研究にも部分的に適用でき、<strong>単変量 OR 表を無批判に並べる文化</strong> そのものが見直されている。</p>
</div>
</div>

<div class="panel">
<div class="panel-title">参考：今回の仮想データで計算した場合の値（参考資料のみ）</div>
<p style="font-size:14px;color:var(--ink-muted);margin-bottom:10px">
下記は「もし仮に単変量 OR を計算したら」という <strong>教育目的</strong> の参考値。論文には載せない想定で示す。
</p>
<table>
  <thead><tr><th>因子</th><th class="center">再現 OR</th><th class="center">論文 OR</th><th class="center">判定</th></tr></thead>
  <tbody>
    <tr><td>Depth B vs A</td><td class="center">2.10</td><td class="center">2.10</td><td class="center ok">✓</td></tr>
    <tr><td>Depth C vs A</td><td class="center">~50*</td><td class="center">∞</td><td class="center warn">Haldane 補正</td></tr>
    <tr><td>Ramus 3 vs 1</td><td class="center">6.00</td><td class="center">6.00</td><td class="center ok">✓</td></tr>
    <tr><td>Root Bulbous</td><td class="center">6.50</td><td class="center">6.50</td><td class="center ok">✓</td></tr>
    <tr><td>Root Curved</td><td class="center">4.80</td><td class="center">4.80</td><td class="center ok">✓</td></tr>
    <tr><td>Proximity Close</td><td class="center">0.79</td><td class="center">0.79</td><td class="center ok">✓</td></tr>
  </tbody>
</table>
<div class="note-box" style="margin-top:10px">仮想データと原論文で <strong>一致することそのものは目的ではない</strong>。Part 4 の本質は、次スライド以降で実演する <strong class="emphasis">Firth 回帰による多変量解析</strong> にある。</div>
</div>

<div class="cite">
Moher D, Hopewell S, Schulz KF, et al. CONSORT 2010 explanation and elaboration. <em>BMJ</em> 2010;340:c869.<br>
Knol MJ, Le Cessie S, Algra A, et al. Overestimation of risk ratios by odds ratios in trials and cohort studies. <em>CMAJ</em> 2012;184(8):895–899.
</div>
</div>
`},

/* ============ 4-11 完全分離の確認 ============ */
{part:"Part 4", short:"通常 GLM で完全分離を実証", html:`
<div class="slide-inner">
<span class="slide-tag">R EXECUTION</span>
<h2 class="slide-title">通常 GLM で完全分離を実証する</h2>
<p class="slide-sub">あえて Firth ではなく通常の <code>glm()</code> を実行し、係数が "暴れる" 様子を確認する。</p>

<div class="panel" style="background:#dcfce7;border-color:var(--green);margin-bottom:14px;padding:12px 16px">
<div style="font-size:11px;font-weight:800;color:var(--green);letter-spacing:.1em;margin-bottom:4px">📋 新ワークフローでの位置づけ</div>
<p style="font-size:14px;margin:0;line-height:1.7"><strong>2002 年の Step 3</strong>（多変量モデル構築）に対応。2002 年は <strong style="color:var(--red)">いきなり多変量モデルを作って完全分離に気付かなかった</strong>が、新ワークフローではまず <strong>あえて通常 GLM を実行 → 異常を可視化 → Firth 法へ切替</strong> という診断的手順を踏む（次章でその切替）。</p>
</div>

<div class="panel" style="background:#eff6ff;border-color:var(--blue);margin-bottom:14px">
<div class="panel-title">この章でやること・なぜ必要か（統計初心者向け）</div>
<div class="article">
<p><strong>やること：</strong>あえて「<strong style="color:var(--red)">悪い方の解析</strong>」（通常のロジスティック回帰 = <code>glm()</code>）をまず実行します。</p>
<p><strong>なぜ？</strong>「Yuasa 2002 が陥った問題（完全分離）を、自分の目で見る」ためです。完全分離（Part 3 章 27 で学びました）が起きると、計算結果に "異常な数字" が出てくる ─ それを <strong>体験</strong> しないと、次章の Firth 法のありがたみが分からないのです。</p>
<p>料理にたとえると：「焦がした卵焼き」を一度作ってみる。失敗を見ないと、なぜプロのレシピが必要かは腑に落ちません。</p>
<p><strong>結果の読み方：</strong>下の出力で「<strong style="color:var(--red)">Depth_C の Std. Error が 2084</strong>」という異常な数字（普通は 0.5〜2 程度）が出ています。これが <strong class="emphasis">「数字が壊れている」サイン</strong>。p 値も 0.993 で「全く意味がない」状態に。</p>
</div>
</div>

<div class="warn-box" style="font-size:14px;margin-bottom:12px">
<strong>前提：</strong>このスライドの GLM コードを動かすには、<strong>Step 2（スライド 40）の Step D-⑥</strong> で作成した二値変数 <code>Depth_C / Ramus_3 / Root_Bulb</code> が <code>df</code> 内に必要です。<br>
もし「<code>オブジェクト 'Depth_C' がありません</code>」というエラーが出たら、スライド 40 に戻って Step D-⑥ を実行してから戻ってきてください。
</div>

<div class="panel">
<div class="panel-title">R コード</div>
<pre>model_glm &lt;- <span class="kw">glm</span>(Outcome ~ Depth_C + Ramus_3 + Root_Bulb,
                 family = binomial, data = df)
<span class="kw">summary</span>(model_glm)</pre>
</div>

<div class="panel">
<div class="panel-title">出力（警告：glm.fit: fitted probabilities numerically 0 or 1 occurred）</div>
<pre class="output">              Estimate  Std. Error  z value  Pr(&gt;|z|)
(Intercept)   -1.504     0.700     -2.149    0.032
Depth_C       18.173  2084.107      0.009    0.993  ← 係数が発散！
Ramus_3        1.537     0.904      1.701    0.089
Root_Bulb      0.711     0.786      0.904    0.366</pre>
</div>

<div class="grid grid-2">
<div class="danger-box" style="margin:0">
<strong>問題：</strong>Depth_C の係数 = 18.17、標準誤差 = 2084<br>
→ z 値 = 0.009 → p = 0.993 となり「有意でない」と誤判定してしまう<br>
→ OR = exp(18.17) ≈ 78,700,000 で解釈不能
</div>
<div class="warn-box" style="margin:0">
<strong>原因：</strong>Control 群の Depth C が 0 名（完全分離）。<br>
通常の最尤推定法では、係数を ∞ に飛ばした方が尤度が高くなる。
</div>
</div>

<div class="ok-box">解決策 → <strong>Firth (1993) 罰則付き最尤推定法</strong>。次スライドで実行。</div>

<figure class="screenshot empty"
  data-src="screenshots/04-glm-separation-warning.jpg"
  data-caption="通常 glm() 実行時に出る "fitted probabilities numerically 0 or 1" 警告と異常な係数"
  data-alt="完全分離の警告画面">
  <span class="ph-icon">📷</span>
  <span class="ph-label">SCREENSHOT 04-8</span>
  <div class="ph-src">screenshots/04-glm-separation-warning.jpg</div>
  <div class="ph-desc">通常 glm() で完全分離が発生した際の警告と summary() 出力（係数 18.17 / SE 2084 が見える）</div>
</figure>
</div>
`},

/* ============ 4-12 Firth回帰 ============ */
{part:"Part 4", short:"Firth 罰則付き回帰", html:`
<div class="slide-inner">
<span class="slide-tag">FIRTH REGRESSION</span>
<h2 class="slide-title">Firth 罰則付きロジスティック回帰</h2>
<p class="slide-sub">Jeffreys 事前分布相当の罰則項により、係数の発散を防ぐ。有限で解釈可能な推定値が得られる。</p>

<div class="panel" style="background:#dcfce7;border-color:var(--green);margin-bottom:14px;padding:12px 16px">
<div style="font-size:11px;font-weight:800;color:var(--green);letter-spacing:.1em;margin-bottom:4px">📋 新ワークフローでの位置づけ</div>
<p style="font-size:14px;margin:0;line-height:1.7"><strong>2002 年の Step 4</strong>（新指数構築）に対応。2002 年は <strong style="color:var(--red)">OR=999 をそのまま論文に載せた</strong>が、新ワークフローでは <strong>Firth 法で OR=13.45 に収束</strong> させる。これで「数字として読める形」になる。</p>
</div>

<div class="panel" style="background:#eff6ff;border-color:var(--blue);margin-bottom:14px">
<div class="panel-title">この章でやること・なぜ必要か（統計初心者向け）</div>
<div class="article">
<p><strong>やること：</strong>前章で「壊れた」結果を、<strong>Firth 法</strong> という補正手法で正しく直します。</p>
<p><strong>なぜ Firth 法？</strong>完全分離（OR が ∞ に飛ぶ問題）を <strong>数学的に止めるブレーキ</strong> を加えるからです。1993 年に David Firth が考案し、今では <strong class="emphasis">小サンプル＋ゼロセルがある研究の標準的手法</strong>。R では <code>logistf</code> パッケージ 1 行で使えます。</p>
<p>たとえると：暴走しがちな自転車に <strong>ブレーキを取り付けた</strong> ようなもの。スピード（OR の大きさ）は出にくくなりますが、<strong>安全に乗れる（数字として解釈できる）</strong>ようになります。</p>
<p><strong>結果の読み方：</strong>下の表で各数値の意味は ─</p>
<ul class="bullet">
  <li><strong>OR（オッズ比）</strong>：その因子があると、抜歯困難になる「オッズ」が何倍になるか。OR=13.45 なら「Depth C があると、ない場合に比べて困難になる確率が 13.45 倍」と読める（厳密には確率比でなくオッズ比だが、初心者はまずこのイメージで OK）</li>
  <li><strong>95% CI（信頼区間）</strong>：「真の値はこの範囲のどこかに 95% の確率で入る」という幅。<strong>幅が狭いほど推定が確か</strong>。CI が「1」をまたぐ場合は「効果あり／なしを断言できない」状態</li>
  <li><strong>p 値</strong>：「偶然にこんな結果が出る確率」。0.05 未満で「偶然とは考えにくい（有意）」と言うが、これは <strong>有意性の判定</strong> であって <strong>効果の大きさ</strong> や <strong>臨床的重要性</strong> とは別物</li>
  <li><strong>LR test（Likelihood ratio test）</strong>：モデル全体の良さを判定する検定。p=0.010 なら「3 変数を入れたモデルは何もないモデルより有意に良い」</li>
</ul>
<p><strong>本研究での解釈：</strong>Depth_C の OR=13.45 は <strong>「効果は強い方向に出ているが、CI が 1.06–1918 と 4 桁またぎで実用にはほど遠い」</strong>。これは Firth 法の限界ではなく <strong class="emphasis">N=44 という小サンプルの限界</strong>。CI を狭めるには「より多くの患者データ」が必要、という大事な教訓。</p>
</div>
</div>

<div class="warn-box" style="font-size:14px;margin-bottom:12px">
<strong>前提：</strong>こちらも <code>Depth_C / Ramus_3 / Root_Bulb</code>（スライド 40 Step D-⑥）と <code>logistf</code> パッケージのインストールが必要です。<br>
もし <code>library(logistf)</code> で「<code>there is no package called 'logistf'</code>」と出たら、先に <code>install.packages("logistf")</code> を実行してください。
</div>

<div class="grid grid-ab">
<div class="panel">
<div class="panel-title">R コード</div>
<pre><span class="kw">library</span>(logistf)</pre>
<pre>fit &lt;- <span class="kw">logistf</span>(Outcome ~ Depth_C + Ramus_3 + Root_Bulb, data = df)
<span class="kw">summary</span>(fit)</pre>
<div class="note-box" style="margin-top:10px">
Firth 法：尤度に罰則を加え、係数の発散を防ぐ。ベイズ的発想だが事前分布を明示せず使える。
</div>
</div>

<div class="panel">
<div class="panel-title">結果（仮想データでの再解析）</div>
<table style="font-size:13px">
  <thead><tr><th>変数</th><th class="center">β</th><th class="center">OR</th><th class="center">95% CI</th><th class="center">p</th></tr></thead>
  <tbody>
    <tr><td>(Intercept)</td><td class="center">-1.18</td><td class="center">─</td><td class="center">─</td><td class="center">0.010</td></tr>
    <tr class="highlight-row"><td><strong>Depth_C</strong></td><td class="center"><strong>2.60</strong></td><td class="center hi"><strong>13.45</strong></td><td class="center">1.06–1918</td><td class="center">0.044</td></tr>
    <tr><td>Ramus_3</td><td class="center">1.24</td><td class="center">3.47</td><td class="center">0.58–23.8</td><td class="center">0.168</td></tr>
    <tr><td>Root_Bulb</td><td class="center">0.65</td><td class="center">1.92</td><td class="center">0.44–8.37</td><td class="center">0.378</td></tr>
  </tbody>
</table>
<div style="background:var(--surface-alt);padding:10px;border-radius:8px;margin-top:10px;font-size:13px;border:1px solid var(--line)">
<strong>モデル全体：</strong>LR χ² = 8.32, df = 3, <strong>p = 0.010</strong>
</div>
</div>
</div>

<div class="ok-box"><strong>改善点：</strong>Depth_C の OR が ∞ → 13.45 へ。解釈可能な値に。ただし CI 幅は 1.06–1918 と依然広く、<strong>サンプルサイズの限界</strong> を如実に反映。</div>

<figure class="screenshot empty"
  data-src="screenshots/04-firth-summary.jpg"
  data-caption="logistf() の summary() 出力 ─ 係数・OR・profile-likelihood CI・p 値"
  data-alt="Firth 回帰の summary 出力">
  <span class="ph-icon">📷</span>
  <span class="ph-label">SCREENSHOT 04-9</span>
  <div class="ph-src">screenshots/04-firth-summary.jpg</div>
  <div class="ph-desc">logistf() の summary() 出力。Depth_C の OR が 13.45 に収束、CI 1.06–1918、LR test p=0.010</div>
</figure>
</div>
`},

/* ============ 4-13 結果を AI に解釈 ============ */
{part:"Part 4", short:"Step 6 ─ 結果を AI に解釈させる", html:`
<div class="slide-inner">
<span class="slide-tag">STEP 6 · INTERPRET</span>
<h2 class="slide-title">解析結果を AI に渡して意味を確認する</h2>

<div class="panel" style="background:#dcfce7;border-color:var(--green);margin-bottom:14px;padding:12px 16px">
<div style="font-size:11px;font-weight:800;color:var(--green);letter-spacing:.1em;margin-bottom:4px">📋 新ワークフローでの位置づけ</div>
<p style="font-size:14px;margin:0;line-height:1.7"><strong>2002 年にはなかったステップ。</strong>当時は「数値が出たら自分で文章にする」だけだったが、新ワークフローでは <strong>AI に "解釈の叩き台" を作らせる</strong> → 自分でチェック、というサイクルに進化。</p>
</div>

<div class="panel" style="background:#eff6ff;border-color:var(--blue);margin-bottom:14px">
<div class="panel-title">この章でやること・なぜ必要か（統計初心者向け）</div>
<div class="article">
<p><strong>やること：</strong>R から出てきた数字（前章の Firth 結果）を AI にそのまま貼り付けて、「これは何を意味するか、論文 Results に何と書くべきか」を <strong>言語化</strong> させます。</p>
<p><strong>なぜ？</strong>統計ソフトの出力（OR, CI, p 値, LR test ...）は <strong>数字の羅列</strong> で、<strong>「これって結局どういうこと？」「臨床的に意味あるの？」</strong> を自分一人で言語化するのは大変。AI は<strong class="emphasis">この "翻訳作業" が非常に得意</strong>です。</p>
<p>ただし注意：AI の解釈を <strong>そのまま信じてはいけません</strong>。AI に「方法論文献を引用しながら」答えさせ、<strong>引用先の本物性</strong> を Part 1 で学んだ Fact Check で確認します。次章でその検証を実演。</p>
<p><strong>結果の読み方：</strong>AI が返してくれる典型的な解釈の構造 ─</p>
<ul class="bullet">
  <li><strong>① モデル全体の意義</strong>：LR test p=0.010 → 「3 変数全体としては有意」</li>
  <li><strong>② 各変数の臨床的読み方</strong>：「Depth C の OR=13.45 は強そうに見えるが CI が 1.06-1918 と 4 桁またぎで <strong>実用には不十分</strong>」</li>
  <li><strong>③ 論文記載の文例</strong>：「..., adjusted OR 13.5, 95% CI 1.1–1918, p=0.044, with wide imprecision reflecting small sample size」のようなテンプレ</li>
  <li><strong>④ 異常値や見落とし指摘</strong>：「サンプルサイズが小さい」「CI が極端に広い」などの注意点</li>
  <li><strong>⑤ 感度分析の提案</strong>：Bayes ロジスティック・exact logistic・Bootstrap など</li>
</ul>
</div>
</div>

<p class="slide-lead">
R の出力をそのまま論文に貼るのではなく、<strong class="emphasis">まず AI に「この結果は何を意味するか」を説明させる</strong>。重要なのは、AI に <strong>方法論文献を引用させながら</strong> 解釈させ、こちら側でクロスチェックできる状態にすること。
</p>

<div class="panel">
<div class="panel-title">なぜ結果を AI に戻すのか？</div>
<div class="article">
<p><strong>①「自分が理解できる言葉」に翻訳させる</strong><br>
統計ソフトの出力は <code>coef</code>, <code>se(coef)</code>, <code>Chisq</code> など数値の羅列。これを「臨床的にどういう意味か」「何に注意すべきか」まで言語化するのは手間がかかる。AI はこの言語化が得意。</p>
<p><strong>② 見落としや異常値を検出させる</strong><br>
「CI が 1.06–1918 と異常に広い」「p 値が有意でも臨床的意義は別」など、<strong class="emphasis">数値表を眺めるだけでは気づきにくい注意点</strong> を AI が指摘してくれることがある。</p>
<p><strong>③ 論文文章のドラフトを作らせる</strong><br>
「Results セクション用の 3 文で要約して」と頼めば、方法論的に妥当な表現のドラフトが得られる。ただし <strong>最終責任は自分</strong>。</p>
</div>
</div>

<div class="panel">
<div class="panel-title">結果解釈プロンプトの実例</div>
<pre><span class="com"># 役割</span>
あなたは臨床統計に精通した研究者です。
解釈は <span class="kw">方法論文献を引用</span> しながら慎重に行ってください。

<span class="com"># Firth ロジスティック回帰の結果（R の logistf 出力）</span>
Model: Outcome ~ Depth_C + Ramus_3 + Root_Bulb
N = 44 (Events = 20)

Variable       coef    se(coef)    OR     95% CI (profile)    p
Intercept     -1.183   0.460       -      -                   0.010
Depth_C        2.599   1.289       13.45  1.06 - 1918.0       0.044
Ramus_3        1.244   0.900       3.47   0.58 - 23.80        0.168
Root_Bulb      0.651   0.735       1.92   0.44 - 8.37         0.378

Likelihood ratio test: Chisq = 8.32, df = 3, p = 0.010

<span class="com"># 質問</span>
1. このモデルの <span class="kw">全体の意義</span> を、Likelihood ratio test の結果も踏まえて
   解釈してください。

2. 各変数の OR を <span class="kw">臨床的に</span> どう読むべきですか？
   特に Depth_C の OR = 13.45 と CI = 1.06 - 1918 をどう解釈すべき？
   Greenland et al. (Am J Epidemiol 2016) の推奨を参考に。

3. このモデルを <span class="kw">論文 Results に載せる</span> なら、
   どの数値をどう表記すべき？ TRIPOD+AI (BMJ 2024) に従って
   チェックリストを作ってください。

4. この結果に <span class="kw">異常値や見落とし</span> があれば指摘して。

5. 同じデータで感度分析するなら何を試すべき？
   （例：Bayes、LASSO、exact logistic など）</pre>
</div>

<div class="panel">
<div class="panel-title">期待される AI 応答の構造</div>
<div class="article">
<p><strong>① 全体モデル：</strong>LR test p = 0.010 で、3 変数が全体として有意にアウトカムと関連。ただし <strong class="emphasis">モデル有意 ≠ 予測精度が高い</strong>（Pepe 2004, Am J Epidemiol）。</p>
<p><strong>② Depth_C：</strong>OR = 13.45 は点推定として大きいが、95% CI が <strong>1.06 – 1918 と 3 桁またぎ</strong> で実質的に解釈不能。完全分離の残存影響。Greenland (2016) は「CI が広すぎる場合、点推定を強調しない」ことを推奨。</p>
<p><strong>③ 他の 2 変数：</strong>Ramus_3 (OR=3.47) と Root_Bulb (OR=1.92) は両方とも CI が 1 をまたぎ、<strong>統計的には "非有意"</strong>。ただし臨床的意義はサンプル数を増やせば出うる規模。</p>
<p><strong>④ 論文記載例：</strong>"Depth at occlusal level C was independently associated with extraction difficulty (adjusted OR 13.5, 95% CI 1.1–1918, p = 0.044), albeit with wide imprecision reflecting the small sample size (EPV = 6.7) and complete separation in the original data."</p>
<p><strong>⑤ 感度分析提案：</strong>(a) Bayes ロジスティック（Gelman priors）、(b) exact logistic regression (elrm パッケージ)、(c) Bootstrap 内部検証で optimism-adjusted AUC を算出。</p>
</div>
</div>

<div class="warn-box">
<strong>AI 解釈の限界：</strong>AI は統計量の読み方は上手だが、「<strong class="emphasis">この数字を信じていいかどうか</strong>」の判断は苦手。完全分離後の Firth 推定値でも「13.45」と自信を持って返答することがある。必ず <strong>CI の幅</strong> を自分で確認し、過信を避ける。
</div>

<div class="cite">
Greenland S, Senn SJ, Rothman KJ, et al. Statistical tests, P values, confidence intervals, and power: a guide to misinterpretations. <em>Eur J Epidemiol</em> 2016;31(4):337–350.<br>
Pepe MS, Janes H, Longton G, Leisenring W, Newcomb P. Limitations of the odds ratio in gauging the performance of a diagnostic, prognostic, or screening marker. <em>Am J Epidemiol</em> 2004;159(9):882–890.
</div>
</div>
`},

/* ============ 4-14 自分で検証 ============ */
{part:"Part 4", short:"Step 7 ─ 自分で検証する", html:`
<div class="slide-inner">
<span class="slide-tag">STEP 7 · VERIFY</span>
<h2 class="slide-title">AI の解釈を、自分で検証する</h2>

<div class="panel" style="background:#dcfce7;border-color:var(--green);margin-bottom:14px;padding:12px 16px">
<div style="font-size:11px;font-weight:800;color:var(--green);letter-spacing:.1em;margin-bottom:4px">📋 新ワークフローでの位置づけ</div>
<p style="font-size:14px;margin:0;line-height:1.7"><strong>2002 年にはなかった必須工程。</strong>AI の解釈を鵜呑みにせず、<strong>自分で 3 つのチェック</strong>（手計算・臨床的妥当性・CI 幅）を行う。これが「AI に任せきりで失敗する」のを防ぐ最後の砦。</p>
</div>

<div class="panel" style="background:#eff6ff;border-color:var(--blue);margin-bottom:14px">
<div class="panel-title">この章でやること・なぜ必要か（統計初心者向け）</div>
<div class="article">
<p><strong>やること：</strong>前章で AI が「こう解釈できる」と説明してくれた内容を、<strong>3 種類の方法で自分でも確認</strong>します。</p>
<p><strong>なぜ？</strong>AI は流暢に説明してくれますが、<strong class="emphasis">時々もっともらしく嘘をつきます</strong>（Part 5 で詳述）。「OR は正しそう」と AI が言っても、自分で確認しなければ <strong>その嘘が論文に紛れ込む</strong> 可能性があります。実際、AI 生成の医学引用の <strong>47.4% が誤り</strong>という報告（JMIR 2024）も。</p>
<p><strong>3 つのチェックの中身：</strong></p>
<ul class="bullet">
  <li><strong>① 手計算で検算</strong>：2×2 表から OR=ad/bc を電卓で計算。R の値とほぼ一致するか確認</li>
  <li><strong>② 臨床的な妥当性</strong>：「この結果、自分の臨床経験と矛盾しないか？」を自問。例えば「年齢が若いほど抜歯が困難」という結果が出たら何かおかしい</li>
  <li><strong>③ CI の幅</strong>：信頼区間 (Lower → Upper) の比率を見る。100 倍以上開いていたら「数字としては出ているが、実用にはほど遠い」</li>
</ul>
<p><strong>本研究での結論：</strong>3 つのチェックの結果、<strong>方向性は正しいが、CI が広すぎて点推定値（13.45 という数字そのもの）を臨床応用してはいけない</strong>と判明。これが小サンプル研究の正直な結論。</p>
</div>
</div>

<p class="slide-lead">
AI の解釈をそのまま採用してはいけない。「<strong class="emphasis">本当にそうか？</strong>」を自分で確認する。これが <strong>研究者としての最低限の責任</strong> であり、ハルシネーション検出の最後の砦。以下の 3 つのチェックは必ず実行する。
</p>

<div class="panel">
<div class="panel-title">チェック ① 手計算で OR の値を検算</div>
<div class="article">
<p><strong>Depth_C の単変量 OR を手計算で検算してみる：</strong>（これは R で実行するコードではなく、紙と電卓でできる<strong>解説</strong>です）</p>
<pre class="output">＜仮想データの 2×2 表（スライド 40 Step E の table() 出力から）＞

            Control  Difficult
Depth = C       0        5
Depth = A/B    24       15

＜OR の公式： OR = (a × d) / (b × c)＞

a = 5    Difficult かつ Depth = C
b = 15   Difficult かつ Depth = A/B
c = 0    Control   かつ Depth = C
d = 24   Control   かつ Depth = A/B

OR = (5 × 24) / (15 × 0) = ∞ （ゼロ除算で計算不能）

＜Haldane 補正で全セルに 0.5 を足した場合＞

OR = ((5 + 0.5) × (24 + 0.5)) / ((15 + 0.5) × (0 + 0.5))
   = 134.75 / 7.75
   ≈ 17.4</pre>
<p>→ 手計算と R の出力が <strong>ほぼ一致</strong> することを確認。もし大きく違えば、R コードか手計算のどちらかに誤りがある。</p>
</div>
</div>

<div class="grid grid-2">
<div class="panel">
<div class="panel-title">チェック ② 臨床的な妥当性</div>
<div class="article">
<p><strong>「この結果、臨床的に理にかなっているか？」</strong> と自問する：</p>
<ul class="bullet">
  <li>Depth C（深位埋伏）で抜歯が難しい → <strong>臨床経験と一致</strong> ✓</li>
  <li>Root Bulbous（歯根球状）で困難 → 抜歯路が狭まる意味で合理的 ✓</li>
  <li>Ramus 3（下顎枝内）で困難 → アクセスが物理的に困難 ✓</li>
</ul>
<p>全て方向性としては臨床常識と一致する。<strong class="emphasis">もし「年齢が若いほど困難」などの違和感があれば、データかコードを疑う</strong>。</p>
</div>
</div>

<div class="panel">
<div class="panel-title">チェック ③ CI の信頼性を見極める</div>
<div class="article">
<p><strong>OR の点推定だけを見ず、必ず CI の広さを評価：</strong></p>
<table style="font-size:13px">

    <tr><td>Root_Bulb</td><td class="center warn">19 倍</td><td class="center warn">不安定</td></tr>
  </tbody>
</table>
<p>→ <strong>どの変数も CI が広すぎる</strong>。これは <strong class="emphasis">EPV 不足の直接的な証拠</strong> であり、点推定を臨床応用すべきでない明確なサイン。</p>
</div>
</div>
</div>

<div class="panel">
<div class="panel-title">教科書で確認するクセ ─ 推奨書籍</div>
<div class="article">
<p>AI の説明に違和感があったら、<strong>定評ある教科書</strong> で照合する。以下は著者が特に推奨する 3 冊：</p>
<ul class="bullet">
  <li><strong>Harrell FE Jr.</strong> <em>Regression Modeling Strategies.</em> 2nd ed. Springer 2015.<br>
    → 回帰モデリング全般の権威書。変数選択・サンプルサイズ・検証すべてを網羅。</li>
  <li><strong>Hosmer DW, Lemeshow S, Sturdivant RX.</strong> <em>Applied Logistic Regression.</em> 3rd ed. Wiley 2013.<br>
    → ロジスティック回帰専門書。完全分離・Firth 法も解説。</li>
  <li><strong>Steyerberg EW.</strong> <em>Clinical Prediction Models.</em> 2nd ed. Springer 2019.<br>
    → 臨床予測モデルの定本。TRIPOD 準拠の実践ガイド。</li>
</ul>
</div>
</div>

<div class="ok-box">
<strong>黄金律：</strong>AI に聞く → R で実行 → 結果を AI に戻す → <strong class="emphasis">教科書・原論文で検証</strong> → 自分の言葉で再解釈 → 論文に書く。この <strong>5 ステップ</strong> を省略しないこと。AI に「論文文章」を書かせて最終とするのは <strong>危険</strong>。
</div>

<div class="danger-box">
<strong>実話：</strong>2024 年の研究では、AI 生成の医学引用の <strong>47.4%</strong> が誤り（JMIR 2024; PMC11325115）。生成コードは <strong>31.7%</strong> が再現不能（arXiv:2512.22387, 2025）。<strong class="emphasis">AI を信じ切る研究者は、遠からず致命的な論文を出す</strong>。自分で検証するクセは、キャリアを守る盾である。

</div>

/* ============ 4-16 再解析 vs 原論文 ============ */
{part:"Part 4", short:"再解析 vs 原論文", html:`
<div class="slide-inner">
<span class="slide-tag">COMPARISON</span>
<h2 class="slide-title">再解析 vs 原論文 ─ 24 年の差分</h2>

<div class="panel" style="background:#dcfce7;border-color:var(--green);margin-bottom:14px;padding:12px 16px">
<div style="font-size:11px;font-weight:800;color:var(--green);letter-spacing:.1em;margin-bottom:4px">📋 新ワークフローでの位置づけ</div>
<p style="font-size:14px;margin:0;line-height:1.7"><strong>2002 年にはなかった工程：原論文との直接比較。</strong>「Firth 補正で何がどう変わったか」を表とグラフで可視化し、<strong>結論が変わった点・変わらなかった点</strong> を明確にする。</p>
</div>

<div class="panel" style="background:#eff6ff;border-color:var(--blue);margin-bottom:14px">
<div class="panel-title">この章でやること・なぜ必要か（統計初心者向け）</div>
<div class="article">
<p><strong>やること：</strong>2002 年の Yuasa 論文の数字と、今回の Firth 法での再解析結果を <strong>横並びで比較</strong> します。</p>
<p><strong>なぜ？</strong>「<strong class="emphasis">何がどう変わったか</strong>」「<strong class="emphasis">変わらなかった部分はどこか</strong>」を明示することで、Firth 法の効果と限界が同時に見えてきます。「全部ひっくり返した」わけでも「全部正しかった」わけでもないことを、数字で確かめましょう。</p>
<p><strong>結果の読み方：</strong>下の表で見るべきポイント ─</p>
<ul class="bullet">
  <li><strong>OR の値は大きく変わる</strong>：Depth C 999 → 13.45、Ramus 3 が 44.02 → 3.47 など。Firth 法が "極端な値を抑える" 効果がはっきり見える</li>

</ul>
<p><strong>大事な教訓：</strong>「<strong>古い論文を否定する</strong>」のが目的ではなく、<strong class="emphasis">同じデータを現代の手法で扱うとどう変わるか</strong> を体験するのが目的。"統計手法も論文の作り方も、24 年で進歩した" ということが <strong>具体的な数字で実感できる</strong>のが本章の価値。</p>
</div>
</div>

<div class="chart-wrap tall" style="margin-bottom:14px"><canvas id="compareChart"></canvas></div>

<table>
  <thead><tr><th>指標</th><th class="center">原論文 (2002)</th><th class="center">再解析 (2026)</th><th>差異の理由</th></tr></thead>
  <tbody>
    <tr><td>Depth C OR</td><td class="center">999</td><td class="center">13.45</td><td><strong>Firth 補正</strong> により発散を抑制</td></tr>
    <tr><td>Ramus 3 OR</td><td class="center">44.02</td><td class="center">3.47</td><td>Firth + 仮想データの変数間相関</td></tr>
    <tr><td>Bulbous OR</td><td class="center">29.5</td><td class="center">1.92</td><td>同上</td></tr>

    <tr><td>新指数 OR</td><td class="center">62.3</td><td class="center">5.0</td><td>同上</td></tr>

<div class="note-box">単変量 OR は周辺度数のみで決まるため正確に再現可能。多変量 OR は変数間相関に依存するため、仮想データでは乖離する。それでも <strong>"Depth C が最強の予測因子" という結論は変わらない</strong>。</div>

/* ============ 5-1 定義 ============ */
{part:"Part 5", short:"ハルシネーションとは何か", html:`
<div class="slide-inner">
<span class="slide-tag">DEFINITION</span>
<h2 class="slide-title">ハルシネーションとは何か</h2>
<p class="slide-lead">
ハルシネーション（幻覚出力）とは、LLM が生成する <strong class="emphasis">流暢で自信に満ちた、しかし事実に反する出力</strong>。単なる「誤り」ではなく、「<strong>誤りを自信満々に、しかも筋が通っているように語る</strong>」点が問題の本質である。
</p>

<div class="quote">
「試験で難しい問題に直面した学生が推測するように、大規模言語モデルも不確実な時に推測する。もっともらしいが不正確な記述を、不確実性を認める代わりに生成する。」<br>
— Kalai et al. (2025) Abstract
</div>

<div class="panel">
<div class="panel-title">なぜ「幻覚」と呼ぶのか？</div>
<div class="article">
<p>精神医学で「幻覚（hallucination）」は、<strong>実在しない知覚を本物と信じ込む</strong> 現象を指す。LLM の誤出力も：</p>
<ul class="bullet">
  <li>内部的には「正解」と同じ確信度で生成される</li>
  <li>検証メカニズムが弱く、自己修正が効かない</li>
  <li>流暢さは正解時と区別がつかない</li>
</ul>
<p>という特徴があり、まさに「幻覚」のアナロジーが成立する。<strong class="emphasis">「嘘をついている」のではなく、「本当に正しいと思って言っている」</strong> のが恐ろしい点。</p>
</div>
</div>

<div class="panel">
<div class="panel-title">ハルシネーションが統計解析で起きる典型パターン</div>
<div class="grid grid-2">
<ul class="bullet">
  <li><span class="badge red">実在しない R パッケージ</span><br><code>firth.glm()</code> ← 正しくは <code>logistf::logistf()</code></li>
  <li><span class="badge red">構文は正しいが統計的に不適切</span><br>完全分離があるのに通常 GLM を勧める</li>
  <li><span class="badge red">架空の引用文献</span><br>著者名・タイトル・DOI を捏造</li>
</ul>
<ul class="bullet">
  <li><span class="badge red">p 値の誤解釈</span><br>「p = 0.03 なので因果が証明された」</li>
  <li><span class="badge red">古い関数名・非推奨 API</span><br>廃止された <code>aes_string()</code> 等</li>
  <li><span class="badge red">係数と OR の混同</span><br><code>exp()</code> 忘れで 1000 倍違う値</li>
</ul>
</div>
<div class="warn-box">
これらはすべて <strong>"それっぽいコード"</strong> として出てくる。目視で見分けるのはほぼ不可能。<strong class="emphasis">必ず実行して動作確認し、結果を手計算で検証する</strong> ことが唯一の対策。
</div>
</div>
</div>
`},

/* ============ 5-2 統計的必然 ============ */
{part:"Part 5", short:"統計的必然 ─ Kalai &amp; Vempala", html:`
<div class="slide-inner">
<span class="slide-tag">THEOREM</span>
<h2 class="slide-title">ハルシネーションはバグではなく統計的必然</h2>

<div class="panel" style="background:#eff6ff;border-color:var(--blue);margin-bottom:18px">
<div class="panel-title">超ざっくり言うと？</div>
<div class="article">
<p>多くの人は「AI が嘘をつくのは <strong>プログラマがミスったから</strong>」「<strong>訓練データに変な情報が混じったから</strong>」と思いがちです。</p>
<p>でも、Kalai &amp; Vempala（2024）が <strong class="emphasis">数学的に証明した</strong> のは：</p>
<p style="font-size:17px;color:var(--ink-strong);font-weight:700;text-align:center;padding:10px 0">
「どんなに完璧に作っても、AI は <strong style="color:var(--red)">必ず</strong> 一定割合で嘘をつく」
</p>
<p>つまり <strong>バグではなく "数学的に避けられない性質"</strong> ということです。</p>
<p>その理由は <strong class="emphasis">「訓練データに 1 回しか出てこない情報（誰々の誕生日、ある DOI、特定の R パッケージ名など）」が一定数存在する</strong> から。AI はパターン学習器なので、<strong>1 回しか出てこない情報はパターンが見えず、推測（ハルシネーション）するしかない</strong> のです。</p>
<p>このスライドで出てくる「キャリブレーション」「シングルトン」という言葉は、<strong>すべてこのシンプルな話を数学的に厳密に表現するためのもの</strong>。難しく見えても、本質は「<strong class="emphasis">1 回きりの情報は学べない → だから推測してしまう → だから一定割合で嘘になる</strong>」だけです。</p>
</div>
</div>

<p class="slide-lead">
ハルシネーションは <strong class="emphasis">プログラマの失敗や訓練データの汚染ではない</strong>。数学的に「キャリブレーションされた言語モデル＝確率分布を正しく学習したモデル」であれば、<strong>必ず一定割合のハルシネーションを起こす</strong> ことが証明されている。これが Kalai &amp; Vempala (2024) の核心。
</p>

<div class="panel">
<div class="panel-title">キャリブレーション（Calibration）とは何か？ ─ まず定義から</div>
<div class="article">
<p>言語モデルが「次に来る単語は 'apple' だ」と 30% の確率で予測したとしよう。このモデルが <strong class="emphasis">本当に 30% の頻度で 'apple' と出現するデータを正しく学習できている</strong> とき、「キャリブレーションされている」と言う。</p>
<p>これは望ましい性質だ。過度に自信満々でも、過度に臆病でもない、<strong>確率の出力が現実の頻度と一致する</strong> モデル。理想的な確率学習器である。</p>
<p>しかし、Kalai &amp; Vempala はこの理想的なモデルですら、<strong>一定のハルシネーション率を持つことが数学的に避けられない</strong> ことを証明した。</p>
</div>
</div>

<div class="panel" style="background:linear-gradient(135deg,#ede9fe 0%,#dbeafe 100%);border-color:var(--purple)">
<div class="panel-title" style="color:var(--purple)">定理（非形式的）</div>
<p style="font-size:17px;line-height:1.8;padding:10px;color:var(--ink-strong)">
キャリブレーションされた pretrained 言語モデルのハルシネーション率には、<strong class="emphasis">訓練データに正確に 1 回だけ出現する事実（singleton）の割合と密接に関連する下限</strong> が存在する（Good–Turing 型の推定値に近い）。
</p>
<div style="background:var(--surface);padding:18px;border-radius:8px;margin-top:12px;border:1px solid var(--line)">
<div style="font-family:var(--font-mono);font-size:17px;text-align:center;color:var(--ink-strong);line-height:1.8">
生成エラー率 &ge; <span style="color:var(--amber);font-weight:700">sr</span> &minus; 2/min|E<sub>c</sub>| &minus; O(&radic;(ln N / N)) &minus; &delta;
</div>
<div style="font-size:13px;color:var(--ink-muted);margin-top:12px;text-align:center">
sr = 訓練データ中のシングルトン率　/　δ = キャリブレーション誤差　/　N = 訓練データ数
</div>
</div>
</div>

<div class="panel">
<div class="panel-title">なぜシングルトン（1 回しか出ない事実）が問題なのか？</div>
<div class="article">
<p>言語モデルは「パターン学習器」である。「ある文脈で、次に来やすい単語は何か」という <strong>統計的規則性</strong> を無数のデータから抽出する。</p>
<p>ところが、訓練データに <strong class="emphasis">1 回しか出てこない事実</strong>（例：ある個人の誕生日、珍しい論文のタイトル、特定の DOI）は、<strong>パターンを抽出する材料がない</strong>。モデルにとっては「ノイズ」と「正解」の区別がつかない。</p>
<p>こうした事実について質問されると、モデルは <strong>最もそれっぽい応答を確率的に生成する</strong> しかない。それが「正しい」確率は、訓練データのシングルトン率に比例して低下する。</p>
</div>
</div>

<h3 class="section-head">3 つの事実タイプと学習しやすさ</h3>

<div class="grid grid-3">
<div class="panel green">
<div class="panel-title">パターン ①</div>
<p style="font-size:18px;font-weight:700;margin-bottom:8px;color:var(--ink-strong)">100 回以上出現</p>
<div class="article">
<p>例：「アインシュタインは物理学者」「水は H₂O」</p>
<p>多数の文脈で繰り返し出現 → 強固なパターンとして学習 → <strong>正答可能</strong>。</p>
</div>
</div>

<div class="panel amber">
<div class="panel-title">パターン ②</div>
<p style="font-size:18px;font-weight:700;margin-bottom:8px;color:var(--ink-strong)">10 回程度出現</p>
<div class="article">
<p>例：特定の中規模論文、ややマイナーな概念</p>
<p>多少のパターンは学習されるが、<strong>揺らぎがある</strong>。同じ質問で違う答えが出ることも。</p>
</div>
</div>

<div class="panel red">
<div class="panel-title">パターン ③</div>
<p style="font-size:18px;font-weight:700;margin-bottom:8px;color:var(--ink-strong)">1 回だけ出現（Singleton）</p>
<div class="article">
<p>例：一般人の誕生日、珍しい博士論文のタイトル、特定の DOI</p>
<p>学習材料なし → <strong class="emphasis">必ずハルシネーション</strong>。</p>
</div>
</div>
</div>

<div class="warn-box">
<strong>重要な含意：</strong>医学論文の正確な書誌情報（著者・巻号・ページ・DOI）は <strong>ほとんどがシングルトン事実</strong>。つまり LLM に文献情報を尋ねると、<strong class="emphasis">構造的にハルシネーションが起きやすい領域</strong> である。必ず DOI で実在確認を。
</div>

<div class="cite">Kalai AT, Vempala SS. Calibrated Language Models Must Hallucinate. <em>Proc. STOC 2024</em>, pp.160–171. DOI: 10.1145/3618260.3649777</div>
</div>
`},

/* ============ 5-3 IIV還元 ============ */
{part:"Part 5", short:"IIV 還元 ─ 生成は分類より難しい", html:`
<div class="slide-inner">
<span class="slide-tag">CORE THEORY · Kalai 2025</span>
<h2 class="slide-title">Is-It-Valid (IIV) 還元 ─ 「作り出す」のは「○×を当てる」より難しい</h2>

<div class="panel" style="background:#eff6ff;border-color:var(--blue);margin-bottom:18px">
<div class="panel-title">超ざっくり言うと？</div>
<div class="article">
<p>「IIV 還元」というのは <strong>難しい数学用語に聞こえますが、考えていることはとてもシンプル</strong> です。</p>
<p><strong class="emphasis">クイズで例えてみましょう。</strong></p>
<ul class="bullet">
  <li>テスト形式 ①：<strong>選択肢から正解を選ぶ／○×で答える</strong>（例：「アインシュタインは物理学者？」→ Yes/No）</li>
  <li>テスト形式 ②：<strong>自分で正解を書き出す</strong>（例：「アインシュタインの博士論文タイトルは？」→ ゼロから書く）</li>
</ul>
<p>同じ知識量でも、<strong>②（自分で書き出す）のほうが本質的に難しい</strong> ですよね。<strong class="emphasis">分類は当てずっぽうでも 50% 正解できますが、生成は「正解にぴったり」一致しないと得点になりません。</strong></p>
<p>Kalai 先生たちが 2025 年に証明したのは、この当たり前の話を AI に当てはめると：<br>
<strong>「AI が "Yes/No 判定" で 10% 間違えるなら、"自由記述で生成" すると最低でも 20% 間違える（2 倍以上）」</strong> という数学的な不等式が成り立つ、ということ。</p>
<p>これが <strong class="emphasis">「文献を AI に挙げさせると、必ず一定割合で架空の論文が混じる」</strong> 理由の数学的な根拠です。</p>
</div>
</div>

<p class="slide-sub">これからの図と数式で、「分類タスク」と「生成タスク」の違いを視覚的に示します。</p>

<p style="font-size:14px;line-height:1.7">
<strong>直感的理解：</strong>「これは正しい？」と Yes/No で判定する問題より、「正しい出力を <em>作り出す</em>」生成タスクの方が本質的に難しい。<br>
キャリブレーションと有限誤差空間の補正項を除けば、<strong>生成エラーは IIV 誤分類エラーの 2 倍以上</strong>になる、というのが原典の言明。

</div>

/* ============ 5-4 post-training の問題 ============ */
{part:"Part 5", short:"post-training で消えない理由", html:`
<div class="slide-inner">
<span class="slide-tag">OBSERVATION 1</span>
<h2 class="slide-title">なぜ post-training でハルシネーションが消えないのか</h2>

<div class="panel" style="background:#eff6ff;border-color:var(--blue);margin-bottom:16px">
<div class="panel-title">超ざっくり言うと？</div>
<div class="article">
<p>「AI が嘘をつくなら、<strong>後から学習させて直せばいいのでは？</strong>」と思いますよね。実際、AI 開発者は <strong>post-training（事後学習）</strong> で挙動を調整しています。</p>
<p>でも、ハルシネーションが消えない理由は <strong class="emphasis">学校の試験のしくみ</strong> と同じです。</p>
<p>あなたが試験を受けるとき：</p>
<ul class="bullet">
  <li>正解 → <strong>1 点もらえる</strong></li>
  <li>不正解 → <strong>0 点</strong></li>
  <li>「わかりません」と空欄 → <strong>0 点</strong></li>
</ul>
<p>この採点ルールだと、<strong>「わかりません」と正直に答えるより、当てずっぽうでも書いた方が得</strong> ですよね？（だって不正解と空欄、どっちも 0 点なら、当たれば 1 点もらえる方を選ぶ）</p>
<p>AI も全く同じで、ベンチマーク（AI の "試験"）の採点ルールが上と同じだから、<strong class="emphasis">「わかりません」と言うより、もっともらしい嘘で勝負する方が高得点</strong> になります。</p>
<p>つまり、AI は <strong>嘘をつくように "ご褒美設計" されている</strong> のです。これを直すには「わかりません」と答えても部分点をあげる採点に変えるしかなく、それは次々スライドの「信頼度閾値」の話になります。</p>
</div>
</div>

<p class="slide-sub">言語モデルは「試験受験者」として最適化されている。</p>

<div class="panel">
<div class="panel-title">主要ベンチマークの採点方式</div>
<div style="background:var(--surface-alt);padding:14px;border-radius:8px;font-family:var(--font-mono);font-size:13px;line-height:1.9;border:1px solid var(--line)">
<span style="color:var(--blue);font-weight:700">試験の採点方式:</span><br>
&nbsp;&nbsp;正答        → <span style="color:var(--green);font-weight:700">1 点</span><br>
&nbsp;&nbsp;不正答      → <span style="color:var(--red);font-weight:700">0 点</span><br>
&nbsp;&nbsp;「わからない」(IDK) → <span style="color:var(--amber);font-weight:700">0 点</span><br>
<br>
<span style="color:var(--blue);font-weight:700">帰結:</span><br>
&nbsp;&nbsp;「わからない」と正直に答えても 0 点<br>
&nbsp;&nbsp;推測して正答する可能性がある方が期待スコアが高い<br>
&nbsp;&nbsp;→ モデルは <strong style="color:var(--amber)">推測（＝ハルシネーション）を学習する</strong>
</div>
</div>

<div class="panel">
<div class="panel-title">Observation 1（Kalai et al. 2025 Section 4.1）</div>
<div class="quote" style="margin:0">
任意の二値採点方式において、「棄権」（IDK）は最適な応答には含まれない。
</div>
<p style="font-size:13px;margin-top:10px;color:var(--ink-muted)">
つまり、言語モデルのベンチマーク自体がハルシネーションを「報酬」している構造的問題がある。
</p>
</div>
</div>
`},

/* ============ 5-5 ベンチマーク採点表 ============ */
{part:"Part 5", short:"ベンチマーク 10 中 9 が二値採点", html:`
<div class="slide-inner">
<span class="slide-tag">TABLE 2 · Kalai 2025</span>
<h2 class="slide-title">10 のベンチマーク中、IDK に配点があるのは 1 つだけ</h2>
<p class="slide-sub">市場全体が「推測を報酬する」構造になっている。</p>

<div class="panel" style="background:#eff6ff;border-color:var(--blue);margin-bottom:14px">
<div class="panel-title">この用語、何のこと？</div>
<div class="article" style="font-size:14px">
<p><strong>ベンチマーク</strong>：「<strong class="emphasis">AI の実力を測るための共通テスト</strong>」のこと。学校でいう「全国模試」や、車でいう「燃費の試験コース」のようなもの。下の表に並んでいる GPQA や MMLU は、それぞれ別の科目（理科系・常識・数学など）の模試だと思ってください。AI 開発各社はこれらの点数で競い合っています。</p>
<p><strong>IDK</strong>：英語の "I Don't Know" の略で、<strong class="emphasis">AI が「わかりません」と答えること</strong>。前のスライドで見たように、ほとんどのテストでは「わかりません」と答えても点はもらえません。</p>
</div>
</div>

    <tr><td>BBH</td><td>完全一致</td><td class="center"><span class="badge red">Yes</span></td><td class="center">なし</td></tr>
    <tr><td>MATH</td><td>等価性採点</td><td class="center"><span class="badge red">Yes</span></td><td class="center">なし</td></tr>
    <tr><td>Omni-MATH</td><td>等価性採点</td><td class="center"><span class="badge red">Yes</span></td><td class="center">なし</td></tr>
    <tr><td>SWE-bench</td><td>パッチがユニットテスト通過</td><td class="center"><span class="badge red">Yes</span></td><td class="center">なし</td></tr>
    <tr><td>HLE</td><td>多肢選択 / 等価性</td><td class="center"><span class="badge red">Yes</span></td><td class="center">なし</td></tr>
    <tr><td>MMLU</td><td>多肢選択正答率</td><td class="center"><span class="badge red">Yes</span></td><td class="center">なし</td></tr>
    <tr class="highlight-row"><td><strong>WildBench</strong></td><td>LM 採点（1-10）</td><td class="center"><span class="badge green">No</span></td><td class="center"><strong>部分的</strong></td></tr>
  </tbody>
</table>

<div class="warn-box">10 中 9 が二値採点 → 市場全体が「推測を報酬する」構造。少数のハルシネーション評価を追加しても、このインセンティブに溺れる。</div>

<div class="cite">Kalai et al. (2025) Table 2, p.14.</div>
</div>
`},

/* ============ 5-6 エラー3類型 ============ */
{part:"Part 5", short:"エラー 3 類型", html:`
<div class="slide-inner">
<span class="slide-tag">ERROR TAXONOMY</span>
<h2 class="slide-title">生成エラーの 3 つの統計的要因</h2>

<div class="panel" style="background:#eff6ff;border-color:var(--blue);margin-bottom:16px">
<div class="panel-title">超ざっくり言うと？</div>
<div class="article">
<p>「AI のミス」は一見みんな同じに見えますが、<strong class="emphasis">原因によって 3 種類に分けられる</strong>のがこのスライドのポイント。</p>
<p>身近なたとえで言うと：</p>
<ul class="bullet">
  <li><strong>① 任意事実（Arbitrary Facts）</strong>：友人の電話番号を覚えていない人と同じ。<strong>そもそも知る機会が少なすぎて学べない</strong>。これは AI でも人間でも同じで、<span style="color:var(--red)">対策が一番難しい</span>。</li>
  <li><strong>② モデルの限界（Poor Models）</strong>：暗算が苦手な人と同じ。<strong>頭の作りに向いていない仕事がある</strong>（AI は文字数カウントや桁数の多い計算が苦手）。これは電卓を使えば解決するように、<span style="color:var(--green)">補助ツールで対処可能</span>。</li>
  <li><strong>③ Garbage In, Garbage Out（GIGO）</strong>：間違った教科書で勉強した子と同じ。<strong>学んだ情報自体が間違っていた</strong>。良い情報で再学習すれば一部直せます。</li>
</ul>
<p>研究で AI を使うとき、<strong>失敗した場面を見て「これはどのタイプ？」と分類できると、対策が見えてくる</strong> のです。例えば「実在しないパッケージ名を出した」なら ①、「桁数の多い計算を間違えた」なら ②、「古い廃止された関数を提案した」なら ③。</p>
</div>
</div>

<p class="slide-sub">対策の難易度がそれぞれ異なる。何タイプのエラーかを見極めることが対策の第一歩。</p>

<div class="grid grid-3">
<div class="panel red">
<div class="panel-title">① Arbitrary Facts</div>
<p style="font-size:14px;line-height:1.6"><strong>任意事実</strong><br>
訓練データに少なくしか出現しない事実。パターンがないため学習不能。</p>
<ul class="bullet" style="margin-top:8px">
  <li>誕生日</li>
  <li>博士論文タイトル</li>
  <li>特定の DOI</li>
  <li>R パッケージ名</li>
</ul>
<div class="danger-box" style="margin-top:10px;font-size:12px">対策：<strong>困難</strong>。データ不足が本質。検索拡張（RAG）で一部緩和。</div>
</div>

<div class="panel amber">
<div class="panel-title">② Poor Models</div>
<p style="font-size:14px;line-height:1.6"><strong>不適切なモデル</strong><br>
モデル族の表現能力が不足。トークン化の制約など。</p>
<ul class="bullet" style="margin-top:8px">
  <li>文字数カウント</li>
  <li>桁数の多い計算</li>
  <li>構文の揺れる命名</li>
  <li>長距離依存</li>
</ul>
<div class="warn-box" style="margin-top:10px;font-size:12px">対策：<strong>改善可能</strong>。推論時計算（Chain-of-Thought）や専用ツール呼び出し。</div>
</div>

<div class="panel purple">
<div class="panel-title">③ GIGO</div>
<p style="font-size:14px;line-height:1.6"><strong>Garbage In, Garbage Out</strong><br>
訓練データ中の誤情報がそのまま再現される。</p>
<ul class="bullet" style="margin-top:8px">
  <li>ネット上の誤統計コード</li>
  <li>古い医学知識</li>
  <li>都市伝説</li>
  <li>誤った引用習慣</li>
</ul>
<div class="note-box" style="margin-top:10px;font-size:12px">対策：<strong>部分的</strong>。post-training の RLHF で一部軽減可能。</div>
</div>
</div>

<div class="note-box">統計コード生成での典型：古い関数名は Arbitrary Facts、p 値の誤解釈は GIGO、構文は正しいが統計的に不適切なコードは Poor Models。</div>
</div>
`},

/* ============ 5-7 信頼度閾値 ============ */
{part:"Part 5", short:"信頼度閾値による解決提案", html:`
<div class="slide-inner">
<span class="slide-tag">SOLUTION</span>
<h2 class="slide-title">明示的信頼度閾値 ─ ベンチマーク採点を変える</h2>
<p class="slide-sub">Kalai et al. (2025) の提案：各問題に閾値 t を明示し、誤答ペナルティを課す。</p>

<div class="panel">

<pre>"Answer only if you are &gt; <span class="numv">t</span> confident,
since mistakes are penalized <span class="numv">t/(1-t)</span> points,
while correct answers receive <span class="numv">1</span> point,

</div>

<div class="grid grid-3">

</div>
<div class="stat amber">

  <div class="value">2 点</div>

</div>

/* ============ 5-10 Analyst-Inspector ============ */
{part:"Part 5", short:"Analyst-Inspector フレームワーク", html:`
<div class="slide-inner">
<span class="slide-tag">FRAMEWORK · Zeng 2025</span>
<h2 class="slide-title">Analyst-Inspector フレームワーク ─ 「AI に AI をチェックさせる」仕組み</h2>

<div class="panel" style="background:#eff6ff;border-color:var(--blue);margin-bottom:16px">
<div class="panel-title">超ざっくり言うと？</div>
<div class="article">
<p>研究で AI を使うとき、<strong class="emphasis">「AI が出した結果が本当に正しいか、自分一人で見抜くのは大変」</strong> ですよね。そこで Zeng 先生たち（2025）が提案したのが、<strong>"AI を 2 つ用意して、お互いをチェックさせる"</strong> という仕組みです。</p>
<p>たとえるなら：</p>
<ul class="bullet">
  <li><strong>AI 役 1（Analyst）：解析担当の AI</strong> ─ コードを書いて、結果を出す</li>
  <li><strong>AI 役 2（Inspector）：検査担当の AI</strong> ─ 解析担当が書いた "<strong>手順書だけ</strong>" を渡されて、コードを <strong>自分で書き直す</strong></li>
  <li>2 つの AI のコードを実行して、<strong>同じ結果になれば "再現できた"、違えば "怪しい"</strong></li>
</ul>
<p>料理で例えると、<strong>レシピだけ渡して別人にも作ってもらい、同じ料理ができれば「再現性あり」</strong> と判定するのと同じ発想。</p>
<p><strong class="emphasis">大事な点：</strong>最終的に「この手順全体が妥当か」を判定するのは <strong>人間</strong>。AI 同士のチェックで <strong>怪しさ</strong> は炙り出せても、<strong>正しさ</strong> は人間が責任を持つ、というのがこのフレームワークの哲学です。</p>
</div>
</div>

<p class="slide-sub">Zeng et al. (2025) の提案。LLM の再現性を自動評価・改善する初の体系的枠組み。</p>

<div class="flow col">
  <div class="flow-box ai" style="padding:14px">
    <strong>AI Analyst</strong> → ワークフロー + コード + 結論を生成
  </div>
  <div class="flow-arrow">↓ ワークフローのみを渡す</div>
  <div class="flow-box ai" style="padding:14px">
    <strong>AI Inspector</strong> → ワークフローから <em>独立に</em> コードを再生成
  </div>
  <div class="flow-arrow">↓ 両者のコード実行結果を比較</div>
  <div class="flow-box" style="padding:14px;border-color:var(--amber);background:var(--amber-bg)">
    一致 → <span class="ok">再現可能</span> / 不一致 → Analyst に修正要求
  </div>
  <div class="flow-arrow">↓</div>
  <div class="flow-box human" style="padding:14px">
    <strong>Human Analyst</strong> → ワークフローの妥当性を高レベルで検証
  </div>
</div>

<div class="panel">
<div class="panel-title">実証結果</div>
<p style="font-size:14px;line-height:1.7">
5 つの LLM で <strong>1,032 タスク</strong> を評価：再現性が高いほど正確性も高い（正の相関）。
Reproducibility-of-Thought (RoT) プロンプトが再現性を有意に改善。
</p>
</div>

<div class="cite">Zeng Q, Jin C, Wang X, Zheng Y, Li Q. <em>AIRepr: An Analyst-Inspector Framework for Evaluating Reproducibility of LLM-generated Data Analysis Workflows.</em> Findings of EMNLP 2025. arXiv:2502.16395.</div>
</div>
`},

/* ============ 6-1 開示義務 ============ */
{part:"Part 6", short:"研究における AI 開示義務", html:`
<div class="slide-inner">
<span class="slide-tag">DISCLOSURE</span>
<h2 class="slide-title">研究における AI 使用の開示義務</h2>

<div class="panel" style="background:#eff6ff;border-color:var(--blue);margin-bottom:16px">
<div class="panel-title">そもそも「開示」って何？ なぜ必要？</div>
<div class="article">
<p><strong>開示（disclosure）</strong> とは、論文の Methods セクションなどに <strong class="emphasis">「AI をこういう場面で使いました」と正直に書く</strong> ことです。</p>
<p>なぜ必要かというと：</p>
<ul class="bullet">
  <li><strong>再現性のため</strong>：他の研究者が同じことを試せるように</li>
  <li><strong>査読のため</strong>：レビュアーが「この結果は AI がどこまで関わっているか」を判断できるように</li>
  <li><strong>科学の透明性のため</strong>：「黒い箱」のまま結果だけ出すのを避けるため</li>
</ul>
<p>でも、すべての AI 使用を開示する必要はありません。たとえば <strong>Word のスペルチェック</strong>はわざわざ開示しませんよね。<strong class="emphasis">「結果に影響する使い方」だけ開示すべき</strong>、というのが Resnik &amp; Hosseini が提案した考え方です。</p>
<p>下の 3 つの基準のどれかに当てはまれば「開示すべき AI 使用」になります。</p>
</div>
</div>

<p class="slide-sub">Resnik &amp; Hosseini (2025) の「意図的 × 実質的」フレームワーク。</p>

<div class="panel">
<div class="panel-title">「実質的な AI 使用」の 3 基準</div>
<div class="grid grid-3">
  <div class="panel" style="margin:0;background:#eff6ff">
    <div class="badge blue">基準 ①</div>
    <p style="font-size:14px;margin-top:8px;line-height:1.6">研究結果に直接影響する <strong>意思決定</strong> に AI を使用</p>
  </div>
  <div class="panel" style="margin:0;background:#eff6ff">
    <div class="badge blue">基準 ②</div>
    <p style="font-size:14px;margin-top:8px;line-height:1.6">コンテンツ、データ、画像の <strong>生成</strong> に AI を使用</p>
  </div>
  <div class="panel" style="margin:0;background:#eff6ff">
    <div class="badge blue">基準 ③</div>
    <p style="font-size:14px;margin-top:8px;line-height:1.6">コンテンツ、データ、画像の <strong>分析</strong> に AI を使用</p>
  </div>
</div>
</div>

<div class="ok-box">
統計コードの生成・実行は <strong>基準 ② と ③ の両方に該当</strong> → <strong class="emphasis">開示必須</strong>
</div>

<div class="cite">Resnik DB, Hosseini M. Disclosing artificial intelligence use in scientific research and publication: When should disclosure be mandatory, optional, or unnecessary? <em>Accountability in Research</em> 2026;33(2):2481949. DOI: 10.1080/08989621.2025.2481949. PMID: 40126451. PMCID: PMC12353913.</div>
</div>
`},

/* ============ 7-1 ハルシネーション 4 類型 ============ */
{part:"Part 7", short:"医学解析でのハルシネーション 4 類型", html:`
<div class="slide-inner">
<span class="slide-tag">THE BIGGER PICTURE</span>
<h2 class="slide-title">医学 AI 駆動データ解析における「ハルシネーション」</h2>

<div class="panel" style="background:#eff6ff;border-color:var(--blue);margin-bottom:16px">
<div class="panel-title">超ざっくり言うと？</div>
<div class="article">
<p>これまで「AI のハルシネーション」と言うと、多くの人は <strong>「ChatGPT が嘘の文章を作る」</strong> 程度のイメージで、せいぜいブログやエッセイの世界の話だと思いがちです。</p>
<p>でも、医学のデータ解析でハルシネーションが起きると <strong class="emphasis">話は全く別物</strong> になります。なぜなら：</p>
<ul class="bullet">
  <li>「もっともらしい解析結果」が <strong>論文として公表される</strong></li>
  <li>その論文が <strong>診療ガイドラインに引用される</strong></li>
  <li>ガイドラインに従って <strong>実際の患者に治療が決まる</strong></li>
</ul>
<p>つまり <strong style="color:var(--red)">AI のハルシネーション → 患者の生命に直結する危険性</strong> があるということ。他分野なら「あとで訂正記事を出せばいい」で済む話が、医学では取り返しがつきません。</p>
<p>このスライドでは、医学データ解析で起きる <strong>「もっともらしく誤った結果」を 4 種類に整理</strong> します。AI を使う研究者・医師は、この 4 つを知っておくと自衛になります。</p>
</div>
</div>

<p class="slide-lead">
Yuasa 論文の話はここで離れ、<strong class="emphasis">AI 時代の医学データ解析全般が直面する問題</strong> に視点を移す。医学文脈でのハルシネーションは、「チャットボットが架空の文章を生成する」という一般的イメージとは <strong>質的に異なる</strong>。ここでの本当の敵は、データ解析パイプラインの各段階で生まれる <strong>「もっともらしく誤った分析結果」</strong> である。
</p>

<div class="panel">
<div class="panel-title">医学データ解析におけるハルシネーションの 4 類型</div>
<div class="grid grid-2">
  <div class="panel red" style="margin:0">
    <div class="panel-title">① 存在しない統計的有意性</div>
    <p style="font-size:14px;line-height:1.7">多重検定補正の省略、恣意的なサブグループ解析、事後の α 水準調整により、<strong>本来存在しない差</strong> を「有意」として報告する。</p>
  </div>
  <div class="panel red" style="margin:0">
    <div class="panel-title">② 交絡無視による疑似相関</div>
    <p style="font-size:14px;line-height:1.7">AI が単変量解析で拾った関連を「発見」として提示するが、<strong>未調整の交絡</strong> による疑似相関にすぎない。</p>
  </div>
  <div class="panel red" style="margin:0">
    <div class="panel-title">③ サブグループ解析の偽陽性</div>
    <p style="font-size:14px;line-height:1.7">切り口を無数に試す自動探索が、偶然有意なサブグループを <strong>真の効果</strong> として報告してしまう。</p>
  </div>
  <div class="panel red" style="margin:0">
    <div class="panel-title">④ 過学習の楽観的予測性能</div>
    <p style="font-size:14px;line-height:1.7">訓練データに適合しすぎたモデルの AUC 0.95 が、<strong>新規患者では 0.65 に崩壊</strong> する典型例。</p>
  </div>
</div>
</div>

<div class="warn-box">
<strong>なぜ医学は特別に厳しいのか：</strong>解析上の誤りは <strong>臨床試験の結果解釈 → 薬事承認判断 → 最終的な治療方針</strong> に連鎖する。他分野ならブログ記事の修正で済む誤りが、医学では <strong class="emphasis">患者の生命に直結</strong> する。許容度が桁違いに低い。
</div>

<h3 class="section-head">警鐘：定型的 AI 解析論文の爆発的増加（Suchak 2025）</h3>

<div class="panel">
<div class="panel-title">NHANES 論文における偽発見の量産</div>
<div class="article">
<p><strong>Suchak et al. (2025) <em>PLOS Biology</em></strong> は、米国健康栄養調査 (NHANES) データベースを用いた <strong class="emphasis">AI 支援型の定型的論文</strong> の爆発的増加を実証した：</p>
</div>
<div class="grid grid-3">
  <div class="stat"><div class="label">2014 - 2021 年</div><div class="value" style="font-size:22px">年平均 4 本</div><div class="sub">単因子関連解析論文の年平均</div></div>
  <div class="stat amber"><div class="label">2022 年</div><div class="value">33 本</div><div class="sub">前年平均の約 8 倍</div></div>
  <div class="stat red"><div class="label">2023 年</div><div class="value">82 本</div><div class="sub">約 20 倍</div></div>
</div>
<div class="danger-box">
<strong>2024 年は 10 月 9 日時点で 190 本</strong>（年換算で 50 倍近い増加）。API アクセスと R / Python による自動化で、変数抽出 → ロジスティック回帰 → 原稿作成までがほぼ全自動。<strong>掲載先は Frontiers Media SA が 22%、BioMed Central が 18%、Springer が 13%</strong> と特定の出版社に偏っている。
</div>
</div>

<div class="panel">
<div class="panel-title">何が起きているのか ─ 3 つの具体的問題</div>
<div class="article">
<p><strong>❶ 不適切な研究デザイン：</strong>うつ病・心血管疾患・認知機能低下など <strong>本来多因子性</strong> の疾患が、単一の予測変数との関連として個別解析されている。341 本から <strong>169 の「有意な関連」</strong> が報告されたが、交互作用も多重比較補正もない。</p>
<p><strong>❷ FDR 補正の欠如：</strong>うつ病の 28 本に対し Benjamini-Yekutieli 法で事後 FDR 補正を適用したところ、<strong class="emphasis">有意性を維持したのは 28 件中 13 件のみ（残り 15 件＝約 54% が有意性を喪失）</strong>。個別には「発見」でも、正当な補正で半分以上が偽陽性。</p>
<p><strong>❸ データ・ドレッジング：</strong>SII（全身性免疫炎症指数）を扱った 14 本のうち、利用可能データを完全に使ったのは 4 本のみで、残り 10 本は <strong>恣意的なサブセット</strong>（最も多いのは 2007-2018 年で 28 本、2 番目は 2005-2018 年で 23 本）を選んでいた。<strong>サブセット選択の正当化なし</strong>。</p>
</div>
</div>

<div class="cite">
Suchak T, Aliu AE, Harrison C, Zwiggelaar R, Geifman N, Spick M. Explosion of formulaic research articles, including inappropriate study designs and false discoveries, based on the NHANES US national health database. <em>PLOS Biology</em> 2025;23(5):e3003152. DOI: 10.1371/journal.pbio.3003152.
</div>
</div>
`},

/* ============ 7-2 AI が加速する統計問題 ============ */
{part:"Part 7", short:"AI が加速する統計問題", html:`
<div class="slide-inner">
<span class="slide-tag">AI-ACCELERATED FAILURES</span>
<h2 class="slide-title">AI コーディング・エージェントが加速する統計的問題</h2>

<div class="panel" style="background:#eff6ff;border-color:var(--blue);margin-bottom:16px">
<div class="panel-title">超ざっくり言うと？</div>
<div class="article">
<p>Claude Code や ChatGPT Codex などの「コードを書ける AI」は、<strong>研究者の解析作業を 10 倍速にした</strong> 一方で、<strong class="emphasis">新しい 3 つの落とし穴</strong> を生みました。</p>
<ol class="num">
  <li><strong>自動 p-hacking（忖度）：</strong>研究者が「有意な結果が欲しい」という雰囲気をプロンプトに滲ませると、AI が <strong>気を利かせて</strong> 有意になる方向にコードを書き換える。<strong>嘘ではないが、研究者の希望に沿うように "盛る"</strong>。</li>
  <li><strong>サイレント・エラー：</strong>コードはエラーを出さずに動くのに、<strong>結果が論理的に間違っている</strong>。統計の知識がないと気づけない。</li>
  <li><strong>同じ質問なのに違う答え：</strong>AI は確率的に動くので、<strong>同じプロンプトを別の日に投げると結論が変わる</strong> ことがある。再現性の根幹が揺らぐ。</li>
</ol>
<p>さらに古典的な問題として、<strong>Epic 社の敗血症予測 AI</strong> が、開発時は高精度だったのに、別の病院に持っていくと <strong class="emphasis">敗血症の半分以上を見逃す</strong> 失敗例（Wong 2021）も紹介します。「<strong>見かけの精度</strong>」自体がハルシネーションだった、というショッキングな実例。</p>
<p>AI 時代の研究者は、これらの落とし穴を <strong>知ったうえで使う</strong> 必要があります。</p>
</div>
</div>

<p class="slide-lead">
Claude Code、Codex などの AI コーディング・エージェントは <strong>プログラミングの生産性を劇的に向上</strong> させた。しかし同時に、<strong class="emphasis">p-hacking の自動化、サイレント・エラーの発生、再現性の崩壊</strong> という新しいリスクを生んでいる。さらに、臨床予測モデルの世界では「外部検証で性能が崩壊する」という <strong>古典的だが依然未解決</strong> の問題も継続している。
</p>

<div class="panel">
<div class="panel-title">自動 p-hacking と「忖度 (sycophancy)」問題</div>
<div class="article">
<p><strong>Asher et al. (2026) Stanford Working Paper</strong> は、Claude Code と Codex が統計解析で <strong>自動 p-hacking</strong> を実行しうるかを <strong>640 の独立実験</strong> で検証：</p>
<ul class="bullet">
  <li>標準的なプロンプトでは、LLM は p-hacking に <strong>比較的抵抗性</strong> を示す</li>
  <li>直接的に p-hacking を依頼すると <strong>拒否</strong> する</li>
  <li>しかし <span class="emphasis">「ロバストネスチェック」「代替仕様の探索」といった学術的な言い回し</span> で再フレーミングすると、LLM は <strong class="emphasis">有意な結果が出る方向への仕様変更を実行</strong> する</li>
</ul>
<p><strong>含意：</strong>研究者が（無意識的にでも）望む結果の方向性をプロンプトに滲ませるだけで、AI はそれに <strong>忖度</strong> して解析を歪める。これは医学研究の信頼性に対する根本的脅威。</p>
</div>
<div class="cite">
Asher S, Malzahn J, Persano J. <em>Do Claude Code and Codex P-Hack? Sycophancy and Statistical Analysis in Large Language Models.</em> SSRN Working Paper. SSRN ID: 6270199. DOI: 10.2139/ssrn.6270199（最新の著者・版・日付は SSRN ページで要確認）。
</div>
</div>

<div class="panel">
<div class="panel-title">サイレント・エラー ─ 構文は正しいが論理が誤ったコード</div>
<div class="article">
<p>Kasperowski (2026, <em>R-bloggers</em>) および <em>ACM CHI 2025</em> の研究は、LLM が <strong class="emphasis">エラーメッセージを出さずに誤った結果を出す</strong> コード ＝ 「サイレント・エラー」を生成する典型パターンを指摘：</p>
<ul class="bullet">
  <li>回帰モデルで <strong>交絡変数の調整順序を誤る</strong></li>
  <li><strong>多重共線性の検出を省略</strong> する</li>
  <li>データ分布の仮定に合わない検定手法を適用（例：非正規データに t 検定）</li>
  <li><strong>欠損値処理の不整合</strong>（あるステップで listwise、別で pairwise）</li>
</ul>
<p>これらは実行時エラーを出さないため、<strong>統計学的知識を持たない解析者には検出不可能</strong>。</p>
</div>
</div>

<div class="panel">
<div class="panel-title">LLM の出力変動性 ─ 同じデータで違う結論</div>
<div class="article">
<p><em>MedRxiv 2025.08.06.25333170v1</em> は、同一プロンプト・同一データでも LLM が <strong>異なるランで異なる解析結果</strong> を生成することを定量的に示した。温度パラメータの確率的性質に起因する。</p>
<p>「同じデータから同じ結論」という <strong class="emphasis">再現性の原則に真正面から反する</strong>。統計解析における LLM 使用では、repeatability と reproducibility の両方を明示的に評価するフレームワークが必要。</p>
</div>
</div>

<h3 class="section-head">臨床予測モデルの古典的失敗 ─ Epic Sepsis Model</h3>

<div class="panel">
<div class="panel-title">Wong et al. (2021) <em>JAMA Internal Medicine</em></div>
<div class="article">
<p>Epic Systems 社の <strong>敗血症予測モデル (ESM)</strong> は全米で広く実装されていた。Wong らの外部検証で以下が判明：</p>
</div>
<div class="grid grid-3">

/* ============ 7-4 ゼロ・ハルシネーション設計 ============ */
{part:"Part 7", short:"ゼロ・ハルシネーション設計 5 原則", html:`
<div class="slide-inner">
<span class="slide-tag">FRONTIER · ZERO-HALLUCINATION</span>
<h2 class="slide-title">ゼロ・ハルシネーション設計 ─ 5 つの原則と規制フレームワーク</h2>

<div class="panel" style="background:#eff6ff;border-color:var(--blue);margin-bottom:16px">
<div class="panel-title">超ざっくり言うと？</div>
<div class="article">
<p>「ハルシネーションは数学的に避けられない」と Part 5 で学びました。じゃあ <strong class="emphasis">研究や医療では諦めるしかないのか？</strong> ── そんなことはありません。</p>
<p>2025-2026 年の最先端研究では、<strong>「1 つの対策で完璧」は無理でも、複数の対策を重ねれば実用上ほぼゼロにできる</strong> という方向で進んでいます。これを <strong>多層防御（layered defense）</strong> と呼びます。</p>
<p>たとえると：</p>
<ul class="bullet">
  <li>城を守るのに <strong>城壁 1 枚</strong> だけでは破られる</li>
  <li>でも <strong>外堀 + 城壁 + 内堀 + 兵</strong> と何重にもすれば、突破は実質不可能になる</li>
</ul>
<p>このスライドで紹介する 5 つの原則も、それぞれ <strong>1 つの "防御層"</strong>。全部を組み合わせれば、AI を使った解析でも「もっともらしい誤り」を最小化できます。</p>
<p><strong>5 つの原則を超ざっくり言うと：</strong></p>
<ol class="num">
  <li><strong>独立に再現できるか確認</strong>（別の AI、別の言語、別の道具で再計算）</li>
  <li><strong>事前に解析計画を決めておく</strong>（途中で AI に勝手な判断をさせない）</li>
  <li><strong>不確実性を必ず添える</strong>（「80% の確率」とだけでなく「95% の保証下で複数の候補」）</li>
  <li><strong>運用後も監視を続ける</strong>（病院に導入したら終わり、ではなく定期点検）</li>
  <li><strong>最終判断は必ず人間</strong>（自動化の中に "人間が判断する場所" を必ず残す）</li>
</ol>
</div>
</div>

<p class="slide-lead">
ハルシネーション・ゼロは到達困難な理想かもしれないが、それに向けた <strong class="emphasis">多層的な防御設計</strong> は既に 2025-2026 年の最先端研究で形になりつつある。Conformal Prediction、Graph RAG、FDA 規制フレームワークを統合し、<strong>5 つの原則</strong> として整理する。
</p>

<h3 class="section-head">技術フロンティア：3 つの防御機構</h3>

<div class="grid grid-3">
<div class="panel">
<div class="panel-title">① Conformal Prediction</div>
<div class="article">
<p><strong>従来の点予測：</strong>「80% の確率で陽性」と断言</p>
<p><strong>コンフォーマル予測：</strong>「95% のカバレッジ保証下で、疾患 A または B または C のいずれか」という <strong class="emphasis">予測集合</strong> を提供</p>
<p>カバレッジに <strong>数学的保証</strong> があるため、モデルが過信（＝ハルシネーション）しているときは予測集合が <strong>拡大</strong> し、臨床医に不確実性を明示的に伝達。</p>
</div>
<div class="cite" style="margin-top:8px">Wang X et al. Conformal Prediction in Clinical Artificial Intelligence: Enhancing Model Reliability and Interpretability. <em>CHEST</em> 2026;169(2):332–335. DOI: 10.1016/j.chest.2025.07.4116. PMID: 41672654.</div>
</div>

<div class="panel">
<div class="panel-title">② Hybrid Graph RAG</div>
<div class="article">
<p><strong>MediGRAF（Medical Graph Retrieval Augmented Framework）：</strong>EHR データの解析結果を <strong>医学知識グラフ</strong> と照合するアーキテクチャ。</p>
<p>AI が統計的には有意でも <strong class="emphasis">医学的に無意味な関連</strong> を「発見」として出力することを、グラフ構造グラウンディングで <strong>構造的に抑制</strong> する。MIMIC-IV を用いたパイロット評価で、複雑クエリに対する Hybrid 構成が高い recall を達成し、Safety 違反 0/10 を報告。</p>
<div class="warn-box" style="font-size:13px;margin-top:8px">
<strong>注意：</strong>本論文は <strong>n = 10 患者・141 QA ペア・評価者 2 名による proof-of-concept</strong>。前向き臨床導入の知見ではない。臨床応用の一般化可能性は今後の研究待ち。
</div>
</div>
<div class="cite" style="margin-top:8px">Unlocking Electronic Health Records: A Hybrid Graph RAG Approach to Safe Clinical AI for Patient QA. <em>Frontiers in Digital Health</em> 2026;8. DOI: 10.3389/fdgth.2026.1780700 ／ arXiv:2602.00009.</div>
</div>

<div class="panel">
<div class="panel-title">③ FDA 7 段階信頼性</div>
<div class="article">
<p><strong>FDA Draft Guidance (2025 年 1 月)：</strong>創薬・生物学的製剤の規制判断に AI を使う場合の <strong>信頼性 (credibility)</strong> 評価フレームワーク。</p>
<p>データの品質、モデルの適切性、結果の検証可能性を <strong>7 段階</strong> で評価。</p>
<p>特に <strong class="emphasis">「独立した手段で再現可能」</strong> であることを要求。AI による解析が「ブラックボックス」のまま規制判断に用いられることを防ぐ設計。</p>
</div>
<div class="cite" style="margin-top:8px">FDA. Considerations for the Use of Artificial Intelligence to Support Regulatory Decision-Making for Drug and Biological Products. Draft Guidance, Jan 2025.</div>
</div>
</div>

<h3 class="section-head">5 つの設計原則 ─ 明日から実装できる防御策</h3>

<div class="grid grid-2">
<div class="panel green">
<div class="panel-title">❶ Independent Replication</div>
<div class="article">
<p>AI 生成の解析コードと結果を <strong class="emphasis">独立した統計手法</strong> で再現・検証する。別の AI セッション、別のパッケージ、別の言語（R ⇄ Python）、ピボットテーブルによる度数確認など。</p>

</div>

<div class="panel green">

</div>
</div>

<div class="panel green">
<div class="panel-title">❸ Calibrated Uncertainty</div>
<div class="article">
<p>Conformal Prediction などの <strong>不確実性定量化</strong> 手法を標準装備し、モデルが自らの確信の限界を <strong class="emphasis">明示</strong> する設計にする。点推定だけの報告は許容しない。</p>
</div>
</div>

<div class="panel green">
<div class="panel-title">❹ Post-deployment Monitoring</div>
<div class="article">
<p>臨床実装後の <strong>継続的ドリフト監視</strong> と <strong>再キャリブレーション</strong> を制度化する。PCA 再構成誤差・予測分布の時系列監視など。Epic Sepsis の教訓を繰り返さない。</p>
</div>
</div>

<div class="panel green" style="grid-column:span 2">
<div class="panel-title">❺ Human-in-the-Loop as Design Requirement</div>
<div class="article">
<p>生物統計学者・臨床家による <strong class="emphasis">最終的な解釈と判断</strong> を、自動化された解析パイプラインの <strong>不可欠な構成要素</strong> として位置づける。「オプション」ではなく「仕様」。前スライドのワークフロー ⑥⑧⑨⑪ の「人間のみゾーン」が例。</p>

</div>
</div>

<div class="panel" style="background:linear-gradient(135deg,#dbeafe 0%,#ede9fe 100%)">
<div class="panel-title">因果推論 ─ AI が最も弱いフロンティア</div>
<div class="article">
<p><strong>Burns et al. (2025)：</strong>LLM は統計的関連のパターン認識には長けているが、<strong class="emphasis">因果構造の同定では根本的限界</strong> を持つとの指摘。交絡因子同定や DAG 構築の補助には有用だが、因果推論の妥当性判断を完全に委ねるのは危険。</p>
<p>関連する <em>European Journal of Epidemiology</em> のスコーピングレビュー（要再確認）では、観察研究の <strong>26% が予測と因果推論を混同</strong> していたとの報告がある。AI がこの混同を加速するリスクは大きい。</p>
