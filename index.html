/* ============================================================
   ナビゲーション
============================================================ */
let current = 0;
let readingMode = false;
const slidesEl = document.getElementById('slides');
const tocEl = document.getElementById('toc');

function buildSlides(){
  slidesEl.innerHTML = '';
  SLIDES.forEach((s,i) => {
    const div = document.createElement('div');
    div.className = 'slide';
    div.dataset.idx = i;
    if(readingMode){
      div.innerHTML = `<div class="slide-anchor">▎ ${String(i+1).padStart(2,'0')} / ${SLIDES.length} ・ ${s.part}</div>${s.html}`;
    } else {
      div.innerHTML = s.html;
    }
    slidesEl.appendChild(div);
  });
  enhanceContent(slidesEl);
}

/* ============================================================
   コピーボタン自動付与 + スクショ自動読み込み
============================================================ */
function enhanceContent(root){
  if(!root) return;
  // pre にコピーボタン追加（pre.output は実行結果なので除外）
  root.querySelectorAll('pre:not(.output)').forEach(pre => {
    if(pre.dataset.enhanced) return;
    pre.dataset.enhanced = '1';
    const btn = document.createElement('button');
    btn.className = 'copy-btn';
    btn.type = 'button';
    btn.textContent = '📋 コピー';
    btn.onclick = (e) => {
      e.stopPropagation();
      // ボタン自身のテキストを除外してプレーンテキスト化
      const clone = pre.cloneNode(true);
      clone.querySelectorAll('.copy-btn').forEach(b => b.remove());
      const text = clone.innerText;
      navigator.clipboard.writeText(text).then(() => {
        btn.textContent = '✓ コピー済';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = '📋 コピー';
          btn.classList.remove('copied');
        }, 1800);
      }).catch(() => {
        btn.textContent = '⚠ 失敗';
        setTimeout(() => { btn.textContent = '📋 コピー'; }, 1800);
      });
    };
    pre.appendChild(btn);
  });
  // スクショ枠に画像があれば差し替え
  root.querySelectorAll('figure.screenshot.empty[data-src]').forEach(fig => {
    if(fig.dataset.tried) return;
    fig.dataset.tried = '1';
    const src = fig.dataset.src;
    const cap = fig.dataset.caption || '';
    const alt = fig.dataset.alt || cap;
    const img = new Image();
    img.onload = () => {
      fig.classList.remove('empty');
      fig.classList.add('loaded');
      fig.innerHTML = `<img src="${src}" alt="${alt.replace(/"/g,'&quot;')}">${cap ? `<figcaption>${cap}</figcaption>` : ''}`;
    };
    img.onerror = () => { /* プレースホルダーのまま */ };
    img.src = src;
  });
}

function buildToc(){
  tocEl.innerHTML = '';
  const parts = {};
  SLIDES.forEach((s,i) => {
    if(!parts[s.part]) parts[s.part] = [];
    parts[s.part].push({idx:i, title:s.short});
  });
  for(const part in parts){
    const wrap = document.createElement('div');
    wrap.className = 'toc-part';
    if(part !== '序章' || !parts[part][0].title.includes('表紙')){
      const title = document.createElement('div');
      title.className = 'toc-title';
      title.textContent = part;
      wrap.appendChild(title);
    } else {
      const title = document.createElement('div');
      title.className = 'toc-title';
      title.textContent = part;
      wrap.appendChild(title);
    }
    parts[part].forEach(item => {
      if(item.title.startsWith('━━')) return;
      const btn = document.createElement('div');
      btn.className = 'toc-item';
      btn.dataset.idx = item.idx;
      btn.innerHTML = `<span class="toc-num">${String(item.idx+1).padStart(2,'0')}</span><span>${item.title}</span>`;
      btn.onclick = () => goTo(item.idx);
      wrap.appendChild(btn);
    });
    tocEl.appendChild(wrap);
  }
}

function goTo(idx){
  if(idx < 0 || idx >= SLIDES.length) return;
  if(readingMode){
    const target = document.querySelector(`.slide[data-idx="${idx}"]`);
    if(target) target.scrollIntoView({behavior:'smooth', block:'start'});
    setActive(idx);
    return;
  }
  document.querySelectorAll('.slide').forEach(s => s.classList.remove('active'));
  const slideEl = document.querySelector(`.slide[data-idx="${idx}"]`);
  if(!slideEl) return;
  slideEl.classList.add('active');
  slideEl.scrollTop = 0;
  setActive(idx);
  current = idx;
  document.getElementById('counter').textContent = `${idx+1} / ${SLIDES.length}`;
  document.getElementById('progress-bar').style.width = `${((idx+1)/SLIDES.length)*100}%`;
  document.getElementById('prev').disabled = idx === 0;
  document.getElementById('next').disabled = idx === SLIDES.length-1;
  setTimeout(() => {
    if(SLIDES[idx].onShow) try { SLIDES[idx].onShow(); } catch(e){ console.warn(e); }
    if(window.MathJax && window.MathJax.typesetPromise) window.MathJax.typesetPromise([slideEl]);
  }, 50);
  document.getElementById('sidebar').classList.remove('open');
}

function setActive(idx){
  document.querySelectorAll('.toc-item').forEach(t => t.classList.remove('active'));
  const tocItem = document.querySelector(`.toc-item[data-idx="${idx}"]`);
  if(tocItem){
    tocItem.classList.add('active');
    tocItem.scrollIntoView({behavior:'smooth', block:'nearest'});
  }
}

function setReadingMode(on){
  readingMode = on;
  document.body.classList.toggle('reading-mode', on);
  const lbl = on ? '🎞 スライドモード' : '📖 読み物モード';
  ['modeToggle','sbModeToggle'].forEach(id => {
    const el = document.getElementById(id);
    if(el){ el.classList.toggle('on', on); el.textContent = lbl; }
  });
  buildSlides();
  if(on){
    // 全スライドを一度可視化（Chart.js 等を発火）
    document.querySelectorAll('.slide').forEach(s => s.classList.add('active'));
    setTimeout(() => {
      SLIDES.forEach((s,i) => {
        if(s.onShow){
          try { s.onShow(); } catch(e){ console.warn(e); }
        }
      });
      if(window.MathJax && window.MathJax.typesetPromise) window.MathJax.typesetPromise();
    }, 50);
    // スクロール監視で TOC ハイライト
    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if(e.isIntersecting){
          const idx = parseInt(e.target.dataset.idx, 10);
          setActive(idx);
          current = idx;
          document.getElementById('counter').textContent = `${idx+1} / ${SLIDES.length}`;
        }
      });
    }, {rootMargin:"-30% 0px -60% 0px"});
    document.querySelectorAll('.slide').forEach(s => obs.observe(s));
    window._readingObs = obs;
  } else {
    if(window._readingObs){ window._readingObs.disconnect(); window._readingObs = null; }
    goTo(current);
  }
  localStorage.setItem('readingMode', on ? '1' : '0');
}

document.getElementById('prev').onclick = () => goTo(current - 1);
document.getElementById('next').onclick = () => goTo(current + 1);
document.getElementById('modeToggle').onclick = () => setReadingMode(!readingMode);

/* サイドバー側の同等ボタン（モバイル時に主に使用） */
const sbModeBtn = document.getElementById('sbModeToggle');
if(sbModeBtn) sbModeBtn.onclick = () => setReadingMode(!readingMode);

/* ============================================================
   フォントサイズ制御
============================================================ */
const FS_LEVELS = [0.85, 0.95, 1.0, 1.15, 1.3, 1.5, 1.75];
let fsIdx = parseInt(localStorage.getItem('fsIdx') ?? '2');
function applyFs(){
  fsIdx = Math.max(0, Math.min(FS_LEVELS.length-1, fsIdx));
  document.documentElement.style.setProperty('--fs-mul', FS_LEVELS[fsIdx]);
  localStorage.setItem('fsIdx', fsIdx);
}
function bindFs(minusId, resetId, plusId){
  const m = document.getElementById(minusId);
  const r = document.getElementById(resetId);
  const p = document.getElementById(plusId);
  if(m) m.onclick = () => { fsIdx--; applyFs(); };
  if(p) p.onclick = () => { fsIdx++; applyFs(); };
  if(r) r.onclick = () => { fsIdx = 2; applyFs(); };
}
bindFs('fsMinus','fsReset','fsPlus');
bindFs('sbFsMinus','sbFsReset','sbFsPlus');
applyFs();

/* ============================================================
   キーボード
============================================================ */
document.addEventListener('keydown', e => {
  if(e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if(readingMode) return; // 読み物モードでは矢印キーはスクロール委譲
  if(e.key === 'ArrowRight' || e.key === 'PageDown' || e.key === ' ') { e.preventDefault(); goTo(current+1); }
  else if(e.key === 'ArrowLeft' || e.key === 'PageUp') { e.preventDefault(); goTo(current-1); }
  else if(e.key === 'Home') goTo(0);
  else if(e.key === 'End') goTo(SLIDES.length-1);
  else if(e.key === 'f' || e.key === 'F'){
    if(!document.fullscreenElement) document.documentElement.requestFullscreen();
    else document.exitFullscreen();
  }
});

/* ============================================================
   初期表示
============================================================ */
buildToc();
buildSlides();
const savedMode = localStorage.getItem('readingMode') === '1';
if(savedMode) setReadingMode(true);
else goTo(0);
</script>
</body>
</html>
