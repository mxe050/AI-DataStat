<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI時代のデータ解析 ─ Yuasa 2002 を題材に</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script>window.MathJax = {tex: {inlineMath: [['$','$'],['\\(','\\)']], displayMath: [['$$','$$'],['\\[','\\]']]}};</script>

<style>
:root{
  --bg:#0b1020; --bg2:#131a36; --panel:#171e42; --panel2:#1f2752;
  --text:#e8ecff; --muted:#9aa3c7; --accent:#6ea8ff; --accent2:#ffb86b;
  --ok:#4ade80; --bad:#f87171; --warn:#fbbf24; --purple:#a78bfa;
  --line:rgba(255,255,255,0.08); --shadow:0 10px 40px rgba(0,0,0,0.5);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);
  font-family:"Helvetica Neue","Hiragino Kaku Gothic ProN","Yu Gothic UI","Meiryo",system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;font-feature-settings:"palt";font-size:17px;line-height:1.65}
#app{display:grid;grid-template-columns:290px 1fr;height:100vh;width:100vw}

/* Sidebar */
#sidebar{background:linear-gradient(180deg,#0a1028,#0d1432);border-right:1px solid var(--line);
  overflow-y:auto;padding:20px 0;transition:transform 0.3s}
#sidebar::-webkit-scrollbar{width:6px}
#sidebar::-webkit-scrollbar-thumb{background:#2a3470;border-radius:3px}
.brand{padding:0 22px 18px;border-bottom:1px solid var(--line)}
.brand h1{font-size:17px;font-weight:700;line-height:1.4;color:#fff}
.brand p{font-size:13px;color:var(--muted);margin-top:6px;line-height:1.5}
.brand .gh{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--accent);
  margin-top:8px;padding:4px 8px;background:rgba(110,168,255,0.1);border-radius:6px;
  text-decoration:none;font-family:monospace}
.toc{padding:16px 10px}
.toc-part{margin-bottom:8px}
.toc-title{font-size:12px;font-weight:700;color:var(--accent);padding:10px 12px 6px;
  text-transform:uppercase;letter-spacing:1px}
.toc-item{display:flex;gap:10px;padding:9px 14px;font-size:14px;color:var(--muted);
  border-radius:6px;cursor:pointer;transition:all 0.15s;border-left:2px solid transparent;line-height:1.4}
.toc-item:hover{background:var(--panel);color:var(--text)}
.toc-item.active{background:rgba(110,168,255,0.14);color:#fff;border-left-color:var(--accent)}
.toc-num{font-variant-numeric:tabular-nums;color:var(--muted);min-width:24px;font-size:12px}
.toc-item.active .toc-num{color:var(--accent)}

/* Main stage */
#stage{position:relative;overflow:hidden;background:
  radial-gradient(ellipse at top,var(--bg2),var(--bg) 60%)}
#slides{position:relative;height:100%;width:100%}
.slide{position:absolute;inset:0;padding:54px 80px 90px;overflow-y:auto;
  opacity:0;pointer-events:none;transform:translateX(30px);
  transition:opacity 0.35s ease,transform 0.35s ease}
.slide.active{opacity:1;pointer-events:auto;transform:translateX(0)}
.slide::-webkit-scrollbar{width:10px}
.slide::-webkit-scrollbar-thumb{background:#2a3470;border-radius:5px}

/* Slide header */
.slide-tag{display:inline-block;font-size:13px;font-weight:700;color:var(--accent);
  background:rgba(110,168,255,0.14);padding:5px 13px;border-radius:999px;margin-bottom:14px;
  letter-spacing:1.5px}
h2.slide-title{font-size:40px;font-weight:800;line-height:1.25;margin-bottom:10px;
  background:linear-gradient(90deg,#fff,#b9c6ff);-webkit-background-clip:text;background-clip:text;
  color:transparent}
.slide-sub{font-size:18px;color:var(--muted);margin-bottom:28px;line-height:1.6}

/* Content blocks */
.panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;
  padding:22px 24px;margin-bottom:16px;box-shadow:var(--shadow)}
.panel.tight{padding:14px 16px}
.panel p{font-size:16px;line-height:1.7}
.panel-title{font-size:14px;font-weight:700;color:var(--accent2);text-transform:uppercase;
  letter-spacing:1.2px;margin-bottom:14px;display:flex;align-items:center;gap:10px}
.panel-title::before{content:"";width:5px;height:16px;background:var(--accent2);border-radius:2px}
.grid{display:grid;gap:16px}
.grid-2{grid-template-columns:1fr 1fr}
.grid-3{grid-template-columns:repeat(3,1fr)}
.grid-4{grid-template-columns:repeat(4,1fr)}
.grid-ab{grid-template-columns:1fr 1.4fr}
@media (max-width:1100px){.grid-2,.grid-3,.grid-4,.grid-ab{grid-template-columns:1fr}}

/* Tables */
table{width:100%;border-collapse:separate;border-spacing:0;font-size:15px;
  background:var(--panel2);border-radius:10px;overflow:hidden}
th,td{padding:11px 14px;text-align:left;border-bottom:1px solid var(--line);line-height:1.5}
th{background:rgba(110,168,255,0.08);font-size:12px;text-transform:uppercase;letter-spacing:1px;
  color:var(--accent);font-weight:700}
tr:last-child td{border-bottom:none}
td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
td.center,th.center{text-align:center}
.bad{color:var(--bad);font-weight:700}
.ok{color:var(--ok);font-weight:700}
.warn{color:var(--warn);font-weight:700}
.hi{color:var(--accent2);font-weight:700}

/* Lists */
ul.bullet{list-style:none;padding-left:0}
ul.bullet li{padding:8px 0 8px 26px;position:relative;font-size:15px;line-height:1.65}
ul.bullet li::before{content:"▸";position:absolute;left:4px;color:var(--accent);font-size:16px}
ol.num{padding-left:26px}
ol.num li{padding:7px 0;font-size:15px;line-height:1.65}

/* Badges & quotes */
.badge{display:inline-block;padding:4px 10px;border-radius:6px;font-size:12px;
  font-weight:700;margin-right:6px}
.badge.red{background:rgba(248,113,113,0.15);color:var(--bad)}
.badge.green{background:rgba(74,222,128,0.15);color:var(--ok)}
.badge.blue{background:rgba(110,168,255,0.15);color:var(--accent)}
.badge.amber{background:rgba(251,191,36,0.15);color:var(--warn)}
.quote{border-left:5px solid var(--accent2);padding:14px 20px;background:rgba(255,184,107,0.06);
  font-style:italic;font-size:17px;line-height:1.7;border-radius:0 8px 8px 0;margin:14px 0}
.cite{font-size:13px;color:var(--muted);margin-top:10px;font-style:italic;line-height:1.5}

/* Code */
code,pre{font-family:"JetBrains Mono","Consolas","SF Mono",monospace}
pre{background:#0a0f26;border:1px solid var(--line);border-radius:10px;padding:16px 18px;
  overflow-x:auto;font-size:14px;line-height:1.65;color:#d6deff}
code{background:rgba(110,168,255,0.12);padding:3px 7px;border-radius:4px;font-size:14px;color:#b9c6ff}
pre code{background:none;padding:0;color:inherit}
.kw{color:#c084fc}
.str{color:#86efac}
.com{color:#64748b;font-style:italic}
.num{color:#fbbf24}

/* Stat card */
.stat{background:linear-gradient(135deg,var(--panel),var(--panel2));padding:20px 22px;
  border-radius:12px;border:1px solid var(--line)}
.stat .label{font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:1.2px}
.stat .value{font-size:34px;font-weight:800;line-height:1.2;margin-top:6px;
  background:linear-gradient(90deg,#6ea8ff,#a78bfa);-webkit-background-clip:text;background-clip:text;color:transparent}
.stat .sub{font-size:13px;color:var(--muted);margin-top:6px;line-height:1.5}

/* Visual diagram boxes */
.flow{display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap;padding:12px 0}
.flow-box{background:var(--panel2);border:1px solid var(--line);padding:12px 18px;border-radius:10px;
  font-size:14px;text-align:center;min-width:130px;line-height:1.5}
.flow-box.ai{border-color:var(--purple);background:rgba(167,139,250,0.1)}
.flow-box.human{border-color:var(--ok);background:rgba(74,222,128,0.08)}
.flow-arrow{color:var(--accent);font-size:22px}

/* Controls */
#controls{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);
  display:flex;align-items:center;gap:14px;background:rgba(23,30,66,0.92);
  border:1px solid var(--line);padding:10px 20px;border-radius:999px;backdrop-filter:blur(8px);z-index:10}
.ctrl-btn{background:transparent;border:none;color:var(--text);padding:8px 14px;
  border-radius:999px;cursor:pointer;font-size:15px;transition:background 0.15s}
.ctrl-btn:hover{background:rgba(110,168,255,0.14)}
.ctrl-btn:disabled{opacity:0.3;cursor:not-allowed}
.counter{font-size:14px;color:var(--muted);font-variant-numeric:tabular-nums;min-width:70px;text-align:center}
#progress{position:absolute;top:0;left:0;right:0;height:4px;background:rgba(255,255,255,0.04);z-index:10}
#progress-bar{height:100%;background:linear-gradient(90deg,var(--accent),var(--purple));
  transition:width 0.3s;width:0%}

/* Title slide */
.title-slide{display:flex;flex-direction:column;justify-content:center;align-items:center;
  text-align:center;padding:40px}
.title-slide h1{font-size:72px;font-weight:900;line-height:1.1;letter-spacing:-2px;
  background:linear-gradient(135deg,#fff 0%,#6ea8ff 50%,#a78bfa 100%);
  -webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:22px}
.title-slide .lead{font-size:24px;color:var(--muted);max-width:900px;line-height:1.6;margin-bottom:34px}
.title-slide .meta{font-size:15px;color:var(--muted);margin-top:44px;line-height:1.7}
.title-deco{font-size:16px;letter-spacing:14px;color:var(--accent);
  text-transform:uppercase;margin-bottom:20px;opacity:0.8}

/* Section divider */
.section-slide{display:flex;flex-direction:column;justify-content:center;height:100%}
.section-slide .part-num{font-size:150px;font-weight:900;line-height:1;
  background:linear-gradient(135deg,var(--accent) 0%,var(--purple) 100%);
  -webkit-background-clip:text;background-clip:text;color:transparent;opacity:0.3;margin-bottom:-50px}
.section-slide h2{font-size:64px;font-weight:900;line-height:1.15;margin-bottom:22px}
.section-slide .section-desc{font-size:22px;color:var(--muted);max-width:820px;line-height:1.6}

/* Interactive */
.slider-container{background:var(--panel2);padding:14px 16px;border-radius:10px;margin:10px 0}
.slider-container label{display:flex;justify-content:space-between;font-size:12px;margin-bottom:8px;color:var(--muted)}
.slider-container input[type=range]{width:100%;accent-color:var(--accent)}
.chart-wrap{background:var(--panel2);padding:14px;border-radius:10px;position:relative;height:240px}
.chart-wrap.tall{height:320px}

/* Highlight pill */
.highlight-row{background:rgba(251,191,36,0.08) !important}
.highlight-row td{color:#ffe4a0}

/* Comparison */
.vs-grid{display:grid;grid-template-columns:1fr auto 1fr;gap:14px;align-items:stretch}
.vs-box{padding:14px 16px;border-radius:10px;border:1px solid var(--line)}
.vs-box.old{background:rgba(248,113,113,0.05);border-color:rgba(248,113,113,0.3)}
.vs-box.new{background:rgba(74,222,128,0.05);border-color:rgba(74,222,128,0.3)}
.vs-box h4{font-size:13px;margin-bottom:8px;font-weight:700}
.vs-box.old h4{color:var(--bad)}
.vs-box.new h4{color:var(--ok)}
.vs-box ul.bullet li{font-size:12px;padding:4px 0 4px 18px}
.vs-divider{display:flex;align-items:center;justify-content:center;font-size:18px;
  font-weight:900;color:var(--accent);padding:0 4px}

/* Tabs */
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--line);margin-bottom:12px}
.tab{padding:8px 14px;font-size:12px;color:var(--muted);cursor:pointer;
  border-bottom:2px solid transparent;transition:all 0.15s}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-content{display:none}
.tab-content.active{display:block}

/* Keyboard hint */
.kbd{display:inline-block;padding:2px 6px;background:var(--panel2);border:1px solid var(--line);
  border-radius:4px;font-size:10px;font-family:"JetBrains Mono",monospace;color:var(--muted)}

/* Data table scroll */
.data-scroll{max-height:300px;overflow-y:auto;border-radius:10px}
.data-scroll table{font-size:11px}
.data-scroll th,.data-scroll td{padding:5px 8px}
.data-scroll::-webkit-scrollbar{width:6px}
.data-scroll::-webkit-scrollbar-thumb{background:#2a3470;border-radius:3px}

/* Annotations */
.note-box{background:rgba(110,168,255,0.06);border-left:4px solid var(--accent);
  padding:14px 18px;border-radius:0 10px 10px 0;font-size:15px;line-height:1.7;color:#c5d2ff;margin:12px 0}
.note-box::before{content:"💡";margin-right:8px}
.warn-box{background:rgba(251,191,36,0.07);border-left:4px solid var(--warn);
  padding:14px 18px;border-radius:0 10px 10px 0;font-size:15px;line-height:1.7;color:#ffe4a0;margin:12px 0}
.warn-box::before{content:"⚠️";margin-right:8px}
.danger-box{background:rgba(248,113,113,0.07);border-left:4px solid var(--bad);
  padding:14px 18px;border-radius:0 10px 10px 0;font-size:15px;line-height:1.7;color:#fecaca;margin:12px 0}
.danger-box::before{content:"🚫";margin-right:8px}
.ok-box{background:rgba(74,222,128,0.07);border-left:4px solid var(--ok);
  padding:14px 18px;border-radius:0 10px 10px 0;font-size:15px;line-height:1.7;color:#bbf7d0;margin:12px 0}
.ok-box::before{content:"✓";margin-right:8px}

/* SVG diagrams */
.svg-wrap{background:var(--panel2);border-radius:12px;padding:16px;margin:10px 0;
  display:flex;justify-content:center;align-items:center}
.svg-wrap svg{max-width:100%;height:auto}
.svg-caption{font-size:12px;color:var(--muted);text-align:center;margin-top:8px;font-style:italic}

/* Mobile: hide less critical elements */
.mobile-hide{display:block}
.pc-only{display:block}
.mobile-only{display:none}

#menu-toggle{display:none;position:absolute;top:14px;left:14px;z-index:20;
  background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:10px 14px;
  color:var(--text);cursor:pointer;font-size:14px}
@media (max-width:900px){
  html,body{font-size:15px}
  #app{grid-template-columns:1fr}
  #sidebar{position:absolute;left:0;top:0;bottom:0;width:280px;z-index:15;transform:translateX(-100%)}
  #sidebar.open{transform:translateX(0)}
  #menu-toggle{display:block}
  .slide{padding:64px 20px 90px}
  .slide-tag{font-size:11px;padding:3px 10px;margin-bottom:10px}
  h2.slide-title{font-size:24px;line-height:1.3}
  .slide-sub{font-size:15px;margin-bottom:18px}
  .title-slide h1{font-size:38px}
  .title-slide .lead{font-size:16px}
  .section-slide h2{font-size:34px}
  .section-slide .part-num{font-size:80px;margin-bottom:-24px}
  .section-slide .section-desc{font-size:16px}
  .panel{padding:14px 16px;margin-bottom:12px}
  .panel p,ul.bullet li,ol.num li{font-size:14px}
  .panel-title{font-size:12px;margin-bottom:10px}
  table{font-size:12px}
  th,td{padding:7px 9px}
  th{font-size:10px}
  pre,code{font-size:12px}
  pre{padding:12px 14px}
  .stat{padding:14px 16px}
  .stat .value{font-size:24px}
  .stat .label,.stat .sub{font-size:11px}
  .note-box,.warn-box,.danger-box,.ok-box{font-size:13px;padding:10px 12px}
  .quote{font-size:14px;padding:10px 14px}
  .flow-box{font-size:12px;padding:8px 12px;min-width:100px}
  .mobile-hide{display:none !important}
  .pc-only{display:none !important}
  .mobile-only{display:block !important}
  .cite{font-size:11px}
  #controls{padding:6px 14px;gap:8px;bottom:10px}
  .ctrl-btn{font-size:12px;padding:6px 10px}
  .counter{font-size:12px;min-width:55px}
}
</style>
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <div class="brand">
      <h1>AI時代のデータ解析</h1>
      <p>Yuasa 2002 を題材に — 再現性・ハルシネーション・倫理</p>

        mxe050/AI-DataStat
      </a>
    </div>
    <nav class="toc" id="toc"></nav>
  </aside>
  <main id="stage">
    <div id="progress"><div id="progress-bar"></div></div>
    <button id="menu-toggle">☰ 目次</button>
    <div id="slides"></div>
    <div id="controls">
      <button class="ctrl-btn" id="prev" title="前へ (←)">◀ 前へ</button>
      <span class="counter" id="counter">1 / 1</span>
      <button class="ctrl-btn" id="next" title="次へ (→)">次へ ▶</button>
      <span style="color:var(--muted);font-size:11px;margin-left:10px">
        <span class="kbd">←</span> <span class="kbd">→</span> で移動 / <span class="kbd">F</span> フルスクリーン
      </span>
    </div>
  </main>
</div>

<script>
/* ============================================================
   全44症例の仮想データ（Yuasa 2002 の集計表から逆算・再構成）
============================================================ */
const YUASA_DATA = [

  {ID:9,Group:"Difficult",Age:28,Sex:"F",Depth:"C",Ramus:"Class3",Spatial:"NA",Proximity:"Close",RootCurvature:"Curved",RootWidth:"Bulbous",HorizontalPosition:"Centre"},
  {ID:10,Group:"Difficult",Age:27,Sex:"M",Depth:"B",Ramus:"Class3",Spatial:"Mesioangular",Proximity:"Close",RootCurvature:"Curved",RootWidth:"Bulbous",HorizontalPosition:"Lingual"},
  {ID:11,Group:"Difficult",Age:26,Sex:"F",Depth:"B",Ramus:"Class3",Spatial:"Mesioangular",Proximity:"Close",RootCurvature:"Curved",RootWidth:"Bulbous",HorizontalPosition:"NoObs"},
  {ID:12,Group:"Difficult",Age:25,Sex:"F",Depth:"B",Ramus:"Class2",Spatial:"Mesioangular",Proximity:"Distant",RootCurvature:"Curved",RootWidth:"Bulbous",HorizontalPosition:"NoObs"},
  {ID:13,Group:"Difficult",Age:24,Sex:"M",Depth:"B",Ramus:"Class2",Spatial:"Distoangular",Proximity:"Distant",RootCurvature:"Curved",RootWidth:"Thick",HorizontalPosition:"NoObs"},

/* ============ 1-2 AI文献検索プロンプト ============ */
{part:"Part 1", short:"AI文献検索", html:`
<span class="slide-tag">STEP 2</span>
<h2 class="slide-title">AIに文献検索を依頼する</h2>
<p class="slide-sub">制約条件を明示的に書くことがハルシネーション抑制の鍵。ただしそれでも完全には防げない。</p>
<div class="grid grid-ab">
<div>
<div class="panel">
<div class="panel-title">推奨プロンプト</div>
<pre><span class="com"># 役割設定</span>
<span class="kw">あなたは</span> 口腔外科の統計解析に詳しい研究者です。

<span class="com"># タスク</span>
下顎埋伏智歯の抜歯困難度予測に関する
主要な論文を10件、以下の形式で：

  - 著者（年）
  - タイトル
  - ジャーナル名・巻号・ページ
  - DOI（<span class="hi">実在するもののみ</span>）
  - 研究デザイン・N
  - 使用統計手法
  - 主な結果

<span class="com"># 制約（ハルシネーション防止）</span>
- 存在しない論文は<span class="hi">絶対に含めない</span>
- 不確かな場合は「<span class="hi">確認が必要</span>」と明記
- DOIを捏造しない
</pre>
</div>
</div>
<div>
<div class="panel">
<div class="panel-title">なぜこの制約が必要か</div>
<ul class="bullet">
<li><strong>役割設定</strong>：特定ドメインへのアテンションを集中</li>
<li><strong>出力形式固定</strong>：構造化により検証が容易</li>
<li><strong>"実在のみ"明示</strong>：ハルシネーション率を低下</li>
<li><strong>不確実性の許可</strong>：「わからない」と答えやすくする</li>
</ul>
</div>
<div class="warn-box">これらの制約を付けても、Kalai et al. (2025) が証明したとおりハルシネーションは完全には消えない。次スライドで実例を見る。</div>
<div class="cite">参考：Kalai AT, Nachum O, Vempala SS, Zhang E. Why Language Models Hallucinate. arXiv:2509.04664 (2025).</div>
</div>
</div>
`},

/* ============ 1-4 検証ワークフロー ============ */
{part:"Part 1", short:"検証手順", html:`
<span class="slide-tag">VERIFICATION</span>
<h2 class="slide-title">AIが出力した引用は必ず実在確認する</h2>
<p class="slide-sub">架空の引用が1つでも混入すれば、研究全体の信頼性が損なわれる。</p>
<div class="grid grid-ab">
<div>
<div class="panel">
<div class="panel-title">5ステップ検証手順</div>
<ol class="num">

<li>Abstract を読み、AIの要約と内容が一致するか確認</li>

<span class="str">実在を確認 → 引用可</span></pre>

/* ============ 3-4 問題③完全分離インタラクティブ ============ */
{part:"Part 3", short:"問題③完全分離", html:`
<span class="slide-tag">問題 ③ · INTERACTIVE</span>
<h2 class="slide-title">完全分離（Complete Separation）── OR が発散する</h2>
<p class="slide-sub">Control群のセルを <strong>0</strong> に近づけると、オッズ比が無限大に発散する様子を体感しよう</p>
<div class="grid grid-ab">
<div>
<div class="panel">
<div class="panel-title">2×2 表シミュレーション</div>
<table style="font-size:13px">
<thead><tr><th></th><th class="center">Difficult</th><th class="center">Control</th></tr></thead>
<tbody>
<tr><td>Level C</td><td class="center" id="cellA">5</td><td class="center" id="cellB" style="font-weight:900;color:var(--bad)">0</td></tr>
<tr><td>Level A/B</td><td class="center" id="cellC">15</td><td class="center" id="cellD">24</td></tr>
</tbody>
</table>
<div class="slider-container">
<label>Control群 Level C のセル値 <span id="cellBVal">0</span></label>
<input type="range" id="cellBSlider" min="0" max="10" step="1" value="0">
</div>
<div style="background:var(--panel2);padding:12px;border-radius:8px;margin-top:8px">
<div style="font-size:12px;color:var(--muted)">計算された OR</div>
<div style="font-size:32px;font-weight:900;color:var(--accent2)" id="orDisplay">∞</div>
<div style="font-size:11px;color:var(--muted)" id="ciDisplay">OR = (5 × 24) / (15 × 0) = 0 で除算</div>
</div>
</div>
</div>
<div>
<div class="chart-wrap tall"><canvas id="separationChart"></canvas></div>
<div class="note-box" style="margin-top:10px">セル値が 0 のとき、尤度関数の最大化点は<strong>無限遠</strong>に飛ぶ。これが「OR=999」の正体。</div>
</div>
</div>
<div class="warn-box">対処法：<strong>Firth (1993) 罰則付き最尤法</strong>。Jeffreys事前分布に相当する罰則項を加えることで、係数の発散を防ぐ。Part 5 で R で実演する。</div>
`, onShow:function(){
  const slider = document.getElementById('cellBSlider');
  const ctx = document.getElementById('separationChart');
  let chart = null;
  function update(){
    const b = +slider.value;
    document.getElementById('cellB').textContent = b;
    document.getElementById('cellBVal').textContent = b;
    document.getElementById('cellD').textContent = 24 - b;
    const a = 5, c = 15, d = 24 - b;
    if(b === 0){
      document.getElementById('orDisplay').innerHTML = '<span style="color:var(--bad)">∞</span>';
      document.getElementById('ciDisplay').textContent = '完全分離 → ゼロ除算';
      document.getElementById('cellB').style.color = 'var(--bad)';
    } else {
      const or = (a * d) / (c * b);
      document.getElementById('orDisplay').textContent = or.toFixed(2);
      const se = Math.sqrt(1/a + 1/b + 1/c + 1/d);
      const lo = Math.exp(Math.log(or) - 1.96*se);
      const hi = Math.exp(Math.log(or) + 1.96*se);
      document.getElementById('ciDisplay').textContent = `95% CI: ${lo.toFixed(2)} – ${hi.toFixed(2)}`;
      document.getElementById('cellB').style.color = '';
    }
    // Update chart
    const xs = [], ys = [];
    for(let bb = 0.1; bb <= 10; bb += 0.2){
      xs.push(bb.toFixed(1));
      ys.push((a * (24-bb)) / (c * bb));
    }
    if(chart){ chart.destroy(); }
    chart = new Chart(ctx,{type:'line',data:{labels:xs,datasets:[
      {label:'オッズ比',data:ys,borderColor:'#6ea8ff',backgroundColor:'rgba(110,168,255,0.1)',fill:true,tension:0.2,pointRadius:0},
      {label:'現在のスライダー位置',data:xs.map((x,i)=> Math.abs(+x - b) < 0.2 ? ys[i]: null),
        borderColor:'#fbbf24',backgroundColor:'#fbbf24',pointRadius:6,showLine:false}
    ]},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{labels:{color:'#e8ecff'}},title:{display:true,text:'Control群のセル値とORの関係',color:'#e8ecff'}},
        scales:{x:{title:{display:true,text:'Control群 Level C セル値',color:'#9aa3c7'},ticks:{color:'#9aa3c7'},grid:{color:'rgba(255,255,255,0.05)'}},
          y:{type:'logarithmic',title:{display:true,text:'オッズ比（対数軸）',color:'#9aa3c7'},ticks:{color:'#9aa3c7'},grid:{color:'rgba(255,255,255,0.05)'}}}}});
  }
  slider.oninput = update;
  update();
}},

<tr><td><strong>変数選択</strong></td><td>単変量 OR ≥ 2.0 で機械的選択</td><td>臨床知識（Table 2等）で事前決定</td></tr>
<tr><td><strong>EPV</strong></td><td>考慮なし（EPV = 4）</td><td>EPV ≥ 10–20、または Riley 2019 で計算</td></tr>
<tr><td><strong>完全分離</strong></td><td>対処なし（OR = 999 をそのまま報告）</td><td>Firth罰則付き回帰 / Bayesian</td></tr>
<tr><td><strong>モデル検証</strong></td><td>構築データ = 評価データ</td><td>Bootstrap内部検証 + 外部検証</td></tr>
<tr><td><strong>報告基準</strong></td><td>なし</td><td>TRIPOD+AI (2024) 27項目チェック</td></tr>
<tr><td><strong>統計ソフト</strong></td><td>"SAS 6.12" のみ</td><td>ソフト・パッケージ・バージョン・シード</td></tr>
<tr><td><strong>コード公開</strong></td><td>なし</td><td>GitHub / Zenodo で公開必須</td></tr>
<tr><td><strong>AI使用</strong></td><td>─</td><td>AMEE Guide No.192 で開示必須</td></tr>
<tr><td><strong>データ公開</strong></td><td>なし</td><td>可能な範囲で公開（匿名化後）</td></tr>
</tbody>
</table>
<div class="note-box">これは「2002年が間違っていた」ではなく、「統計学の進歩により改善が可能になった」と理解すべき。自身の研究も、将来はこう批判される可能性がある。</div>
`},

/* ============ 4-1 定義 ============ */
{part:"Part 4", short:"ハルシネーション定義", html:`
<span class="slide-tag">DEFINITION</span>
<h2 class="slide-title">ハルシネーションとは何か</h2>
<div class="panel">
<div class="panel-title">定義</div>
<p style="font-size:16px;line-height:1.7">
LLMが生成する、<strong>流暢で自信に満ちた、しかし事実に反する出力</strong>。
</p>
</div>
<div class="quote">
「試験で難しい問題に直面した学生が推測するように、大規模言語モデルも不確実な時に推測する。もっともらしいが不正確な記述を、不確実性を認める代わりに生成する。」
<br>— Kalai et al. (2025) Abstract
</div>
<div class="panel">
<div class="panel-title">統計解析における具体例</div>
<div class="grid grid-2">
<ul class="bullet">
<li><span class="badge red">実在しないRパッケージ</span> <code>firth.glm()</code></li>
<li><span class="badge red">構文は正しいが統計的に不適切</span></li>
<li><span class="badge red">架空の引用文献</span> DOI捏造</li>
</ul>
<ul class="bullet">
<li><span class="badge red">p値の誤解釈</span> 「因果が証明された」</li>
<li><span class="badge red">古い関数名</span> 非推奨APIの提示</li>
<li><span class="badge red">係数と OR の混同</span> <code>exp()</code>忘れ</li>
</ul>
</div>
</div>
`},

/* ============ 4-2 統計的必然性 ============ */
{part:"Part 4", short:"統計的必然", html:`
<span class="slide-tag">THEOREM</span>
<h2 class="slide-title">ハルシネーションはバグではなく統計的必然</h2>
<p class="slide-sub">Kalai & Vempala (2024) STOC の核心的定理</p>
<div class="panel" style="background:linear-gradient(135deg,rgba(167,139,250,0.1),rgba(110,168,255,0.1))">
<div class="panel-title">定理（非形式的）</div>
<p style="font-size:15px;line-height:1.7;padding:10px">
キャリブレーションされた言語モデルは、<strong>訓練データに1回しか出現しない事実（singleton）の割合に比例するハルシネーション率</strong>を持つ。
</p>
<div style="background:var(--panel2);padding:14px;border-radius:8px;margin-top:10px">
<div style="font-family:'JetBrains Mono',monospace;font-size:14px;text-align:center;color:#d6deff">
生成エラー率 &ge; <span style="color:var(--accent2)">sr</span> &minus; 2/min|E<sub>c</sub>| &minus; O(&radic;(ln N / N)) &minus; &delta;
</div>
<div style="font-size:11px;color:var(--muted);margin-top:8px;text-align:center">
sr = 訓練データ中のシングルトン率 / δ = キャリブレーション誤差
</div>
</div>
</div>
<div class="grid grid-3" style="margin-top:16px">
<div class="stat">
<div class="label">パターン①</div>
<div class="value" style="font-size:14px">100回出現する事実</div>
<div class="sub" style="color:var(--ok)">正答可能</div>
</div>
<div class="stat">
<div class="label">パターン②</div>
<div class="value" style="font-size:14px">10回出現する事実</div>
<div class="sub" style="color:var(--warn)">揺らぎあり</div>
</div>
<div class="stat">
<div class="label">パターン③</div>
<div class="value" style="font-size:14px">1回だけ出現（Singleton）</div>
<div class="sub" style="color:var(--bad)">必ずハルシネーション</div>
</div>
</div>
<div class="cite">Kalai AT, Vempala SS. Calibrated Language Models Must Hallucinate. Proc. STOC 2024, pp.160-171. DOI: 10.1145/3618260.3649777</div>
`},

/* ============ 4-3 IIV還元 ============ */
{part:"Part 4", short:"IIV還元", html:`
<span class="slide-tag">CORE THEORY</span>
<h2 class="slide-title">Is-It-Valid (IIV) 還元 ─ 生成エラーは分類エラーの2倍以上</h2>
<div class="svg-wrap mobile-hide" style="padding:18px">
<svg viewBox="0 0 780 260" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:780px">
<defs>
<marker id="arrowIIV" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#fbbf24"/></marker>
</defs>
<g font-family="'Helvetica Neue',sans-serif">
<!-- 左：分類タスク -->
<rect x="20" y="30" width="240" height="210" rx="14" fill="rgba(110,168,255,0.08)" stroke="#6ea8ff" stroke-width="2"/>
<text x="140" y="58" text-anchor="middle" font-size="15" font-weight="700" fill="#6ea8ff">二値分類 (IIV)</text>
<text x="140" y="78" text-anchor="middle" font-size="11" fill="#9aa3c7">"これは正しい？" Yes/No</text>
<!-- 円: 正解空間 -->
<circle cx="100" cy="155" r="52" fill="#4ade80" opacity="0.25" stroke="#4ade80" stroke-width="2"/>
<text x="100" y="148" text-anchor="middle" font-size="11" font-weight="700" fill="#4ade80">Valid</text>
<text x="100" y="165" text-anchor="middle" font-size="10" fill="#c5d2ff">(Yes)</text>
<!-- 円: 不正解空間 -->
<circle cx="200" cy="155" r="52" fill="#f87171" opacity="0.25" stroke="#f87171" stroke-width="2"/>
<text x="200" y="148" text-anchor="middle" font-size="11" font-weight="700" fill="#f87171">Invalid</text>
<text x="200" y="165" text-anchor="middle" font-size="10" fill="#c5d2ff">(No)</text>
<text x="140" y="230" text-anchor="middle" font-size="11" fill="#fff">エラー率 = <tspan fill="#fbbf24" font-weight="700">ε</tspan></text>

<!-- 中央：還元矢印 -->
<path d="M 290 135 L 370 135" stroke="#fbbf24" stroke-width="3" marker-end="url(#arrowIIV)"/>
<text x="330" y="120" text-anchor="middle" font-size="11" font-weight="700" fill="#fbbf24">Kalai 還元</text>
<text x="330" y="155" text-anchor="middle" font-size="10" fill="#c5d2ff">(Corollary 1)</text>

<!-- 右：生成タスク -->
<rect x="400" y="30" width="360" height="210" rx="14" fill="rgba(167,139,250,0.08)" stroke="#a78bfa" stroke-width="2"/>
<text x="580" y="58" text-anchor="middle" font-size="15" font-weight="700" fill="#a78bfa">生成タスク</text>
<text x="580" y="78" text-anchor="middle" font-size="11" font-weight="700" fill="#9aa3c7">"正しい出力を作り出す"</text>
<!-- 大きな円（全候補）-->
<circle cx="580" cy="155" r="68" fill="#a78bfa" opacity="0.15" stroke="#a78bfa" stroke-width="2" stroke-dasharray="3 3"/>
<text x="580" y="107" text-anchor="middle" font-size="10" fill="#a78bfa">可能な全ての出力</text>
<!-- 小円：正解 -->
<circle cx="560" cy="155" r="26" fill="#4ade80" opacity="0.35" stroke="#4ade80" stroke-width="2"/>
<text x="560" y="152" text-anchor="middle" font-size="10" font-weight="700" fill="#4ade80">正解</text>
<text x="560" y="166" text-anchor="middle" font-size="9" fill="#c5d2ff">(狭い)</text>
<!-- バツ印：誤生成 -->
<text x="620" y="140" text-anchor="middle" font-size="18" fill="#f87171">✗</text>
<text x="615" y="175" text-anchor="middle" font-size="18" fill="#f87171">✗</text>
<text x="638" y="158" text-anchor="middle" font-size="18" fill="#f87171">✗</text>
<text x="580" y="230" text-anchor="middle" font-size="13" fill="#fff">エラー率 ≥ <tspan fill="#fbbf24" font-weight="900" font-size="15">2ε</tspan></text>
</g>
</svg>
</div>
<div class="grid grid-2">
<div class="panel">
<div class="panel-title">Kalai et al. (2025) の中心定理</div>
<div style="background:var(--panel2);padding:18px;border-radius:10px;text-align:center;margin:12px 0">
<div style="font-family:'JetBrains Mono',monospace;font-size:20px;color:#fff">
(生成エラー率) <br>&#8805; 2 &times; (IIV 誤分類率)
</div>
</div>
<p style="font-size:15px;line-height:1.7">
<strong>直感的理解：</strong>「これは正しい？」と Yes/No で判定する問題より、「正しい出力を<em>作り出す</em>」生成タスクの方が本質的に難しい。<br>
分類で間違えるなら、生成では<strong>必ず2倍以上間違える</strong>。
</p>
</div>
<div class="panel">
<div class="panel-title">Figure 1 の3パターン</div>
<table>
<thead><tr><th>分野</th><th class="center">IIV難度</th><th class="center">生成結果</th></tr></thead>

<tr class="highlight-row"><td><strong>Birthdays（誕生日）</strong></td><td class="center bad">難</td><td class="center bad">悪</td></tr>
</tbody>
</table>
<div class="note-box" style="margin-top:12px">Birthdays はパターンが存在しない（任意事実）→ IIV が困難 → 生成はさらに困難 → <strong>必ずハルシネーション</strong></div>
</div>
</div>
<div class="cite">Kalai AT, Nachum O, Vempala SS, Zhang E. Why Language Models Hallucinate. arXiv:2509.04664 (2025) Corollary 1, Figure 1.</div>
`},

/* ============ 4-4 post-training の問題 ============ */
{part:"Part 4", short:"post-training問題", html:`
<span class="slide-tag">OBSERVATION 1</span>
<h2 class="slide-title">なぜ post-training でハルシネーションが消えないのか</h2>
<p class="slide-sub">言語モデルは「試験受験者」として最適化されている</p>
<div class="panel">
<div class="panel-title">主要ベンチマークの採点方式</div>
<div style="background:var(--panel2);padding:14px;border-radius:10px;font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.9">
<span style="color:var(--accent)">試験の採点方式:</span><br>
&nbsp;&nbsp;正答        → <span style="color:var(--ok)">1点</span><br>
&nbsp;&nbsp;不正答      → <span style="color:var(--bad)">0点</span><br>
&nbsp;&nbsp;「わからない」(IDK) → <span style="color:var(--warn)">0点</span><br>
<br>
<span style="color:var(--accent)">帰結:</span><br>
&nbsp;&nbsp;「わからない」と正直に答えても 0点<br>
&nbsp;&nbsp;推測して正答する可能性がある方が期待スコアが高い<br>
&nbsp;&nbsp;→ モデルは <strong style="color:var(--accent2)">推測（＝ハルシネーション）を学習する</strong>
</div>
</div>
<div class="panel" style="margin-top:14px">
<div class="panel-title">Observation 1（Kalai et al. 2025 Section 4.1）</div>
<div class="quote" style="margin:0">
任意の二値採点方式において、「棄権」（IDK）は最適な応答には含まれない。
</div>
<p style="font-size:12px;margin-top:10px;color:var(--muted)">
つまり、言語モデルのベンチマーク自体がハルシネーションを「報酬」している構造的問題がある。
</p>
</div>
`},

/* ============ 4-6 エラー3類型 ============ */
{part:"Part 4", short:"エラー3類型", html:`
<span class="slide-tag">ERROR TAXONOMY</span>
<h2 class="slide-title">生成エラーの3つの統計的要因</h2>
<div class="grid grid-3">
<div class="panel">
<div class="panel-title" style="color:var(--bad)">① Arbitrary Facts</div>
<p style="font-size:13px;line-height:1.6"><strong>任意事実</strong><br>
訓練データに少なくしか出現しない事実。パターンがないため学習不能。</p>
<ul class="bullet" style="margin-top:10px">
<li>誕生日</li>
<li>博士論文タイトル</li>
<li>特定のDOI</li>
<li>Rパッケージ名</li>
</ul>
<div class="danger-box" style="margin-top:10px;font-size:11px">対策：<strong>困難</strong>。データ不足が本質。検索拡張（RAG）で一部緩和。</div>
</div>
<div class="panel">
<div class="panel-title" style="color:var(--warn)">② Poor Models</div>
<p style="font-size:13px;line-height:1.6"><strong>不適切なモデル</strong><br>
モデル族の表現能力が不足。トークン化の制約など。</p>
<ul class="bullet" style="margin-top:10px">
<li>文字数カウント</li>
<li>桁数の多い計算</li>
<li>構文の揺れる命名</li>
<li>長距離依存</li>
</ul>
<div class="warn-box" style="margin-top:10px;font-size:11px">対策：<strong>改善可能</strong>。推論時計算（Chain-of-Thought）や専用ツール呼び出し。</div>
</div>
<div class="panel">
<div class="panel-title" style="color:var(--purple)">③ GIGO</div>
<p style="font-size:13px;line-height:1.6"><strong>Garbage In, Garbage Out</strong><br>
訓練データ中の誤情報がそのまま再現される。</p>
<ul class="bullet" style="margin-top:10px">
<li>ネット上の誤統計コード</li>
<li>古い医学知識</li>
<li>都市伝説</li>
<li>誤った引用習慣</li>
</ul>
<div class="note-box" style="margin-top:10px;font-size:11px">対策：<strong>部分的</strong>。post-trainingのRLHFで一部軽減可能。</div>
</div>
</div>
<div class="note-box">統計コード生成での典型：古い関数名は Arbitrary Facts、p値の誤解釈は GIGO、構文は正しいが統計的に不適切なコードは Poor Models。</div>
`},

/* ============ 4-7 閾値対策 ============ */
{part:"Part 4", short:"信頼度閾値", html:`
<span class="slide-tag">SOLUTION</span>
<h2 class="slide-title">明示的信頼度閾値 ─ ベンチマーク採点を変える</h2>
<p class="slide-sub">Kalai et al. (2025) の提案：各問題に閾値 t を明示し、誤答ペナルティを課す</p>
<div class="panel">
<div class="panel-title">推奨される問題文プリアンブル</div>
<pre>"Answer only if you are &gt; <span class="num">t</span> confident,
since mistakes are penalized <span class="num">t/(1-t)</span> points,

/* ============ 5-5 単変量OR ============ */
{part:"Part 5", short:"単変量OR再現", html:`
<span class="slide-tag">UNIVARIATE OR</span>
<h2 class="slide-title">単変量OR ─ 原論文 Table 3 の再現</h2>
<p class="slide-sub">周辺度数のみで決まる単変量ORは、仮想データでも原論文と<strong>ほぼ完全に一致</strong>する</p>
<div class="grid grid-ab">
<div>
<div class="panel">
<div class="panel-title">OR計算関数（Rコード）</div>
<pre><span class="com"># Haldane補正付きOR計算</span>
<span class="kw">calc_or</span> &lt;- <span class="kw">function</span>(a, b, c, d) {
  <span class="kw">if</span>(<span class="kw">any</span>(<span class="kw">c</span>(a,b,c,d)==0)) {
    a &lt;- a+.5; b &lt;- b+.5
    c &lt;- c+.5; d &lt;- d+.5
  }
  or &lt;- (a*d)/(b*c)
  se &lt;- <span class="kw">sqrt</span>(1/a + 1/b + 1/c + 1/d)
  ci &lt;- <span class="kw">exp</span>(<span class="kw">log</span>(or) + <span class="kw">c</span>(-1.96, 1.96)*se)
  <span class="kw">list</span>(OR=<span class="kw">round</span>(or,2),
       lower=<span class="kw">round</span>(ci[1],2),
       upper=<span class="kw">round</span>(ci[2],2))
}</pre>
</div>
</div>
<div>
<table style="font-size:12px">
<thead><tr><th>因子</th><th class="center">再現 OR</th><th class="center">論文 OR</th><th class="center">判定</th></tr></thead>
<tbody>
<tr><td>Depth B vs A</td><td class="center">2.10</td><td class="center">2.10</td><td class="center ok">✓</td></tr>
<tr><td>Depth C vs A</td><td class="center">~50*</td><td class="center">∞ (298)</td><td class="center warn">~</td></tr>
<tr><td>Ramus 3 vs 1</td><td class="center">6.00</td><td class="center">6.00</td><td class="center ok">✓</td></tr>
<tr><td>Root Bulbous</td><td class="center">6.50</td><td class="center">6.50</td><td class="center ok">✓</td></tr>
<tr><td>Root Curved</td><td class="center">4.80</td><td class="center">4.80</td><td class="center ok">✓</td></tr>
<tr><td>Proximity Close</td><td class="center">0.79</td><td class="center">0.79</td><td class="center ok">✓</td></tr>
</tbody>
</table>
<div class="note-box" style="margin-top:10px;font-size:11px">* Depth C は完全分離のため Haldane 補正値。原論文は近似値 298 を記載。</div>
<div class="ok-box" style="margin-top:10px">
<strong>重要：</strong>周辺度数のみで決まるセクションは完全再現。これが仮想データの有効性の根拠。
</div>
</div>
</div>
`},

/* ============ 5-6 完全分離の確認 ============ */
{part:"Part 5", short:"完全分離確認", html:`
<span class="slide-tag">R EXECUTION</span>
<h2 class="slide-title">通常GLMで完全分離を実証する</h2>
<div class="panel">
<div class="panel-title">Rコード</div>
<pre><span class="kw">model_glm</span> &lt;- <span class="kw">glm</span>(Outcome ~ Depth_C + Ramus_3 + Root_Bulb,
                 family = binomial, data = df)
<span class="kw">summary</span>(model_glm)</pre>
</div>
<div class="panel" style="margin-top:14px">
<div class="panel-title">出力（警告 glm.fit: fitted probabilities numerically 0 or 1 occurred）</div>
<pre>              Estimate  Std. Error  z value  Pr(&gt;|z|)
(Intercept)   -1.504     0.700     -2.149    0.032
<span style="color:var(--bad)">Depth_C       18.173  2084.107      0.009    0.993  ← 係数が発散！</span>
Ramus_3        1.537     0.904      1.701    0.089
Root_Bulb      0.711     0.786      0.904    0.366</pre>
</div>
<div class="grid grid-2" style="margin-top:14px">
<div class="danger-box" style="margin:0">
<strong>問題：</strong>Depth_C の係数 = 18.17、標準誤差 = 2084<br>
→ z値 = 0.009 → p = 0.993 となり「有意でない」と誤判定してしまう<br>
→ OR = exp(18.17) ≈ 78,700,000 で解釈不能
</div>
<div class="warn-box" style="margin:0">
<strong>原因：</strong>Control群の Depth C が 0 名（完全分離）。<br>
通常の最尤推定法では、係数を ∞ に飛ばした方が尤度が高くなる。
</div>
</div>
<div class="ok-box">解決策 → <strong>Firth (1993) 罰則付き最尤推定法</strong>。次スライドで実行。</div>
`},

/* ============ 5-7 Firth回帰 ============ */
{part:"Part 5", short:"Firth回帰結果", html:`
<span class="slide-tag">FIRTH REGRESSION</span>
<h2 class="slide-title">Firth 罰則付きロジスティック回帰</h2>
<div class="grid grid-ab">
<div>
<div class="panel">
<div class="panel-title">Rコード</div>
<pre><span class="kw">library</span>(logistf)
<span class="kw">fit</span> &lt;- <span class="kw">logistf</span>(
  Outcome ~ Depth_C + Ramus_3 + Root_Bulb,
  data = df)
<span class="kw">summary</span>(fit)</pre>
</div>
<div class="note-box" style="margin-top:10px">
Firth法：Jeffreys事前分布に相当する罰則を尤度に加え、係数の発散を防ぐ。有限で解釈可能な推定値が得られる。
</div>
</div>
<div>
<div class="panel">
<div class="panel-title">結果（仮想データでの再解析）</div>
<table style="font-size:12px">
<thead><tr><th>変数</th><th class="center">β</th><th class="center">OR</th><th class="center">95% CI</th><th class="center">p</th></tr></thead>
<tbody>
<tr><td>(Intercept)</td><td class="center">-1.18</td><td class="center">─</td><td class="center">─</td><td class="center">0.010</td></tr>
<tr class="highlight-row"><td><strong>Depth_C</strong></td><td class="center"><strong>2.60</strong></td><td class="center hi"><strong>13.45</strong></td><td class="center">1.06–1918</td><td class="center">0.044</td></tr>
<tr><td>Ramus_3</td><td class="center">1.24</td><td class="center">3.47</td><td class="center">0.58–23.8</td><td class="center">0.168</td></tr>
<tr><td>Root_Bulb</td><td class="center">0.65</td><td class="center">1.92</td><td class="center">0.44–8.37</td><td class="center">0.378</td></tr>
</tbody>
</table>
<div style="background:var(--panel2);padding:10px;border-radius:8px;margin-top:10px;font-size:12px">
<strong>モデル全体：</strong>LR χ² = 8.32, df = 3, <strong>p = 0.010</strong>
</div>
</div>
</div>
</div>
<div class="ok-box"><strong>改善点：</strong>Depth_C の OR が ∞ → 13.45 へ。解釈可能な値に。ただしCI幅は 1.06-1918 と依然広く、<strong>サンプルサイズの限界</strong>を如実に反映。</div>
`},

/* ============ 5-10 臨床解釈 ============ */
{part:"Part 5", short:"臨床解釈は人間", html:`

/* ============ 7-1 Take-home 1-5 ============ */
{part:"Part 7", short:"Take-home 1-5", html:`
<span class="slide-tag">TAKE-HOME MESSAGES 1–5</span>
<h2 class="slide-title">統計手法編</h2>
<div class="grid grid-2">
<div class="panel">
<div class="panel-title" style="color:var(--accent2)">① 古い論文を鵜呑みにしない</div>
<p style="font-size:13px;line-height:1.6">
査読済みでも度数不整合や統計的問題が存在する。<strong>批判的吟味は研究者の基本スキル</strong>。
</p>
</div>
<div class="panel">
<div class="panel-title" style="color:var(--accent2)">② 変数選択は臨床知識で</div>
<p style="font-size:13px;line-height:1.6">
単変量スクリーニング（p&lt;0.20, OR≥2.0）は選択バイアス。事前知識に基づく選択が推奨（Harrell 2015 / Sun 1996）。
</p>
</div>
<div class="panel">
<div class="panel-title" style="color:var(--accent2)">③ 完全分離には Firth 回帰</div>
<p style="font-size:13px;line-height:1.6">
ゼロセル時のOR=999 は解釈不能。Firth (1993) 罰則付き最尤推定で有限な推定値を。<code>logistf</code> パッケージ。
</p>
</div>
<div class="panel">
<div class="panel-title" style="color:var(--accent2)">④ EPV を守る</div>
<p style="font-size:13px;line-height:1.6">
イベント数 ÷ 変数数 ≥ 10。N=44 / イベント20 なら最大2-3変数（van Smeden 2016 / Riley 2019）。
</p>
</div>
<div class="panel" style="grid-column:span 2">
<div class="panel-title" style="color:var(--accent2)">⑤ モデル検証を忘れない</div>
<p style="font-size:13px;line-height:1.6">
構築データ＝評価データは楽観的バイアス。<strong>Bootstrap 内部検証 + 外部検証</strong>が理想（TRIPOD+AI 2024）。統計ソフト・パッケージ・バージョンは必ず明記。
</p>
</div>
</div>
`},

/* ============ 7-2 Take-home 6-11 ============ */
{part:"Part 7", short:"Take-home 6-11", html:`
<span class="slide-tag">TAKE-HOME MESSAGES 6–11</span>
<h2 class="slide-title">AI編</h2>
<div class="grid grid-2">
<div class="panel">
<div class="panel-title" style="color:var(--purple)">⑥ ハルシネーションは統計的に不可避</div>
<p style="font-size:13px;line-height:1.6">
Kalai & Vempala (2024) の数学的証明。訓練データに1回しか出ない事実に関してLLMは必ず誤る。
</p>
</div>
<div class="panel">
<div class="panel-title" style="color:var(--purple)">⑦ ベンチマークが推測を報酬している</div>
<p style="font-size:13px;line-height:1.6">
二値採点（正答1/不正答0/IDK=0）はIDKを罰する。Kalai et al. (2025) Observation 1。
</p>
</div>
<div class="panel">

/* ============================================================
   ナビゲーション
============================================================ */
let current = 0;
const slidesEl = document.getElementById('slides');
const tocEl = document.getElementById('toc');

// スライド要素を生成
SLIDES.forEach((s, i) => {
  const div = document.createElement('div');
  div.className = 'slide';
  div.dataset.idx = i;
  div.innerHTML = s.html;
  slidesEl.appendChild(div);
});

// 目次を生成
const parts = {};
SLIDES.forEach((s, i) => {
  if(!parts[s.part]) parts[s.part] = [];
  parts[s.part].push({idx:i, title:s.short});
});

for(const part in parts){
  const wrap = document.createElement('div');
  wrap.className = 'toc-part';
  if(part !== '表紙' && part !== 'Overview' && !part.startsWith('Part')){
    // default case
  }
  if(part !== '表紙'){
    const title = document.createElement('div');
    title.className = 'toc-title';
    title.textContent = part;
    wrap.appendChild(title);
  }
  parts[part].forEach(item => {
    // セクション見出しスライドは目次から除外（━━で始まるもの）
    if(item.title.startsWith('━━')) return;
    const btn = document.createElement('div');
    btn.className = 'toc-item';
    btn.dataset.idx = item.idx;
    btn.innerHTML = `<span class="toc-num">${String(item.idx+1).padStart(2,'0')}</span><span>${item.title}</span>`;
    btn.onclick = () => goTo(item.idx);
    wrap.appendChild(btn);
  });
  tocEl.appendChild(wrap);
}

function goTo(idx){
  if(idx < 0 || idx >= SLIDES.length) return;
  document.querySelectorAll('.slide').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.toc-item').forEach(t => t.classList.remove('active'));
  const slideEl = document.querySelector(`.slide[data-idx="${idx}"]`);
  slideEl.classList.add('active');
  slideEl.scrollTop = 0;
  const tocItem = document.querySelector(`.toc-item[data-idx="${idx}"]`);
  if(tocItem){
    tocItem.classList.add('active');
    tocItem.scrollIntoView({behavior:'smooth',block:'nearest'});
  }
  current = idx;
  document.getElementById('counter').textContent = `${idx+1} / ${SLIDES.length}`;
  document.getElementById('progress-bar').style.width = `${((idx+1)/SLIDES.length)*100}%`;
  document.getElementById('prev').disabled = idx === 0;
  document.getElementById('next').disabled = idx === SLIDES.length-1;
  // 初期化関数実行
  setTimeout(() => {
    if(SLIDES[idx].onShow) try { SLIDES[idx].onShow(); } catch(e){ console.warn(e); }
    if(window.MathJax && window.MathJax.typesetPromise) window.MathJax.typesetPromise([slideEl]);
  }, 50);
  // モバイル: メニュー閉じる
  document.getElementById('sidebar').classList.remove('open');
}

document.getElementById('prev').onclick = () => goTo(current - 1);
document.getElementById('next').onclick = () => goTo(current + 1);
document.getElementById('menu-toggle').onclick = () => {
  document.getElementById('sidebar').classList.toggle('open');
};
document.addEventListener('keydown', e => {
  if(e.target.tagName === 'INPUT') return;
  if(e.key === 'ArrowRight' || e.key === 'PageDown' || e.key === ' ') { e.preventDefault(); goTo(current+1); }
  else if(e.key === 'ArrowLeft' || e.key === 'PageUp') { e.preventDefault(); goTo(current-1); }
  else if(e.key === 'Home') goTo(0);
  else if(e.key === 'End') goTo(SLIDES.length-1);
  else if(e.key === 'f' || e.key === 'F'){
    if(!document.fullscreenElement) document.documentElement.requestFullscreen();
    else document.exitFullscreen();
  }
});

// 初期表示
goTo(0);
</script>
