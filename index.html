<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI時代のデータ解析 ─ Yuasa 2002 を題材に</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script>window.MathJax = {tex: {inlineMath: [['$','$'],['\\(','\\)']], displayMath: [['$$','$$'],['\\[','\\]']]}};</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" async></script>
<style>
:root{
  --bg:#0b1020; --bg2:#131a36; --panel:#171e42; --panel2:#1f2752;
  --text:#e8ecff; --muted:#9aa3c7; --accent:#6ea8ff; --accent2:#ffb86b;
  --ok:#4ade80; --bad:#f87171; --warn:#fbbf24; --purple:#a78bfa;
  --line:rgba(255,255,255,0.08); --shadow:0 10px 40px rgba(0,0,0,0.5);
}
*{box-sizing:border-box;margin:0;padding:0}
:root{--fs-mul:1}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);
  font-family:"Helvetica Neue","Hiragino Kaku Gothic ProN","Yu Gothic UI","Meiryo",system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;font-feature-settings:"palt";font-size:20px;line-height:1.7}
#app{display:grid;grid-template-columns:290px 1fr;height:100vh;width:100vw}

/* Sidebar */
#sidebar{background:linear-gradient(180deg,#0a1028,#0d1432);border-right:1px solid var(--line);
  overflow-y:auto;padding:20px 0;transition:transform 0.3s}
#sidebar::-webkit-scrollbar{width:6px}
#sidebar::-webkit-scrollbar-thumb{background:#2a3470;border-radius:3px}
.brand{padding:0 22px 18px;border-bottom:1px solid var(--line)}
.brand h1{font-size:17px;font-weight:700;line-height:1.4;color:#fff}
.brand p{font-size:13px;color:var(--muted);margin-top:6px;line-height:1.5}
.brand .gh{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--accent);
  margin-top:8px;padding:4px 8px;background:rgba(110,168,255,0.1);border-radius:6px;
  text-decoration:none;font-family:monospace}
.toc{padding:16px 10px}
.toc-part{margin-bottom:8px}
.toc-title{font-size:12px;font-weight:700;color:var(--accent);padding:10px 12px 6px;
  text-transform:uppercase;letter-spacing:1px}
.toc-item{display:flex;gap:10px;padding:9px 14px;font-size:14px;color:var(--muted);
  border-radius:6px;cursor:pointer;transition:all 0.15s;border-left:2px solid transparent;line-height:1.4}
.toc-item:hover{background:var(--panel);color:var(--text)}
.toc-item.active{background:rgba(110,168,255,0.14);color:#fff;border-left-color:var(--accent)}
.toc-num{font-variant-numeric:tabular-nums;color:var(--muted);min-width:24px;font-size:12px}
.toc-item.active .toc-num{color:var(--accent)}

/* Main stage */
#stage{position:relative;overflow:hidden;background:
  radial-gradient(ellipse at top,var(--bg2),var(--bg) 60%)}
#slides{position:relative;height:100%;width:100%}
.slide{position:absolute;inset:0;padding:54px 80px 90px;overflow-y:auto;
  opacity:0;pointer-events:none;transform:translateX(30px);
  transition:opacity 0.35s ease,transform 0.35s ease}
.slide.active{opacity:1;pointer-events:auto;transform:translateX(0)}
.slide::-webkit-scrollbar{width:10px}
.slide::-webkit-scrollbar-thumb{background:#2a3470;border-radius:5px}

/* Slide header */
.slide-tag{display:inline-block;font-size:calc(14px * var(--fs-mul));font-weight:700;color:var(--accent);
  background:rgba(110,168,255,0.14);padding:6px 14px;border-radius:999px;margin-bottom:16px;
  letter-spacing:1.5px}
h2.slide-title{font-size:calc(46px * var(--fs-mul));font-weight:800;line-height:1.25;margin-bottom:12px;
  background:linear-gradient(90deg,#fff,#b9c6ff);-webkit-background-clip:text;background-clip:text;
  color:transparent}
.slide-sub{font-size:calc(20px * var(--fs-mul));color:var(--muted);margin-bottom:30px;line-height:1.65}
.slide-lead{font-size:calc(18px * var(--fs-mul));color:#d6deff;margin-bottom:22px;line-height:1.8;
  padding:14px 20px;background:rgba(110,168,255,0.05);border-left:4px solid var(--accent);border-radius:0 10px 10px 0}

/* Content blocks */
.panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;
  padding:22px 26px;margin-bottom:18px;box-shadow:var(--shadow)}
.panel.tight{padding:14px 18px}
.panel p{font-size:calc(17px * var(--fs-mul));line-height:1.75}
.panel-title{font-size:calc(15px * var(--fs-mul));font-weight:700;color:var(--accent2);text-transform:uppercase;
  letter-spacing:1.2px;margin-bottom:14px;display:flex;align-items:center;gap:10px}
.panel-title::before{content:"";width:5px;height:18px;background:var(--accent2);border-radius:2px}
.grid{display:grid;gap:18px}
.grid-2{grid-template-columns:1fr 1fr}
.grid-3{grid-template-columns:repeat(3,1fr)}
.grid-4{grid-template-columns:repeat(4,1fr)}
.grid-ab{grid-template-columns:1fr 1.4fr}
@media (max-width:1100px){.grid-2,.grid-3,.grid-4,.grid-ab{grid-template-columns:1fr}}

/* Tables */
table{width:100%;border-collapse:separate;border-spacing:0;font-size:calc(16px * var(--fs-mul));
  background:var(--panel2);border-radius:10px;overflow:hidden}
th,td{padding:12px 16px;text-align:left;border-bottom:1px solid var(--line);line-height:1.55}
th{background:rgba(110,168,255,0.08);font-size:calc(13px * var(--fs-mul));text-transform:uppercase;letter-spacing:1px;
  color:var(--accent);font-weight:700}
tr:last-child td{border-bottom:none}
td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
td.center,th.center{text-align:center}
.bad{color:var(--bad);font-weight:700}
.ok{color:var(--ok);font-weight:700}
.warn{color:var(--warn);font-weight:700}
.hi{color:var(--accent2);font-weight:700}

/* Lists */
ul.bullet{list-style:none;padding-left:0}
ul.bullet li{padding:9px 0 9px 28px;position:relative;font-size:calc(17px * var(--fs-mul));line-height:1.7}
ul.bullet li::before{content:"▸";position:absolute;left:6px;color:var(--accent);font-size:calc(18px * var(--fs-mul))}
ol.num{padding-left:28px}
ol.num li{padding:8px 0;font-size:calc(17px * var(--fs-mul));line-height:1.7}
.body-text{font-size:calc(17px * var(--fs-mul));line-height:1.8;color:#d6deff}

/* Badges & quotes */
.badge{display:inline-block;padding:4px 11px;border-radius:6px;font-size:calc(13px * var(--fs-mul));
  font-weight:700;margin-right:6px}
.badge.red{background:rgba(248,113,113,0.15);color:var(--bad)}
.badge.green{background:rgba(74,222,128,0.15);color:var(--ok)}
.badge.blue{background:rgba(110,168,255,0.15);color:var(--accent)}
.badge.amber{background:rgba(251,191,36,0.15);color:var(--warn)}
.quote{border-left:5px solid var(--accent2);padding:16px 22px;background:rgba(255,184,107,0.06);
  font-style:italic;font-size:calc(19px * var(--fs-mul));line-height:1.75;border-radius:0 10px 10px 0;margin:16px 0}
.cite{font-size:calc(14px * var(--fs-mul));color:var(--muted);margin-top:12px;font-style:italic;line-height:1.6}
.emphasis{background:linear-gradient(transparent 60%,rgba(251,191,36,0.3) 60%);font-weight:700;padding:0 2px}

/* Code */
code,pre{font-family:"JetBrains Mono","Consolas","SF Mono",monospace}
pre{background:#0a0f26;border:1px solid var(--line);border-radius:10px;padding:18px 20px;
  overflow-x:auto;font-size:calc(15px * var(--fs-mul));line-height:1.7;color:#d6deff}
code{background:rgba(110,168,255,0.12);padding:3px 8px;border-radius:4px;font-size:calc(15px * var(--fs-mul));color:#b9c6ff}
pre code{background:none;padding:0;color:inherit}
.kw{color:#c084fc}
.str{color:#86efac}
.com{color:#64748b;font-style:italic}
.num{color:#fbbf24}

/* Stat card */
.stat{background:linear-gradient(135deg,var(--panel),var(--panel2));padding:22px 24px;
  border-radius:12px;border:1px solid var(--line)}
.stat .label{font-size:calc(14px * var(--fs-mul));color:var(--muted);text-transform:uppercase;letter-spacing:1.2px}
.stat .value{font-size:calc(38px * var(--fs-mul));font-weight:800;line-height:1.2;margin-top:6px;
  background:linear-gradient(90deg,#6ea8ff,#a78bfa);-webkit-background-clip:text;background-clip:text;color:transparent}
.stat .sub{font-size:calc(14px * var(--fs-mul));color:var(--muted);margin-top:8px;line-height:1.55}

/* Visual diagram boxes */
.flow{display:flex;align-items:center;justify-content:center;gap:14px;flex-wrap:wrap;padding:14px 0}
.flow-box{background:var(--panel2);border:1px solid var(--line);padding:14px 20px;border-radius:10px;
  font-size:calc(15px * var(--fs-mul));text-align:center;min-width:140px;line-height:1.55}
.flow-box.ai{border-color:var(--purple);background:rgba(167,139,250,0.1)}
.flow-box.human{border-color:var(--ok);background:rgba(74,222,128,0.08)}
.flow-arrow{color:var(--accent);font-size:calc(24px * var(--fs-mul))}

/* Controls */
#controls{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);
  display:flex;align-items:center;gap:14px;background:rgba(23,30,66,0.92);
  border:1px solid var(--line);padding:10px 20px;border-radius:999px;backdrop-filter:blur(8px);z-index:10}
.ctrl-btn{background:transparent;border:none;color:var(--text);padding:8px 14px;
  border-radius:999px;cursor:pointer;font-size:15px;transition:background 0.15s}
.ctrl-btn:hover{background:rgba(110,168,255,0.14)}
.ctrl-btn:disabled{opacity:0.3;cursor:not-allowed}
.counter{font-size:14px;color:var(--muted);font-variant-numeric:tabular-nums;min-width:70px;text-align:center}
#progress{position:absolute;top:0;left:0;right:0;height:4px;background:rgba(255,255,255,0.04);z-index:10}
#progress-bar{height:100%;background:linear-gradient(90deg,var(--accent),var(--purple));
  transition:width 0.3s;width:0%}

/* Title slide */
.title-slide{display:flex;flex-direction:column;justify-content:center;align-items:center;
  text-align:center;padding:40px}
.title-slide h1{font-size:72px;font-weight:900;line-height:1.1;letter-spacing:-2px;
  background:linear-gradient(135deg,#fff 0%,#6ea8ff 50%,#a78bfa 100%);
  -webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:22px}
.title-slide .lead{font-size:24px;color:var(--muted);max-width:900px;line-height:1.6;margin-bottom:34px}
.title-slide .meta{font-size:15px;color:var(--muted);margin-top:44px;line-height:1.7}
.title-deco{font-size:16px;letter-spacing:14px;color:var(--accent);
  text-transform:uppercase;margin-bottom:20px;opacity:0.8}

/* Section divider */
.section-slide{display:flex;flex-direction:column;justify-content:center;height:100%}
.section-slide .part-num{font-size:150px;font-weight:900;line-height:1;
  background:linear-gradient(135deg,var(--accent) 0%,var(--purple) 100%);
  -webkit-background-clip:text;background-clip:text;color:transparent;opacity:0.3;margin-bottom:-50px}
.section-slide h2{font-size:64px;font-weight:900;line-height:1.15;margin-bottom:22px}
.section-slide .section-desc{font-size:22px;color:var(--muted);max-width:820px;line-height:1.6}

/* Interactive */
.slider-container{background:var(--panel2);padding:14px 16px;border-radius:10px;margin:10px 0}
.slider-container label{display:flex;justify-content:space-between;font-size:12px;margin-bottom:8px;color:var(--muted)}
.slider-container input[type=range]{width:100%;accent-color:var(--accent)}
.chart-wrap{background:var(--panel2);padding:14px;border-radius:10px;position:relative;height:240px}
.chart-wrap.tall{height:320px}

/* Highlight pill */
.highlight-row{background:rgba(251,191,36,0.08) !important}
.highlight-row td{color:#ffe4a0}

/* Comparison */
.vs-grid{display:grid;grid-template-columns:1fr auto 1fr;gap:14px;align-items:stretch}
.vs-box{padding:14px 16px;border-radius:10px;border:1px solid var(--line)}
.vs-box.old{background:rgba(248,113,113,0.05);border-color:rgba(248,113,113,0.3)}
.vs-box.new{background:rgba(74,222,128,0.05);border-color:rgba(74,222,128,0.3)}
.vs-box h4{font-size:13px;margin-bottom:8px;font-weight:700}
.vs-box.old h4{color:var(--bad)}
.vs-box.new h4{color:var(--ok)}
.vs-box ul.bullet li{font-size:12px;padding:4px 0 4px 18px}
.vs-divider{display:flex;align-items:center;justify-content:center;font-size:18px;
  font-weight:900;color:var(--accent);padding:0 4px}

/* Tabs */
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--line);margin-bottom:12px}
.tab{padding:8px 14px;font-size:12px;color:var(--muted);cursor:pointer;
  border-bottom:2px solid transparent;transition:all 0.15s}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-content{display:none}
.tab-content.active{display:block}

/* Keyboard hint */
.kbd{display:inline-block;padding:2px 6px;background:var(--panel2);border:1px solid var(--line);
  border-radius:4px;font-size:10px;font-family:"JetBrains Mono",monospace;color:var(--muted)}

/* Data table scroll */
.data-scroll{max-height:300px;overflow-y:auto;border-radius:10px}
.data-scroll table{font-size:11px}
.data-scroll th,.data-scroll td{padding:5px 8px}
.data-scroll::-webkit-scrollbar{width:6px}
.data-scroll::-webkit-scrollbar-thumb{background:#2a3470;border-radius:3px}

/* Annotations */
.note-box{background:rgba(110,168,255,0.06);border-left:4px solid var(--accent);
  padding:16px 20px;border-radius:0 10px 10px 0;font-size:calc(16px * var(--fs-mul));line-height:1.75;color:#c5d2ff;margin:14px 0}
.note-box::before{content:"💡";margin-right:8px}
.warn-box{background:rgba(251,191,36,0.07);border-left:4px solid var(--warn);
  padding:16px 20px;border-radius:0 10px 10px 0;font-size:calc(16px * var(--fs-mul));line-height:1.75;color:#ffe4a0;margin:14px 0}
.warn-box::before{content:"⚠️";margin-right:8px}
.danger-box{background:rgba(248,113,113,0.07);border-left:4px solid var(--bad);
  padding:16px 20px;border-radius:0 10px 10px 0;font-size:calc(16px * var(--fs-mul));line-height:1.75;color:#fecaca;margin:14px 0}
.danger-box::before{content:"🚫";margin-right:8px}
.ok-box{background:rgba(74,222,128,0.07);border-left:4px solid var(--ok);
  padding:16px 20px;border-radius:0 10px 10px 0;font-size:calc(16px * var(--fs-mul));line-height:1.75;color:#bbf7d0;margin:14px 0}
.ok-box::before{content:"✓";margin-right:8px}

/* Font-size control */
.fs-control{display:flex;align-items:center;gap:4px;margin-left:10px;padding-left:12px;border-left:1px solid var(--line)}
.fs-btn{background:transparent;border:1px solid var(--line);color:var(--text);
  width:32px;height:32px;border-radius:6px;cursor:pointer;font-weight:700;transition:all 0.15s}
.fs-btn:hover{background:rgba(110,168,255,0.15);border-color:var(--accent)}
.fs-btn.fs-a{font-size:11px}
.fs-btn.fs-b{font-size:14px}
.fs-btn.fs-c{font-size:17px}
.fs-label{font-size:11px;color:var(--muted);margin-right:4px}

/* YouTube button */
.yt-btn{display:inline-flex;align-items:center;gap:12px;padding:16px 26px;
  background:linear-gradient(135deg,#ff0000,#cc0000);color:#fff;text-decoration:none;
  border-radius:12px;font-weight:700;font-size:calc(17px * var(--fs-mul));transition:all 0.2s;
  box-shadow:0 8px 24px rgba(255,0,0,0.3)}
.yt-btn:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(255,0,0,0.4)}
.yt-btn svg{width:28px;height:28px;flex-shrink:0}

/* Article-style body (long prose blocks) */
.article{font-size:calc(17px * var(--fs-mul));line-height:1.85;color:#d6deff}
.article p{margin-bottom:14px}
.article h3{font-size:calc(20px * var(--fs-mul));color:var(--accent2);margin:20px 0 10px;
  padding-bottom:6px;border-bottom:1px solid var(--line)}
.article h4{font-size:calc(17px * var(--fs-mul));color:var(--accent);margin:16px 0 8px}
.article strong{color:#fff}

/* SVG diagrams */
.svg-wrap{background:var(--panel2);border-radius:12px;padding:16px;margin:10px 0;
  display:flex;justify-content:center;align-items:center}
.svg-wrap svg{max-width:100%;height:auto}
.svg-caption{font-size:12px;color:var(--muted);text-align:center;margin-top:8px;font-style:italic}

/* Mobile: hide less critical elements */
.mobile-hide{display:block}
.pc-only{display:block}
.mobile-only{display:none}

#menu-toggle{display:none;position:absolute;top:14px;left:14px;z-index:20;
  background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:10px 14px;
  color:var(--text);cursor:pointer;font-size:14px}
@media (max-width:900px){
  :root{--fs-mul:1 !important}
  html,body{font-size:15px}
  #app{grid-template-columns:1fr}
  #sidebar{position:absolute;left:0;top:0;bottom:0;width:280px;z-index:15;transform:translateX(-100%)}
  #sidebar.open{transform:translateX(0)}
  #menu-toggle{display:block}
  .slide{padding:64px 18px 90px}
  .slide-tag{font-size:11px !important;padding:3px 10px;margin-bottom:10px}
  h2.slide-title{font-size:24px !important;line-height:1.3}
  .slide-sub{font-size:15px !important;margin-bottom:18px}
  .slide-lead{font-size:14px !important;padding:10px 14px;margin-bottom:16px}
  .title-slide h1{font-size:38px}
  .title-slide .lead{font-size:16px}
  .section-slide h2{font-size:34px}
  .section-slide .part-num{font-size:80px;margin-bottom:-24px}
  .section-slide .section-desc{font-size:16px}
  .panel{padding:14px 16px;margin-bottom:12px}
  .panel p,ul.bullet li,ol.num li{font-size:14px !important}
  .panel-title{font-size:12px !important;margin-bottom:10px}
  .article{font-size:14px !important;line-height:1.7}
  .article h3{font-size:16px !important}
  .article h4{font-size:14px !important}
  table{font-size:12px !important}
  th,td{padding:7px 9px}
  th{font-size:10px !important}
  pre,code{font-size:12px !important}
  pre{padding:12px 14px}
  .stat{padding:14px 16px}
  .stat .value{font-size:24px !important}
  .stat .label,.stat .sub{font-size:11px !important}
  .note-box,.warn-box,.danger-box,.ok-box{font-size:13px !important;padding:10px 12px;line-height:1.65}
  .quote{font-size:14px !important;padding:10px 14px;line-height:1.65}
  .flow-box{font-size:12px !important;padding:8px 12px;min-width:100px}
  .mobile-hide{display:none !important}
  .pc-only{display:none !important}
  .mobile-only{display:block !important}
  .cite{font-size:11px !important}
  .badge{font-size:11px !important;padding:2px 8px}
  .yt-btn{font-size:14px;padding:12px 18px}
  .yt-btn svg{width:22px;height:22px}
  .fs-control{display:none}
  #controls{padding:6px 14px;gap:8px;bottom:10px}
  .ctrl-btn{font-size:12px;padding:6px 10px}
  .counter{font-size:12px;min-width:55px}
}
</style>
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <div class="brand">
      <h1>AI時代のデータ解析</h1>
      <p>Yuasa 2002 を題材に — 再現性・ハルシネーション・倫理</p>
      <a class="gh" href="https://github.com/mxe050/AI-DataStat" target="_blank" rel="noopener">

        mxe050/AI-DataStat
      </a>
    </div>
    <nav class="toc" id="toc"></nav>
  </aside>
  <main id="stage">
    <div id="progress"><div id="progress-bar"></div></div>
    <button id="menu-toggle">☰ 目次</button>
    <div id="slides"></div>

/* ============ 1-2 AI文献検索プロンプト ============ */
{part:"Part 1", short:"AI文献検索", html:`
<span class="slide-tag">STEP 2</span>
<h2 class="slide-title">AIに文献検索を依頼する</h2>
<p class="slide-sub">制約条件を明示的に書くことがハルシネーション抑制の鍵。ただしそれでも完全には防げない。</p>
<div class="grid grid-ab">
<div>
<div class="panel">
<div class="panel-title">推奨プロンプト</div>
<pre><span class="com"># 役割設定</span>
<span class="kw">あなたは</span> 口腔外科の統計解析に詳しい研究者です。

<span class="com"># タスク</span>
下顎埋伏智歯の抜歯困難度予測に関する
主要な論文を10件、以下の形式で：

  - 著者（年）
  - タイトル
  - ジャーナル名・巻号・ページ
  - DOI（<span class="hi">実在するもののみ</span>）
  - 研究デザイン・N
  - 使用統計手法
  - 主な結果

<span class="com"># 制約（ハルシネーション防止）</span>
- 存在しない論文は<span class="hi">絶対に含めない</span>
- 不確かな場合は「<span class="hi">確認が必要</span>」と明記
- DOIを捏造しない
</pre>
</div>
</div>
<div>
<div class="panel">
<div class="panel-title">なぜこの制約が必要か</div>
<ul class="bullet">
<li><strong>役割設定</strong>：特定ドメインへのアテンションを集中</li>
<li><strong>出力形式固定</strong>：構造化により検証が容易</li>
<li><strong>"実在のみ"明示</strong>：ハルシネーション率を低下</li>
<li><strong>不確実性の許可</strong>：「わからない」と答えやすくする</li>
</ul>
</div>
<div class="warn-box">これらの制約を付けても、Kalai et al. (2025) が証明したとおりハルシネーションは完全には消えない。次スライドで実例を見る。</div>
<div class="cite">参考：Kalai AT, Nachum O, Vempala SS, Zhang E. Why Language Models Hallucinate. arXiv:2509.04664 (2025).</div>
</div>
</div>
`},

/* ============ 1-4 検証ワークフロー ============ */
{part:"Part 1", short:"検証手順", html:`
<span class="slide-tag">VERIFICATION</span>
<h2 class="slide-title">AIが出力した引用は必ず実在確認する</h2>
<p class="slide-sub">架空の引用が1つでも混入すれば、研究全体の信頼性が損なわれる。</p>
<div class="grid grid-ab">
<div>
<div class="panel">
<div class="panel-title">5ステップ検証手順</div>
<ol class="num">
<li>DOIを <code>https://doi.org/[DOI]</code> で直接アクセス</li>
<li>PubMed / Google Scholar でタイトル完全一致検索</li>
<li>著者名・年・巻号・ページを原著と照合</li>
<li>Abstract を読み、AIの要約と内容が一致するか確認</li>
<li>不一致があれば <strong>AIの出力を破棄</strong> し原著を使用</li>
</ol>
</div>
</div>
<div>
<div class="panel">
<div class="panel-title">実際の検証例</div>
<pre><span class="com"># AI の出力</span>
"Yuasa H, Kawai T, Sugiura M (2002)
 BJOMS 40:26-31"

<span class="com"># 検証①: DOI</span>
https://doi.org/10.1054/bjom.2001.0684
  → ページ表示 <span class="str">✓</span>

<span class="com"># 検証②: PubMed</span>
PMID: 11883966  <span class="str">✓</span>

<span class="com"># 検証③: タイトル</span>
"Classification of surgical
 difficulty in extracting
 impacted third molars"  <span class="str">✓</span>

<span class="com"># 結論</span>
<span class="str">実在を確認 → 引用可</span></pre>
</div>
</div>
</div>
<div class="ok-box">この確認作業は省略できない。ルーチン化して、すべての引用に対して必ず行う。</div>
`},

/* ============ 1-5 AI時代でもPubMed ============ */
{part:"Part 1", short:"AI時代でもPubMed", html:`
<span class="slide-tag">PART 1 · 09</span>
<h2 class="slide-title">AI時代でもPubMed ─ 医療者が譲れない原則</h2>
<p class="slide-lead">
AI検索ツールが急増する2026年。しかし<span class="emphasis">医療における情報検索</span>は、他分野と比べて本質的に要求水準が高い。<strong>データベース（PubMed等）を自分で引く能力は、AI時代においてむしろ重要性を増している</strong>。
</p>
<div class="grid grid-2">
<div class="panel">
<div class="panel-title">① 医学以外の分野 ─ 比較的シンプル</div>
<div class="article">
<p>アカデミア内では比較的マーケットが広く、主な利用者は<strong>学部生・大学院生</strong>。検索ニーズは自身の研究テーマの「先行研究調査」「研究ギャップ発見」など、新規性や独創性の担保が中心。</p>
<p><strong class="emphasis">「査読付き論文」であること</strong>が質を保証する主要基準となり、このニーズに応えるのが Deep Research、Consensus といった学術特化型AI検索ツール。</p>
<div class="ok-box" style="font-size:calc(14px * var(--fs-mul))">これらは「網羅性」「新規性確認」が目的なので、AI要約で十分機能する場面が多い。</div>
</div>
</div>
<div class="panel" style="border-color:var(--bad)">
<div class="panel-title" style="color:var(--bad)">② 医学分野 ─ 目的で細かく分かれる専門市場</div>
<div class="article">
<p>医学分野の検索は<strong class="emphasis">目的によって極めて細かく分類される</strong>、さらに専門的な市場。</p>
<p><strong>検索目的の多様性：</strong></p>
<ul class="bullet" style="margin:6px 0">
<li>EBM（根拠に基づく医療）</li>
<li>総論・教科書的情報</li>
<li>日常の臨床疑問</li>
<li>システマティックレビュー</li>
</ul>
<p>ややこしいのが<strong>EBM と言っても、本質まで理解しているかで大きく異なる</strong>こと。</p>
</div>
</div>
</div>
<h3 style="font-size:calc(22px * var(--fs-mul));color:var(--accent2);margin:24px 0 14px;padding-bottom:6px;border-bottom:1px solid var(--line)">EBM の理解度で分かれる2つのタイプ</h3>
<div class="grid grid-2">
<div class="panel" style="background:rgba(248,113,113,0.04);border-color:rgba(248,113,113,0.3)">
<div class="panel-title" style="color:var(--bad)">A. EBMの理解が不十分な場合</div>
<div class="article">
<p>「臨床のための検索」と称していても、検索結果が<strong class="emphasis">「PubMedに掲載されている」というだけで</strong>質の高い情報だと見なしてしまう傾向がある（インパクトファクターが高いならさらに良い、という単純な基準）。</p>
<p>医学分野のAI開発でも、<strong>このレベルが基本</strong>である場合が多い。これでは本来のEBMとは呼べない。</p>
</div>
</div>
<div class="panel" style="background:rgba(74,222,128,0.04);border-color:rgba(74,222,128,0.3)">
<div class="panel-title" style="color:var(--ok)">B. EBMの本質を理解している場合</div>
<div class="article">
<p>EBMの実践には<strong class="emphasis">「現在手に入る最高のエビデンス」</strong>が必要。透明性はもちろん、極端に言えばSRと異なりブラックボックスでも検索結果に信頼性が担保できれば良い。しかし<strong>それは不可能</strong>（不安感もあるし、ある日突然アルゴリズムが悪意に変わる可能性）。</p>
<p>よって、<strong>透明性が必要</strong>。しかしAI開発で全てを公開するのは競争世界では無理。</p>
</div>
</div>
</div>
<div class="panel" style="margin-top:16px">
<div class="panel-title">AI検索の限界 ─ 透明性と学習データの本質問題</div>
<div class="article">
<p>現在のAIは、<strong>OpenEvidence</strong>（有名論文ばかりという逆弊害あり）などの限定されたデータの特別な場合を除き、<strong class="emphasis">オープンソースからの学習がほとんど</strong>。これでは透明性以前に、<strong>真摯に患者のための臨床としてダメダメ</strong>なのが理解できる。</p>
<p><strong>AIでまとめた記事のみを読んで患者に適用するなんて、論外である。</strong></p>
<p>さらに「AIで検索された論文はチェックすること」との記載があるが、そもそも<strong>引用論文をすべて読んでない</strong>などは研究者・臨床家としての質が問われる問題で、チェックするのは当たり前。</p>
</div>
</div>
<div class="panel" style="margin-top:16px">
<div class="panel-title">批判的吟味 ─ AIには代替できない最後の砦</div>
<div class="article">
<p>得られた文献（情報）を<strong class="emphasis">批判的吟味</strong>し、本当に患者に適用できるか、他の選択肢がないかも十分に調べなければならない。</p>
<p>特に、<strong>批判的吟味まで行なうAI</strong>は、可能としても<strong class="emphasis">一律の判定になる</strong>。その吟味の結果、この研究はどこを注意しながら、どのデータを使えるかまでは、<strong>AIでは不可能</strong>。</p>
<p>よって、<strong>医療関係者一人一人のプロ意識が重要</strong>と考える。</p>
</div>
</div>
<div style="display:flex;justify-content:center;margin-top:28px;padding:28px 20px;
  background:linear-gradient(135deg,rgba(255,0,0,0.08),rgba(110,168,255,0.06));
  border-radius:14px;border:1px solid var(--line);flex-direction:column;align-items:center;gap:16px">
<div style="font-size:calc(20px * var(--fs-mul));font-weight:700;color:#fff;text-align:center;line-height:1.5">
AI時代だからこそ ─<br><span style="color:var(--accent2)">「専門家と学ぶ PubMed 検索マスター講座」</span>
</div>

YouTube で視聴する
</a>
<div style="font-size:calc(13px * var(--fs-mul));color:var(--muted);text-align:center">

医療者が身につけるべき検索スキルを体系的に解説
</div>
</div>
`},

/* ============ 3-2 問題①データ駆動型選択 ============ */
{part:"Part 3", short:"問題①変数選択", html:`
<span class="slide-tag">問題 ①</span>
<h2 class="slide-title">データ駆動型変数選択の罠</h2>
<p class="slide-lead">
「<strong class="emphasis">データを見てから変数を選ぶ</strong>」方法はすべて危険である。具体的には、<strong>単変量解析で有意差があった因子のみを多変量に投入する方法</strong>、<strong>ステップワイズ（段階的）選択</strong>、<strong>OR や p 値でのスクリーニング</strong>など、自動選択全般が問題視されている。
</p>

<div class="panel">
<div class="panel-title">何が問題なのか？ ─ 5つの統計学的根拠</div>
<div class="article">
<p><strong>① 選択バイアス（Selection Bias）</strong><br>
「データから選んだ」変数だけを残すと、<strong class="emphasis">偶然の関連</strong>が本物の関連として紛れ込む。同じ集団で選択と推定を行うため、回帰係数は体系的に過大評価（upward bias）される。</p>

<p><strong>② 抑制変数（Suppressor Variable）の見逃し</strong><br>
単変量では有意でなくても、他の変数と組み合わせた多変量解析で<strong>重要な情報を提供する変数</strong>が存在する。これを "suppressor" と呼ぶ。単変量スクリーニングではこれらを機械的に除外してしまう。</p>

<p><strong>③ 信頼区間が過少評価（Confidence Interval が狭く見える）</strong><br>
変数選択プロセス自体の不確実性を CI が反映していない。実際より"シャープ"に見える CI は誤った安心感を与える。</p>

<p><strong>④ 交絡因子（Confounder）の適切な調整ができない</strong><br>
交絡因子は単変量で有意でなくても、調整のために残すべき。自動選択は「統計的に有意」と「臨床的に重要」を混同する。</p>

<p><strong>⑤ p値の意味が崩壊する</strong><br>
選択後のp値は「ある仮説を検定した結果」ではなく、「<strong>選ばれたから目立つ</strong>」値になっている。通常の統計的解釈（type I error = 5%）が成立しない。</p>
</div>
</div>

<div class="grid grid-2" style="margin-top:18px">
<div class="panel" style="border-color:rgba(248,113,113,0.4);background:rgba(248,113,113,0.04)">
<div class="panel-title" style="color:var(--bad)">❌ 2002年当時よく行われた方法</div>
<ul class="bullet">
<li>単変量解析で <strong>p &lt; 0.05</strong> の因子のみ多変量に投入</li>
<li>単変量解析で <strong>p &lt; 0.20</strong> の因子のみ多変量に投入（ゆるい基準）</li>
<li>単変量解析で <strong>OR ≥ 2.0</strong> の因子のみ多変量に投入（Yuasa 2002）</li>
<li>多変量で <strong>ステップワイズ選択</strong>（backward/forward/stepwise）</li>
<li>AIC/BIC で自動的に変数を削除</li>
</ul>
<div class="danger-box" style="margin-top:10px">
これらはすべて「データを見てから変数を選ぶ」＝<strong>データ駆動型</strong>であり、上記①〜⑤の問題をもたらす。
</div>
</div>
<div class="panel" style="border-color:rgba(74,222,128,0.4);background:rgba(74,222,128,0.04)">
<div class="panel-title" style="color:var(--ok)">✓ 2026年の推奨アプローチ</div>
<ul class="bullet">
<li><strong>事前に臨床知識で変数を固定</strong>（プロトコルで明記）</li>
<li>本研究なら <strong>Table 2 のアンケート結果</strong>が事前情報</li>
<li>先行研究・メタ分析から重要因子を選定</li>
<li>交絡候補は p 値に関わらず<strong>強制投入</strong></li>
<li>事前登録（pre-registration）で変数リストを公開</li>
</ul>
<div class="ok-box" style="margin-top:10px">
EPV が足りない場合は<strong>変数削減ではなく、次元削減</strong>（PCA, 合成スコア等）や <strong>罰則付き回帰</strong>（LASSO/Ridge）を検討。
</div>
</div>
</div>

<div class="panel" style="margin-top:18px">
<div class="panel-title">主要文献による批判</div>
<div class="article">
<p><strong>Sun, Shook & Kay (1996)</strong> は、シミュレーション研究により<strong class="emphasis">単変量スクリーニングが抑制変数を見逃し、交絡調整を誤らせる</strong>ことを実証。真の効果を過小評価するケースも存在することを示した。</p>
<p><strong>Harrell (2015)</strong> は『Regression Modeling Strategies』第4章で、ステップワイズ選択の問題を詳細に論じ、「<strong>変数を選ぶなら事前に選べ、データから選ぶな</strong>」と繰り返し警告している。</p>
<p><strong>Royston & Sauerbrei (2008)</strong> は "Multivariable Model-Building" で、厳密な事前計画の重要性とペナルティ付き回帰の有用性を解説。</p>
</div>
</div>

<div class="note-box">Yuasa 2002 は <strong>Table 2 のアンケート（事前情報）を持っていた</strong>。これを変数選択の根拠として前面に出していれば、問題は大きく軽減されたはず。アンケートは実質的に「臨床知識による事前選択」と同等の機能を果たせる。</div>

<div class="cite">
Sun GW, Shook TL, Kay GL. <em>J Clin Epidemiol</em> 1996;49(8):907-916. DOI: 10.1016/0895-4356(96)00025-X<br>
Harrell FE Jr. <em>Regression Modeling Strategies.</em> 2nd ed. Springer 2015, Chapter 4.<br>
Royston P, Sauerbrei W. <em>Multivariable Model-Building.</em> Wiley 2008.
</div>
`},

/* ============ 3-3 問題②EPV 可視化 ============ */
{part:"Part 3", short:"問題②EPV", html:`
<span class="slide-tag">問題 ②</span>
<h2 class="slide-title">Events Per Variable (EPV) 不足 ─ 初心者向け解説</h2>
<p class="slide-lead">
<strong>EPV とは何か？</strong> ロジスティック回帰では「珍しい方のアウトカム」（本研究では<strong>困難群＝20名</strong>）を "Event（イベント）" と呼ぶ。このイベント数を、モデルに投入する変数の数で割ったものが EPV（Events Per Variable）。<br>
<strong class="emphasis">EPV は「データがどれだけ贅沢か」の指標</strong>である。
</p>

<div class="panel">
<div class="panel-title">なぜ EPV が重要なのか？ ─ 3つの理由</div>
<div class="article">
<p><strong>理由① 変数が多すぎるとモデルが"暗記"してしまう（過適合 / overfitting）</strong><br>
サンプルに対して変数が多すぎると、モデルは<strong class="emphasis">データのノイズまで学習</strong>してしまう。手元のデータでは感度・特異度が高いが、新規患者ではまったく使えないモデルになる。</p>

<p><strong>理由② 回帰係数の推定が不安定になる</strong><br>
1人データが違うだけで OR が 3 倍変わるような推定になる。<strong>信頼区間（CI）が異常に広がり</strong>、数桁にまたがる（例：Yuasa 2002 の 1.59 - 1216.3）。これは実質的に<strong>解釈不能</strong>な推定。</p>

<p><strong>理由③ p 値が偶然でも有意になりやすい</strong><br>
サンプルに対する自由度が不足すると、適合度の指標が操作されやすくなる。過適合したモデルは"見かけ上"良く見える。</p>
</div>
</div>

<div class="grid grid-ab" style="margin-top:16px">
<div>
<div class="panel">
<div class="panel-title">本研究での計算 ─ 致命的な不足</div>
<div style="font-size:calc(16px * var(--fs-mul));line-height:2;text-align:center;padding:10px">
<div style="font-size:calc(14px * var(--fs-mul));color:var(--muted)">イベント数（Difficult群）</div>
<div style="font-size:calc(42px * var(--fs-mul));font-weight:900;color:var(--accent)">20</div>
<div style="font-size:calc(22px * var(--fs-mul));color:var(--muted)">÷</div>
<div style="font-size:calc(14px * var(--fs-mul));color:var(--muted)">多変量に投入した変数数</div>
<div style="font-size:calc(42px * var(--fs-mul));font-weight:900;color:var(--accent)">5</div>
<div style="font-size:calc(22px * var(--fs-mul));color:var(--muted)">=</div>
<div style="font-size:calc(50px * var(--fs-mul));font-weight:900;color:var(--bad)">EPV = 4.0</div>
<div style="font-size:calc(14px * var(--fs-mul));color:var(--muted)">推奨 ≥ 10 に対し<strong class="bad">60% 不足</strong></div>
</div>
</div>
</div>
<div>
<div class="chart-wrap tall" id="epvChartWrap">
  <canvas id="epvChart"></canvas>
</div>
<div class="panel tight" style="margin-top:10px">
<div class="panel-title">EPV別の推奨文献</div>
<table>
<tbody>
<tr><td>Peduzzi et al. (1996)</td><td class="center">EPV ≥ <strong>10</strong></td></tr>
<tr><td>van Smeden et al. (2016)</td><td class="center">「10に根拠なし」</td></tr>
<tr><td>Riley et al. (2019)</td><td class="center">予測精度で計算</td></tr>
</tbody>
</table>
</div>
</div>
</div>

<div class="panel" style="margin-top:16px">
<div class="panel-title">EPV = 4 は何を意味するのか？ ─ 具体例で理解</div>
<div class="article">
<p><strong>たとえるなら：</strong> 20枚の写真から5つの特徴（変数）を見分けるAIを訓練しようとするのと同じ。どうしても<strong class="emphasis">1枚1枚の特徴を丸暗記してしまう</strong>ため、新しい写真では正しく判断できない。</p>
<p>Peduzzi ら (1996) はシミュレーションで <strong>EPV = 10</strong> 以下になると：</p>
<ul class="bullet">
<li>回帰係数が真値から<strong>平均で 10% 以上ずれる</strong></li>
<li>CI のカバレッジ率（真値を含む確率）が <strong>名目の 95% を下回る</strong></li>
<li>収束しない（無限大になる）ケースが増える</li>
</ul>
<p>と報告した。本研究の EPV = 4 はその半分以下 ─ これはもはや<strong>通常のロジスティック回帰を適用すべき状況ではない</strong>。</p>
</div>
</div>

<div class="panel" style="margin-top:16px">
<div class="panel-title">EPV が足りないときの選択肢</div>
<div class="article">
<p><strong>A. 変数を減らす</strong> → 事前情報で厳選。本研究なら Table 2 の最上位因子のみ</p>
<p><strong>B. 罰則付き回帰を使う</strong> → <strong>Firth法</strong>（本研究で採用）、LASSO、Ridge、Elastic Net</p>
<p><strong>C. ベイズ法を使う</strong> → 事前分布による正則化で推定を安定化</p>
<p><strong>D. データを追加する</strong> → 多施設共同研究、登録研究などで N を増やす</p>
<p><strong>E. モデル構築を諦めて記述統計のみ</strong> → 統計的不確実性を正直に認める</p>
</div>
</div>

<div class="cite">
Peduzzi P et al. <em>J Clin Epidemiol</em> 1996;49(12):1373-1379.<br>
van Smeden M et al. <em>BMC Med Res Methodol</em> 2016;16:163. DOI: 10.1186/s12874-016-0267-3<br>
Riley RD et al. <em>Stat Med</em> 2019;38(7):1276-1296. DOI: 10.1002/sim.7992
</div>
`, onShow:function(){
  const ctx = document.getElementById('epvChart'); if(!ctx) return;
  new Chart(ctx,{type:'line',data:{
    labels:['2','4','6','8','10','15','20','30','50'],
    datasets:[{label:'推定値の相対標準誤差',
      data:[4.8,2.9,2.2,1.7,1.4,1.15,1.0,0.85,0.75],
      borderColor:'#f87171',backgroundColor:'rgba(248,113,113,0.15)',
      fill:true,tension:0.3,pointRadius:4}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{color:'#e8ecff'}},
        title:{display:true,text:'EPV vs 推定値の不安定性（概念図）',color:'#e8ecff'},
        annotation:{}},
      scales:{x:{title:{display:true,text:'EPV',color:'#9aa3c7'},ticks:{color:'#9aa3c7'},grid:{color:'rgba(255,255,255,0.05)'}},
        y:{title:{display:true,text:'推定値の相対変動 (×)',color:'#9aa3c7'},ticks:{color:'#9aa3c7'},grid:{color:'rgba(255,255,255,0.05)'}}}}});
}},

/* ============ 3-4 問題③完全分離インタラクティブ ============ */
{part:"Part 3", short:"問題③完全分離", html:`
<span class="slide-tag">問題 ③ · INTERACTIVE</span>
<h2 class="slide-title">完全分離（Complete Separation）── OR が発散する</h2>
<p class="slide-lead">
<strong>完全分離とは何か？</strong> 2×2 表（または多次元の分割表）で、<strong class="emphasis">ある変数の値によって結果が完全に予測できる</strong>状況。<br>
例：「Depth = Level C のとき、44名中 <strong>Difficult 群が全員、Control 群が0名</strong>」。このとき、通常のロジスティック回帰では<strong>オッズ比が無限大に飛ぶ</strong>。
</p>

<div class="panel">
<div class="panel-title">なぜ「無限大」になるのか？ ─ 数学的直感</div>
<div class="article">
<p>オッズ比の公式は <code>OR = (a×d) / (b×c)</code>（2×2表の4セル値）。分母に <strong class="emphasis">0 が入るとゼロ除算</strong>が発生し、数学的に定義不能になる。</p>
<p>ロジスティック回帰（最尤推定法）では、尤度関数を最大化する係数を探す。<strong>完全分離があると、係数を大きくすればするほど尤度が上がり続ける</strong>ため、最適解が無限遠に飛んでいく。</p>
<p>ソフトウェアは通常、適当なところで計算を打ち切るため、「OR = 999」「OR = 78,700,000」のような<strong>大きな数字で報告</strong>されることになる（＝ 実質的に「∞」の意味）。</p>
</div>
</div>

<h3 style="font-size:calc(22px * var(--fs-mul));color:var(--accent2);margin:22px 0 12px;padding-bottom:6px;border-bottom:1px solid var(--line)">
🎮 体験してみよう ─ スライダー操作の手順
</h3>
<div class="panel" style="background:rgba(110,168,255,0.04)">
<div class="article">
<p><strong>下の 2×2 表のスライダーを動かす前に、次のステップで観察しよう：</strong></p>
<ol class="num">
<li><strong>最初の状態（スライダー = 0）</strong>：Control群 Level C = 0。右上セルに <span class="bad">0</span> が表示され、OR表示が <strong class="bad">∞</strong>。グラフは右端が天井に達する形。<br><em>→ これが「完全分離」の状態。原論文 Yuasa 2002 はまさにこの状態だった。</em></li>
<li><strong>スライダーを 1 に動かす</strong>：Control群 Level C に 1名追加。OR が有限値（ここでは <strong>8.0</strong>）になる。CI はまだ広いが、計算可能に。</li>
<li><strong>スライダーを 3, 5 と増やす</strong>：OR がだんだん下がり、CI が狭くなっていく様子を観察。</li>
<li><strong>スライダーを最大 10 に</strong>：OR が 1 に近づき、CIも現実的な範囲に収束。<br><em>→ これがデータが豊富な場合の「健全な」推定。</em></li>
<li><strong>0 に戻す</strong>：再び OR が発散する瞬間を体感する。</li>
</ol>
</div>
</div>

<div class="grid grid-ab" style="margin-top:16px">
<div>
<div class="panel">
<div class="panel-title">2×2 表シミュレーション</div>
<table>
<thead><tr><th></th><th class="center">Difficult</th><th class="center">Control</th></tr></thead>
<tbody>
<tr><td>Level C</td><td class="center" id="cellA">5</td><td class="center" id="cellB" style="font-weight:900;color:var(--bad)">0</td></tr>
<tr><td>Level A/B</td><td class="center" id="cellC">15</td><td class="center" id="cellD">24</td></tr>
</tbody>
</table>
<div class="slider-container" style="margin-top:12px">
<label>Control群 Level C のセル値 <strong id="cellBVal" style="color:var(--accent2);font-size:calc(18px * var(--fs-mul))">0</strong></label>
<input type="range" id="cellBSlider" min="0" max="10" step="1" value="0">
</div>
<div style="background:var(--panel2);padding:14px;border-radius:8px;margin-top:10px">
<div style="font-size:calc(13px * var(--fs-mul));color:var(--muted)">計算された OR（オッズ比）</div>
<div style="font-size:calc(40px * var(--fs-mul));font-weight:900;color:var(--accent2)" id="orDisplay">∞</div>
<div style="font-size:calc(13px * var(--fs-mul));color:var(--muted)" id="ciDisplay">OR = (5 × 24) / (15 × 0) = 0 で除算</div>
</div>
</div>
</div>
<div>
<div class="chart-wrap tall"><canvas id="separationChart"></canvas></div>
<div class="note-box" style="margin-top:10px">セル値が 0 のとき、尤度関数の最大化点は<strong>無限遠</strong>に飛ぶ。これが「OR=999」の正体。</div>
</div>
</div>

<div class="panel" style="margin-top:16px">
<div class="panel-title">この問題をどう解決するか？ ─ Firth (1993) 罰則付き最尤法</div>
<div class="article">
<p><strong>David Firth が 1993 年に提案した手法</strong>は、尤度関数に<strong class="emphasis">Jeffreys 事前分布に相当する罰則項</strong>を加えることで、係数が無限大に飛ぶのを防ぐ。</p>
<p>簡単に言えば：「<strong>係数が極端に大きくなることにペナルティを課す</strong>」ことで、有限で解釈可能な推定値を得る手法。ベイズ的な発想だが、事前分布を明示的に選ぶ必要がなく、<strong>周波論的ロジスティック回帰の自然な拡張</strong>として使える。</p>
<p>R では <code>logistf</code> パッケージ（Heinze & Schemper 2002）で実装されており、通常の <code>glm()</code> と同じ記法で使える。<strong>Part 5 で実際に実演する</strong>。</p>
</div>
</div>

<div class="warn-box">
<strong>教訓：</strong>データ集計段階で「0 のセル」を発見したら、通常のロジスティック回帰を適用してはいけない。ソフトウェアが自動的に大きな OR を吐き出してくるので、気づかず論文に載せてしまう危険が極めて高い。<strong>Firth 法か Bayesian 法に切り替える</strong>。
</div>

<div class="cite">
Firth D. Bias reduction of maximum likelihood estimates. <em>Biometrika</em> 1993;80(1):27-38.<br>
Heinze G, Schemper M. A solution to the problem of separation in logistic regression. <em>Stat Med</em> 2002;21(16):2409-2419.
</div>
`, onShow:function(){
  const slider = document.getElementById('cellBSlider');
  const ctx = document.getElementById('separationChart');
  let chart = null;
  function update(){
    const b = +slider.value;
    document.getElementById('cellB').textContent = b;
    document.getElementById('cellBVal').textContent = b;
    document.getElementById('cellD').textContent = 24 - b;
    const a = 5, c = 15, d = 24 - b;
    if(b === 0){
      document.getElementById('orDisplay').innerHTML = '<span style="color:var(--bad)">∞</span>';
      document.getElementById('ciDisplay').textContent = '完全分離 → ゼロ除算';
      document.getElementById('cellB').style.color = 'var(--bad)';
    } else {
      const or = (a * d) / (c * b);
      document.getElementById('orDisplay').textContent = or.toFixed(2);
      const se = Math.sqrt(1/a + 1/b + 1/c + 1/d);
      const lo = Math.exp(Math.log(or) - 1.96*se);
      const hi = Math.exp(Math.log(or) + 1.96*se);
      document.getElementById('ciDisplay').textContent = `95% CI: ${lo.toFixed(2)} – ${hi.toFixed(2)}`;
      document.getElementById('cellB').style.color = '';
    }
    // Update chart
    const xs = [], ys = [];
    for(let bb = 0.1; bb <= 10; bb += 0.2){
      xs.push(bb.toFixed(1));
      ys.push((a * (24-bb)) / (c * bb));
    }
    if(chart){ chart.destroy(); }
    chart = new Chart(ctx,{type:'line',data:{labels:xs,datasets:[
      {label:'オッズ比',data:ys,borderColor:'#6ea8ff',backgroundColor:'rgba(110,168,255,0.1)',fill:true,tension:0.2,pointRadius:0},
      {label:'現在のスライダー位置',data:xs.map((x,i)=> Math.abs(+x - b) < 0.2 ? ys[i]: null),
        borderColor:'#fbbf24',backgroundColor:'#fbbf24',pointRadius:6,showLine:false}
    ]},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{labels:{color:'#e8ecff'}},title:{display:true,text:'Control群のセル値とORの関係',color:'#e8ecff'}},
        scales:{x:{title:{display:true,text:'Control群 Level C セル値',color:'#9aa3c7'},ticks:{color:'#9aa3c7'},grid:{color:'rgba(255,255,255,0.05)'}},
          y:{type:'logarithmic',title:{display:true,text:'オッズ比（対数軸）',color:'#9aa3c7'},ticks:{color:'#9aa3c7'},grid:{color:'rgba(255,255,255,0.05)'}}}}});
  }
  slider.oninput = update;
  update();
}},

/* ============ 3-5 問題④同一データ評価 ============ */
{part:"Part 3", short:"問題④構築=評価", html:`
<span class="slide-tag">問題 ④</span>
<h2 class="slide-title">モデル構築データ = 評価データ ─ 楽観バイアス</h2>
<p class="slide-lead">
予測モデルを「<strong class="emphasis">作ったデータそのもので評価する</strong>」と、性能は必ず実際より高く見える。これを<strong>楽観バイアス（optimism bias）</strong>または <strong>apparent performance</strong> と呼ぶ。新規患者に適用した瞬間に、感度も特異度も AUC も確実に下がる。
</p>

<div class="panel">
<div class="panel-title">なぜ楽観的になるのか？ ─ 理論的背景</div>
<div class="article">
<p>モデル構築プロセスでは、回帰係数が<strong>そのデータに最も合うように</strong>最適化される。これには：</p>
<ul class="bullet">
<li>シグナル（真の関連）</li>
<li>ノイズ（偶然の関連、外れ値、測定誤差）</li>
</ul>
<p>の両方が含まれる。モデルは<strong class="emphasis">ノイズの部分まで"学習"してしまう</strong>ため、同じデータで評価すると、ノイズのフィッティングによって性能が水増しされる。</p>
<p>統計学的には、<strong>optimism = apparent performance − true performance</strong> と定義される。サンプルサイズが小さい、変数が多い、モデルが複雑、といった条件ほど optimism が大きくなる。</p>
</div>
</div>

<div class="grid grid-ab" style="margin-top:16px">
<div>
<div class="panel">
<div class="panel-title">Yuasa 2002 の評価</div>
<div style="padding:12px;background:var(--panel2);border-radius:8px">
<table>
<thead><tr><th></th><th class="center">Apparent<br>（同一データ）</th><th class="center">真の性能<br>（推定）</th></tr></thead>
<tbody>
<tr><td>感度</td><td class="center hi">0.85</td><td class="center" style="color:var(--muted)">&lt; 0.75？</td></tr>
<tr><td>特異度</td><td class="center hi">0.92</td><td class="center" style="color:var(--muted)">&lt; 0.80？</td></tr>
<tr><td>OR</td><td class="center hi">62.3</td><td class="center" style="color:var(--muted)">&lt; 20？</td></tr>
</tbody>
</table>
</div>
<div class="danger-box" style="margin-top:10px">これらは <strong>N=44 の同一データでの性能</strong>。新規患者に適用すると必ず低下する。EPV=4 の小標本では楽観バイアスは<strong>非常に大きい</strong>。</div>
</div>
</div>
<div>
<div class="panel">
<div class="panel-title">現代の推奨 (TRIPOD+AI 2024)</div>
<div class="flow" style="flex-direction:column;align-items:stretch;gap:8px">
<div class="flow-box human" style="width:100%">① 内部検証<br><small>Bootstrap / 交差検証で楽観度を補正</small></div>
<div class="flow-arrow" style="text-align:center">↓</div>
<div class="flow-box human" style="width:100%">② 時間的検証<br><small>同じ施設の別期間データで確認</small></div>
<div class="flow-arrow" style="text-align:center">↓</div>
<div class="flow-box human" style="width:100%">③ 外部検証<br><small>独立した別施設のデータで性能評価</small></div>
<div class="flow-arrow" style="text-align:center">↓</div>
<div class="flow-box human" style="width:100%">④ TRIPODチェックリストに準拠して報告</div>
</div>
</div>
</div>
</div>

<div class="panel" style="margin-top:16px">
<div class="panel-title">内部検証の3つの方法 ─ 初心者向け</div>
<div class="article">
<p><strong>① Split Sample（単純分割）</strong><br>
データを 70:30 や 80:20 に分け、前者でモデル構築、後者で評価。<strong class="emphasis">小標本では非推奨</strong>（分割でさらにサンプルが減り、推定が不安定になる）。</p>

<p><strong>② Cross-Validation（交差検証）</strong><br>
データを K 個（例：10）に分割し、K-1 個で構築→ 残り1個で評価を K 回繰り返し、平均を取る。Split Sample より効率的。</p>

<p><strong>③ Bootstrap（ブートストラップ）</strong><br>
元データから復元抽出で新しいデータセットを作り、そこでモデルを構築→ 元データで評価、を何百回も繰り返す。<strong>Harrell が強く推奨</strong>。optimism を直接推定できる。</p>
</div>
</div>

<div class="panel" style="margin-top:16px">
<div class="panel-title">外部検証の重要性</div>
<div class="article">
<p>内部検証は<strong>あくまで同じ集団内での性能評価</strong>。別の施設、別の地域、別の時代、別の機器で撮影されたパノラマ X 線画像に同じモデルが通用するかは、<strong class="emphasis">外部データでしか確認できない</strong>。</p>
<p>予測モデルの真の価値は「Generalizability（一般化可能性）」。<strong>TRIPOD+AI (2024)</strong> は外部検証を強く推奨し、論文発表時にその結果を必ず含めるべきとしている。</p>
<p>理想的には：開発コホート → 内部検証 → 独立したコホートで外部検証 → 臨床実装試験、という4段階を踏む。</p>
</div>
</div>

<div class="cite">Collins GS, Moons KGM, Dhiman P, et al. TRIPOD+AI statement: updated guidance for reporting clinical prediction models that use regression or machine learning methods. <em>BMJ</em> 2024;385:e078378.</div>
`},

/* ============ 4-1 定義 ============ */
{part:"Part 4", short:"ハルシネーション定義", html:`
<span class="slide-tag">DEFINITION</span>
<h2 class="slide-title">ハルシネーションとは何か</h2>
<p class="slide-lead">
ハルシネーション（幻覚出力）とは、LLMが生成する<strong class="emphasis">流暢で自信に満ちた、しかし事実に反する出力</strong>。単なる「誤り」ではなく、「<strong>誤りを自信満々に、しかも筋が通っているように語る</strong>」点が問題の本質である。
</p>

<div class="quote">
「試験で難しい問題に直面した学生が推測するように、大規模言語モデルも不確実な時に推測する。もっともらしいが不正確な記述を、不確実性を認める代わりに生成する。」
<br>— Kalai et al. (2025) Abstract
</div>

<div class="panel">
<div class="panel-title">なぜ「幻覚」と呼ぶのか？</div>
<div class="article">
<p>精神医学で「幻覚（hallucination）」は、<strong>実在しない知覚を本物と信じ込む</strong>現象を指す。LLMの誤出力も、</p>
<ul class="bullet">
<li>内部的には「正解」と同じ確信度で生成される</li>
<li>検証メカニズムが弱く、自己修正が効かない</li>
<li>流暢さは正解時と区別がつかない</li>
</ul>
<p>という特徴があり、まさに「幻覚」のアナロジーが成立する。<strong class="emphasis">「嘘をついている」のではなく、「本当に正しいと思って言っている」</strong>のが恐ろしい点。</p>
</div>
</div>

<div class="panel">
<div class="panel-title">ハルシネーションが統計解析で起きる典型パターン</div>
<div class="grid grid-2">
<div>
<ul class="bullet">
<li><span class="badge red">実在しないRパッケージ</span><br><code>firth.glm()</code> ← 正しくは <code>logistf::logistf()</code></li>
<li><span class="badge red">構文は正しいが統計的に不適切</span><br>完全分離があるのに通常GLMを勧める</li>
<li><span class="badge red">架空の引用文献</span><br>著者名・タイトル・DOIを捏造</li>
</ul>
</div>
<div>
<ul class="bullet">
<li><span class="badge red">p値の誤解釈</span><br>「p=0.03 なので因果が証明された」</li>
<li><span class="badge red">古い関数名・非推奨API</span><br>廃止された <code>aes_string()</code> 等</li>
<li><span class="badge red">係数と OR の混同</span><br><code>exp()</code> 忘れで 1000 倍違う値</li>
</ul>
</div>
</div>
<div class="warn-box">
これらはすべて <strong>"それっぽいコード"</strong> として出てくる。目視で見分けるのはほぼ不可能。<strong class="emphasis">必ず実行して動作確認し、結果を手計算で検証する</strong>ことが唯一の対策。
</div>
</div>
`},

/* ============ 4-2 統計的必然性 ============ */
{part:"Part 4", short:"統計的必然", html:`
<span class="slide-tag">THEOREM</span>
<h2 class="slide-title">ハルシネーションはバグではなく統計的必然</h2>
<p class="slide-lead">
ハルシネーションは<strong class="emphasis">プログラマの失敗や訓練データの汚染ではない</strong>。数学的に「キャリブレーションされた言語モデル＝確率分布を正しく学習したモデル」であれば、<strong>必ず一定割合のハルシネーションを起こす</strong>ことが証明されている。これが Kalai & Vempala (2024) の核心。
</p>

<div class="panel">
<div class="panel-title">キャリブレーション（Calibration）とは何か？ ─ まず定義から</div>
<div class="article">
<p>言語モデルが「次に来る単語は 'apple' だ」と 30% の確率で予測したとしよう。このモデルが<strong class="emphasis">本当に30%の頻度で 'apple' と出現するデータを正しく学習できている</strong>とき、「キャリブレーションされている」と言う。</p>
<p>これは望ましい性質だ。過度に自信満々でも、過度に臆病でもない、<strong>確率の出力が現実の頻度と一致する</strong>モデル。理想的な確率学習器である。</p>
<p>しかし、Kalai & Vempala はこの理想的なモデルですら、<strong>一定のハルシネーション率を持つことが数学的に避けられない</strong>ことを証明した。</p>
</div>
</div>

<div class="panel" style="background:linear-gradient(135deg,rgba(167,139,250,0.1),rgba(110,168,255,0.1))">
<div class="panel-title">定理（非形式的）</div>
<p style="font-size:calc(17px * var(--fs-mul));line-height:1.8;padding:10px">
キャリブレーションされた言語モデルは、<strong class="emphasis">訓練データに1回しか出現しない事実（singleton）の割合に比例するハルシネーション率</strong>を持つ。
</p>
<div style="background:var(--panel2);padding:18px;border-radius:8px;margin-top:12px">
<div style="font-family:'JetBrains Mono',monospace;font-size:calc(16px * var(--fs-mul));text-align:center;color:#d6deff;line-height:1.8">
生成エラー率 &ge; <span style="color:var(--accent2)">sr</span> &minus; 2/min|E<sub>c</sub>| &minus; O(&radic;(ln N / N)) &minus; &delta;
</div>
<div style="font-size:calc(13px * var(--fs-mul));color:var(--muted);margin-top:12px;text-align:center">
sr = 訓練データ中のシングルトン率 / δ = キャリブレーション誤差 / N = 訓練データ数
</div>
</div>
</div>

<div class="panel">
<div class="panel-title">なぜシングルトン（1回しか出ない事実）が問題なのか？</div>
<div class="article">
<p>言語モデルは「パターン学習器」である。「ある文脈で、次に来やすい単語は何か」という<strong>統計的規則性</strong>を無数のデータから抽出する。</p>
<p>ところが、訓練データに<strong class="emphasis">1回しか出てこない事実</strong>（例：ある個人の誕生日、珍しい論文のタイトル、特定のDOI）は、<strong>パターンを抽出する材料がない</strong>。モデルにとっては「ノイズ」と「正解」の区別がつかない。</p>
<p>こうした事実について質問されると、モデルは<strong>最もそれっぽい応答を確率的に生成する</strong>しかない。それが「正しい」確率は、訓練データのシングルトン率に比例して低下する。</p>
</div>
</div>

<h3 style="font-size:calc(22px * var(--fs-mul));color:var(--accent2);margin:22px 0 14px;padding-bottom:6px;border-bottom:1px solid var(--line)">3つの事実タイプと学習しやすさ</h3>

<div class="grid grid-3">
<div class="panel" style="background:rgba(74,222,128,0.04);border-color:rgba(74,222,128,0.3)">
<div class="panel-title" style="color:var(--ok)">パターン ①</div>
<p style="font-size:calc(18px * var(--fs-mul));font-weight:700;margin-bottom:8px">100 回以上出現</p>
<div class="article">
<p>例：「アインシュタインは物理学者」「水は H₂O」</p>
<p>多数の文脈で繰り返し出現 → 強固なパターンとして学習 → <strong>正答可能</strong>。</p>
</div>
</div>
<div class="panel" style="background:rgba(251,191,36,0.04);border-color:rgba(251,191,36,0.3)">
<div class="panel-title" style="color:var(--warn)">パターン ②</div>
<p style="font-size:calc(18px * var(--fs-mul));font-weight:700;margin-bottom:8px">10 回程度出現</p>
<div class="article">
<p>例：特定の中規模論文、ややマイナーな概念</p>
<p>多少のパターンは学習されるが、<strong>揺らぎがある</strong>。同じ質問で違う答えが出ることも。</p>
</div>
</div>
<div class="panel" style="background:rgba(248,113,113,0.04);border-color:rgba(248,113,113,0.3)">
<div class="panel-title" style="color:var(--bad)">パターン ③</div>
<p style="font-size:calc(18px * var(--fs-mul));font-weight:700;margin-bottom:8px">1 回だけ出現（Singleton）</p>
<div class="article">
<p>例：一般人の誕生日、珍しい博士論文のタイトル、特定のDOI</p>
<p>学習材料なし → <strong class="emphasis">必ずハルシネーション</strong>。</p>
</div>
</div>
</div>

<div class="warn-box">
<strong>重要な含意：</strong>医学論文の正確な書誌情報（著者・巻号・ページ・DOI）は<strong>ほとんどがシングルトン事実</strong>。つまり LLM に文献情報を尋ねると、<strong class="emphasis">構造的にハルシネーションが起きやすい領域</strong>である。必ず DOI で実在確認を。
</div>

<div class="cite">Kalai AT, Vempala SS. Calibrated Language Models Must Hallucinate. Proc. STOC 2024, pp.160-171. DOI: 10.1145/3618260.3649777</div>
`},

<text x="560" y="152" text-anchor="middle" font-size="10" font-weight="700" fill="#4ade80">正解</text>
<text x="560" y="166" text-anchor="middle" font-size="9" fill="#c5d2ff">(狭い)</text>
<!-- バツ印：誤生成 -->
<text x="620" y="140" text-anchor="middle" font-size="18" fill="#f87171">✗</text>
<text x="615" y="175" text-anchor="middle" font-size="18" fill="#f87171">✗</text>
<text x="638" y="158" text-anchor="middle" font-size="18" fill="#f87171">✗</text>
<text x="580" y="230" text-anchor="middle" font-size="13" fill="#fff">エラー率 ≥ <tspan fill="#fbbf24" font-weight="900" font-size="15">2ε</tspan></text>
</g>
</svg>
</div>
<div class="grid grid-2">
<div class="panel">
<div class="panel-title">Kalai et al. (2025) の中心定理</div>
<div style="background:var(--panel2);padding:18px;border-radius:10px;text-align:center;margin:12px 0">
<div style="font-family:'JetBrains Mono',monospace;font-size:20px;color:#fff">
(生成エラー率) <br>&#8805; 2 &times; (IIV 誤分類率)
</div>
</div>
<p style="font-size:15px;line-height:1.7">
<strong>直感的理解：</strong>「これは正しい？」と Yes/No で判定する問題より、「正しい出力を<em>作り出す</em>」生成タスクの方が本質的に難しい。<br>
分類で間違えるなら、生成では<strong>必ず2倍以上間違える</strong>。
</p>
</div>
<div class="panel">
<div class="panel-title">Figure 1 の3パターン</div>
<table>
<thead><tr><th>分野</th><th class="center">IIV難度</th><th class="center">生成結果</th></tr></thead>
<tbody>
<tr><td>Spelling（スペル）</td><td class="center ok">易</td><td class="center ok">良好</td></tr>
<tr><td>Counting（カウント）</td><td class="center warn">中</td><td class="center warn">並</td></tr>
<tr class="highlight-row"><td><strong>Birthdays（誕生日）</strong></td><td class="center bad">難</td><td class="center bad">悪</td></tr>

</div>
</div>
<div class="cite">Kalai AT, Nachum O, Vempala SS, Zhang E. Why Language Models Hallucinate. arXiv:2509.04664 (2025) Corollary 1, Figure 1.</div>

/* ============ 4-4 post-training の問題 ============ */
{part:"Part 4", short:"post-training問題", html:`
<span class="slide-tag">OBSERVATION 1</span>
<h2 class="slide-title">なぜ post-training でハルシネーションが消えないのか</h2>
<p class="slide-sub">言語モデルは「試験受験者」として最適化されている</p>
<div class="panel">
<div class="panel-title">主要ベンチマークの採点方式</div>
<div style="background:var(--panel2);padding:14px;border-radius:10px;font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.9">
<span style="color:var(--accent)">試験の採点方式:</span><br>
&nbsp;&nbsp;正答        → <span style="color:var(--ok)">1点</span><br>
&nbsp;&nbsp;不正答      → <span style="color:var(--bad)">0点</span><br>
&nbsp;&nbsp;「わからない」(IDK) → <span style="color:var(--warn)">0点</span><br>
<br>
<span style="color:var(--accent)">帰結:</span><br>
&nbsp;&nbsp;「わからない」と正直に答えても 0点<br>
&nbsp;&nbsp;推測して正答する可能性がある方が期待スコアが高い<br>
&nbsp;&nbsp;→ モデルは <strong style="color:var(--accent2)">推測（＝ハルシネーション）を学習する</strong>
</div>
</div>
<div class="panel" style="margin-top:14px">
<div class="panel-title">Observation 1（Kalai et al. 2025 Section 4.1）</div>
<div class="quote" style="margin:0">
任意の二値採点方式において、「棄権」（IDK）は最適な応答には含まれない。
</div>
<p style="font-size:12px;margin-top:10px;color:var(--muted)">
つまり、言語モデルのベンチマーク自体がハルシネーションを「報酬」している構造的問題がある。
</p>
</div>
`},

/* ============ 4-6 エラー3類型 ============ */
{part:"Part 4", short:"エラー3類型", html:`
<span class="slide-tag">ERROR TAXONOMY</span>
<h2 class="slide-title">生成エラーの3つの統計的要因</h2>
<div class="grid grid-3">
<div class="panel">
<div class="panel-title" style="color:var(--bad)">① Arbitrary Facts</div>
<p style="font-size:13px;line-height:1.6"><strong>任意事実</strong><br>
訓練データに少なくしか出現しない事実。パターンがないため学習不能。</p>
<ul class="bullet" style="margin-top:10px">
<li>誕生日</li>
<li>博士論文タイトル</li>
<li>特定のDOI</li>
<li>Rパッケージ名</li>
</ul>
<div class="danger-box" style="margin-top:10px;font-size:11px">対策：<strong>困難</strong>。データ不足が本質。検索拡張（RAG）で一部緩和。</div>
</div>
<div class="panel">
<div class="panel-title" style="color:var(--warn)">② Poor Models</div>
<p style="font-size:13px;line-height:1.6"><strong>不適切なモデル</strong><br>
モデル族の表現能力が不足。トークン化の制約など。</p>
<ul class="bullet" style="margin-top:10px">
<li>文字数カウント</li>
<li>桁数の多い計算</li>
<li>構文の揺れる命名</li>
<li>長距離依存</li>
</ul>
<div class="warn-box" style="margin-top:10px;font-size:11px">対策：<strong>改善可能</strong>。推論時計算（Chain-of-Thought）や専用ツール呼び出し。</div>
</div>
<div class="panel">
<div class="panel-title" style="color:var(--purple)">③ GIGO</div>
<p style="font-size:13px;line-height:1.6"><strong>Garbage In, Garbage Out</strong><br>
訓練データ中の誤情報がそのまま再現される。</p>
<ul class="bullet" style="margin-top:10px">
<li>ネット上の誤統計コード</li>
<li>古い医学知識</li>
<li>都市伝説</li>
<li>誤った引用習慣</li>
</ul>
<div class="note-box" style="margin-top:10px;font-size:11px">対策：<strong>部分的</strong>。post-trainingのRLHFで一部軽減可能。</div>
</div>
</div>
<div class="note-box">統計コード生成での典型：古い関数名は Arbitrary Facts、p値の誤解釈は GIGO、構文は正しいが統計的に不適切なコードは Poor Models。</div>
`},

{part:"Part 4", short:"信頼度閾値", html:`

</div>
<div class="grid grid-3" style="margin-top:16px">

<div class="label">t = 0.5</div>

</div>
<div class="stat">

</div>
<div class="stat">
<div class="label">t = 0.90</div>

<div class="sub">ペナルティ<br>（IDKが最適戦略に）</div>
</div>
</div>

/* ============ 4-9 7つの実践ルール ============ */
{part:"Part 4", short:"7つの実践ルール", html:`
<span class="slide-tag">PRACTICAL RULES</span>
<h2 class="slide-title">ハルシネーション抑制の7つの実践ルール</h2>
<div class="grid grid-2">
<div class="panel">
<ol class="num">
<li><strong>Rコードは必ず自分で実行する</strong><br><small>出力結果を目視確認</small></li>
<li><strong>パッケージの実在をCRANで確認</strong><br><small><code>install.packages()</code> が通るか</small></li>
<li><strong>関数のヘルプを読む</strong><br><small><code>?logistf</code> でデフォルト引数確認</small></li>
<li><strong>簡単な結果を手計算で検算</strong><br><small>2×2表のOR = ad/bc</small></li>
</ol>
</div>
<div class="panel">
<ol class="num" start="5">
<li><strong>Analyst-Inspector 方式</strong><br><small>同じ質問を別セッション／別モデルに聞き比較</small></li>
<li><strong>引用はDOIで実在確認</strong><br><small><code>https://doi.org/[DOI]</code> でアクセス</small></li>
<li><strong>プロンプトに制約を明記</strong><br><small>パッケージ・Rバージョン・出力形式を指定</small></li>
</ol>
</div>
</div>
<div class="ok-box" style="margin-top:16px">
<strong>黄金律：</strong>AIを「最終回答を出す同僚」ではなく、「叩き台を作る助手」と位置づける。検証・解釈・責任は自分が持つ。
</div>
`},

/* ============ 4-10 Analyst-Inspector ============ */
{part:"Part 4", short:"Analyst-Inspector", html:`

<h2 class="slide-title">Analyst-Inspector フレームワーク</h2>
<p class="slide-sub">Zeng et al. (2025) の提案。LLMの再現性を自動評価・改善する初の体系的枠組み</p>
<div class="flow" style="flex-direction:column;align-items:stretch;gap:10px">
  <div class="flow-box ai" style="padding:14px">

  </div>
  <div class="flow-arrow" style="text-align:center">↓ ワークフローのみを渡す</div>
  <div class="flow-box ai" style="padding:14px">

</p>
</div>

/* ============ 5-1 仮想データの目的 ============ */
{part:"Part 5", short:"今回のシミュレーション位置づけ", html:`
<span class="slide-tag">CONTEXT</span>
<h2 class="slide-title">今回のシミュレーションの位置づけ</h2>
<p class="slide-lead">
本 Part 5 の目的は、<strong class="emphasis">Yuasa 2002 論文を、2026年の統計学の基本とAI活用でどう再解析すべきか</strong>をシミュレーションすることにある。<strong>原データが既に存在しないため、今回は仮想データを用いた</strong>が、これは単なる便宜上の手段であり、本質はあくまで「<strong>現代の基準で、Rコード＋AIでどう解析を進めるか</strong>」を示すことにある。
</p>

<div class="panel">
<div class="panel-title">なぜ再解析するのか？ ─ 2026年の視点で</div>
<div class="article">
<p>Yuasa 2002 は当時の標準的手法に従って書かれた論文だが、Part 3 で見たように、現在の統計学の基準からは<strong class="emphasis">5つの改善余地</strong>がある。</p>
<p>これらを実際に<strong>手を動かして修正</strong>することで、読者は以下を体験的に理解できる：</p>
<ul class="bullet">
<li>現代のRコードでどのように書き下すのか</li>
<li>AIを使ってコードを生成する際の<strong>プロンプトの書き方</strong></li>
<li>完全分離を Firth 回帰で解消する具体手順</li>
<li>結果をどう検証し、どう批判的に解釈するか</li>
<li>論文の Methods セクションにどう記載するか</li>
</ul>
</div>
</div>

<div class="panel">
<div class="panel-title">仮想データを使った理由 ─ やむを得ない制約</div>
<div class="article">
<p>本来であれば Yuasa 2002 の<strong>個人レベルの生データ</strong>で再解析するのが理想である。しかし：</p>
<ul class="bullet">
<li>論文は 2002 年発表、データは 1997-1998 年に収集された紙カルテ時代</li>
<li>当時は「データ共有」「データレポジトリ」の概念が一般的でなかった</li>
<li>生データ（症例別の変数データ）は<strong>既に失われている</strong></li>
<li>公表されているのは Table 3 の<strong>集計表（度数）のみ</strong></li>
</ul>
<p>そこで、公表された度数から個人レベルのデータセットを再構成した<strong>仮想データ（44症例）</strong>を用いて、今回のシミュレーションを進める。</p>
</div>
</div>

<div class="warn-box">
<strong>重要な注意：</strong>仮想データはあくまで<strong>「解析手順を示すための教材」</strong>であり、本研究の目的は「湯浅論文の結論を検証すること」ではない。<strong class="emphasis">検証すべきは、AI時代の解析作法そのもの</strong>である。以降のスライドでは、各ステップで「なぜこう書くのか」「どう検証するのか」に焦点を当てる。
</div>

<div class="note-box">
個人レベルの変数間相関は周辺度数だけでは完全には再現できないため、多変量 OR の具体値は原論文と乖離する。しかし<strong>単変量 OR はほぼ完全に一致</strong>する。ただし次スライドで論じるように、「単変量 OR を報告すべきか」自体が批判の対象となる。
</div>
`},

{part:"Part 5", short:"仮想データ概要", html:`

  <div class="stat"><div class="label">変数</div><div class="value">10</div><div class="sub">解剖学的8 + 基本情報2</div></div>
</div>
<div class="panel" style="margin-top:14px">
<div class="panel-title">変数一覧</div>
<div class="grid grid-2">
<ul class="bullet">
<li><strong>Depth</strong>: A (high) / B (medium) / C (deep occlusal level)</li>
<li><strong>Ramus</strong>: Class 1-3 (space availability)</li>
<li><strong>Spatial</strong>: Vertical / Horizontal / Mesioangular / Distoangular</li>
<li><strong>Proximity</strong>: Distant / Close (to mandibular canal)</li>
</ul>
<ul class="bullet">
<li><strong>RootCurvature</strong>: Straight / Curved / Incomplete</li>
<li><strong>RootWidth</strong>: Thin / Bulbous / Thick / Incomplete</li>
<li><strong>HorizontalPosition</strong>: Buccal / Centre / Lingual / NoObs</li>
<li><strong>Age, Sex</strong>: 基本情報</li>
</ul>
</div>
</div>
<div style="text-align:center;margin-top:14px">
<button class="ctrl-btn" onclick="document.getElementById('dataViewer').scrollIntoView({behavior:'smooth'})" style="background:var(--accent);color:#fff;padding:10px 20px">▼ データテーブルを表示</button>
</div>

`, onShow:function(){
  const tbody = document.getElementById('dataTbody');
  if(!tbody || tbody.children.length > 0) return;
  YUASA_DATA.forEach(row => {
    const tr = document.createElement('tr');
    if(row.Group === 'Difficult') tr.style.background = 'rgba(248,113,113,0.05)';

  });
}},

/* ============ 5-3 RStudio 準備 ============ */
{part:"Part 5", short:"R/RStudio を準備", html:`
<span class="slide-tag">STEP 1 · SETUP</span>
<h2 class="slide-title">R と RStudio を準備する ─ 完全初心者向け</h2>
<p class="slide-lead">
まず環境を整える。<strong class="emphasis">R は統計解析エンジン本体</strong>、<strong class="emphasis">RStudio はその快適な作業環境（IDE）</strong>。両方ともオープンソースで無料。なぜ SPSS や Excel でなく R なのかは、<strong>再現性・コード公開・パッケージエコシステム</strong>の 3 点が決定的。
</p>

<div class="grid grid-2">
<div class="panel">
<div class="panel-title">なぜ R を使うのか？</div>
<div class="article">
<p><strong>① 完全無料・オープンソース</strong><br>
SPSS ライセンスは年間数十万円。R は CRAN から誰でも無料ダウンロード可能。</p>
<p><strong>② コードで解析全体が記録される</strong><br>
マウス操作で解析した SPSS は「どんな手順だったか」再現が難しい。R は<strong class="emphasis">全手順がスクリプトとして残る</strong>ため、論文の Methods にコード URL を載せて完全再現可能。</p>
<p><strong>③ 最新の統計手法がすぐ使える</strong><br>
Firth 法、Bayes ロジスティック、機械学習まで<strong>20,000以上のパッケージ</strong>が CRAN と Bioconductor で提供されている。</p>
<p><strong>④ AI との相性が良い</strong><br>
GPT、Claude など主要な LLM の訓練データには R コードが大量に含まれる。AI が最もコード生成しやすい統計言語の一つ。</p>
</div>
</div>
<div class="panel">
<div class="panel-title">インストール手順（Windows / Mac 共通）</div>

</div>
</div>

<p>一つの解析につき一つのフォルダを作り、そこにデータ・スクリプト・結果をまとめる。これが再現性の第一歩。</p>
<pre><span class="com"># 作業ディレクトリを確認</span>

`},

/* ============ 5-4 データ読み込み ============ */
{part:"Part 5", short:"データを R に読み込む", html:`
<span class="slide-tag">STEP 2 · IMPORT</span>
<h2 class="slide-title">仮想データを R に読み込む</h2>
<p class="slide-lead">
実際の手順：GitHub から <code>yuasa2002csv.txt</code> をダウンロード → プロジェクトフォルダに配置 → R で読み込み → 構造を確認。ここでは<strong class="emphasis">「データが正しく読めたか」を毎回確認するクセ</strong>が重要。
</p>

<div class="grid grid-2">
<div class="panel">
<div class="panel-title">Step A. ファイルの入手と配置</div>
<div class="article">
<p><strong>① GitHub からダウンロード</strong></p>
<pre><span class="com"># ブラウザで以下にアクセス</span>
https://github.com/mxe050/AI-DataStat
→ <span class="str">yuasa2002csv.txt</span> をクリック
→ 右上の <span class="kw">Download raw file</span> ボタン</pre>
<p><strong>② プロジェクトフォルダに保存</strong></p>
<pre><span class="com"># 例：以下のような構成にする</span>
Yuasa2002_Reanalysis/
├── yuasa2002csv.txt   <span class="com"># データファイル</span>
├── analysis.R         <span class="com"># Rスクリプト</span>
└── results/           <span class="com"># 結果出力用</span></pre>
</div>
</div>
<div class="panel">
<div class="panel-title">Step B. RStudio GUI で読み込む方法</div>
<div class="article">
<p><strong>初心者推奨：GUIインポーター</strong></p>
<ol class="num">
<li>右上 Environment ペインの <strong>Import Dataset</strong></li>
<li><strong>From Text (base)</strong> を選択</li>
<li>yuasa2002csv.txt を選択</li>
<li>プレビューで <strong>Separator: Tab</strong> を指定</li>
<li>Heading: <strong>Yes</strong> にチェック</li>
<li>右下に表示される Rコードをコピー</li>
<li>Import ボタン</li>
</ol>
<p>→ GUI で操作した内容が<strong class="emphasis">Rコードとして出力される</strong>ので、次回以降はコードだけで再実行可能。</p>
</div>
</div>
</div>

<div class="panel" style="margin-top:16px">
<div class="panel-title">Step C. コードで直接読み込む（推奨・再現性が高い）</div>
<pre><span class="com">## 1. 作業ディレクトリを設定（File → Set Working Directory → To Source File Location）</span>

<span class="com">## 2. データを読み込む</span>
<span class="kw">df</span> &lt;- <span class="kw">read.delim</span>(<span class="str">"yuasa2002csv.txt"</span>, header = <span class="kw">TRUE</span>, sep = <span class="str">"\\t"</span>, na.strings = <span class="str">"NA"</span>)

<span class="com">## 3. 構造を確認 ─ ここを省略しない！</span>
<span class="kw">dim</span>(df)         <span class="com"># → 44 × 11 が返ることを確認</span>
<span class="kw">head</span>(df)        <span class="com"># → 最初の6行を表示</span>
<span class="kw">str</span>(df)         <span class="com"># → 各列のデータ型を確認（chr / int / num）</span>
<span class="kw">summary</span>(df)     <span class="com"># → 数値列の要約統計</span>

<span class="com">## 4. アウトカム変数を作成（Difficult=1, Control=0）</span>
<span class="kw">df</span>$Outcome &lt;- <span class="kw">ifelse</span>(df$Group == <span class="str">"Difficult"</span>, 1, 0)

<span class="com">## 5. 因子変数を factor() に変換（カテゴリ順序を明示）</span>
<span class="kw">df</span>$Depth &lt;- <span class="kw">factor</span>(df$Depth, levels = <span class="kw">c</span>(<span class="str">"A"</span>, <span class="str">"B"</span>, <span class="str">"C"</span>))
<span class="kw">df</span>$Ramus &lt;- <span class="kw">factor</span>(df$Ramus, levels = <span class="kw">c</span>(<span class="str">"Class1"</span>, <span class="str">"Class2"</span>, <span class="str">"Class3"</span>))

<span class="com">## 6. 確認 ─ 因子のレベル数と度数</span>
<span class="kw">table</span>(df$Depth, df$Group)
<span class="com">#           Control  Difficult
#   A          14         6
#   B          10         9
#   C           0         5    ← ゼロセル発見！</span></pre>
</div>

<div class="warn-box">
<strong>⚠ 重要：</strong>データ読み込み直後に必ず <code>dim()</code>, <code>head()</code>, <code>str()</code>, <code>table()</code> で<strong class="emphasis">「思った通りに読めているか」</strong>を確認する。このクセが後のデバッグ時間を大幅に削減する。
</div>

<div class="note-box">
<strong>ゼロセルの発見：</strong>上記 <code>table()</code> で <strong>Control × Depth=C が 0 名</strong>であることがこの時点で分かる。これは Part 3 で議論した<strong>完全分離</strong>の兆候。次以降のステップで Firth 回帰を使う判断材料になる。
</div>
`},

/* ============ 5-5 方法論を先にAIに相談 ============ */
{part:"Part 5", short:"AIに統計手法を相談", html:`
<span class="slide-tag">STEP 3 · CONSULT</span>
<h2 class="slide-title">AIに「先に」統計手法を相談する ─ コードの前に方法論を</h2>
<p class="slide-lead">
<strong class="emphasis">いきなり「Rコードを書いて」と頼んではいけない。</strong>まず「この状況でどの統計手法が正しいのか」を AI と議論し、<strong>方法論的コンセンサスに沿っているか</strong>を確認する。ここで使うべき武器は、統計方法論で定評のある査読雑誌である。
</p>

<div class="panel">
<div class="panel-title">統計方法論で権威ある査読雑誌 ─ AIに参照させるべきリスト</div>
<div class="article">
<p>AI に手法を相談するとき、「どこに掲載された議論を参照しているか」を明示させることで、方法論の質が担保される。以下は<strong>臨床統計・医学研究方法論の主要査読誌</strong>：</p>
</div>
<div class="grid grid-2" style="margin-top:10px">
<table>
<thead><tr><th>雑誌名</th><th>特徴</th></tr></thead>
<tbody>
<tr><td><strong>Statistics in Medicine</strong></td><td>医学統計の王道（Firth 1993 掲載誌）</td></tr>
<tr><td><strong>Journal of Clinical Epidemiology</strong></td><td>臨床疫学・EPV 研究の本拠地</td></tr>
<tr><td><strong>BMC Medical Research Methodology</strong></td><td>方法論のオープンアクセス誌</td></tr>
<tr><td><strong>Biometrics</strong></td><td>生物統計学の老舗</td></tr>
<tr><td><strong>Biometrika</strong></td><td>純粋統計学の最高峰</td></tr>
</tbody>
</table>
<table>
<thead><tr><th>雑誌名</th><th>特徴</th></tr></thead>
<tbody>
<tr><td><strong>BMJ</strong></td><td>TRIPOD・STROBE・CONSORT 等の報告基準</td></tr>
<tr><td><strong>Annals of Internal Medicine</strong></td><td>臨床研究の高水準方法論</td></tr>
<tr><td><strong>Research Synthesis Methods</strong></td><td>メタ分析手法</td></tr>
<tr><td><strong>Journal of the Royal Statistical Society</strong></td><td>統計学の国際標準</td></tr>
<tr><td><strong>The American Statistician</strong></td><td>実務的統計の議論誌</td></tr>
</tbody>
</table>
</div>
</div>

<div class="panel" style="margin-top:16px">
<div class="panel-title">実際の相談プロンプト例 ─ コード依頼の"前"に</div>
<pre><span class="com"># システムロール</span>
あなたは臨床疫学の統計方法論に精通した研究者です。
回答時は <span class="hi">Statistics in Medicine</span>, <span class="hi">J Clin Epidemiol</span>,
<span class="hi">BMC Med Res Methodol</span>, <span class="hi">BMJ</span> など査読付き方法論雑誌の文献を必ず引用してください。

<span class="com"># 状況</span>
以下のデータで、下顎埋伏智歯の抜歯困難度を予測する
ロジスティック回帰モデルを構築したいと考えています。

<span class="com"># データの特徴</span>
- 症例対照研究、N = 44（Difficult 20, Control 24）
- 候補予測因子：9個（Depth, Ramus, Spatial, Proximity, RootCurvature,
  RootWidth, HorizontalPosition, Age, Sex）
- Depth = C では <span class="hi">Control 群が 0 名</span>（完全分離）
- <span class="hi">EPV = 20/9 ≈ 2.2</span>（極端に不足）

<span class="com"># 質問</span>
1. この状況で通常の最尤推定法 (glm with family=binomial) を使うのは
   <span class="hi">統計方法論的に妥当ですか？</span>根拠論文とともに答えてください。

2. もし代替手法を使うべきなら、
   <span class="hi">第一選択は何ですか？</span>次点の選択肢も含めて比較してください。

3. 変数選択の方法として：
   (a) 単変量でスクリーニング → 多変量
   (b) 臨床知識で事前選択
   (c) 罰則付き回帰 (LASSO/Ridge)
   (d) Bayes 事前分布
   のうち、<span class="hi">2026年の方法論的コンセンサスとして推奨されるのはどれですか？</span>
   近年の Statistics in Medicine / JCE の論説や BMJ TRIPOD+AI (2024) を
   踏まえて答えてください。

4. サンプルサイズ N=44 で、予測モデル構築は
   <span class="hi">そもそも妥当</span>ですか？Riley et al. (2019) の推奨に照らして答えてください。

<span class="com"># 回答形式</span>
- 各質問に対し、まず結論、次に根拠論文の著者・年・雑誌
- 引用は<span class="hi">実在するもののみ</span>（不確かなら「確認必要」と明記）</pre>
</div>

<div class="ok-box">
<strong>なぜこの順序なのか：</strong>AI に先にコードを書かせると、「書いたコードを使う前提」で議論が進んでしまう。<strong class="emphasis">方法論 → コード → 実行 → 検証</strong>の順序を守ることで、「このアプローチが正しいか」を最初の関門で担保できる。
</div>

<div class="warn-box">
<strong>期待される AI の応答例：</strong>「EPV=2.2 は Peduzzi (1996) の推奨 ≥10 に大きく不足しています。この規模では予測モデル構築より記述統計の提示が妥当です。どうしても回帰を行う場合は Firth 法 (Heinze & Schemper, Stat Med 2002) または Bayesian ロジスティック (Gelman et al., Annals Appl Stat 2008) を用いるべきです。変数選択については Harrell (2015) により事前選択が強く推奨されます…」
</div>
`},

/* ============ 5-6 Rプロンプト（既存を強化） ============ */
{part:"Part 5", short:"AIへのRコード依頼", html:`
<span class="slide-tag">STEP 4 · PROMPT</span>
<h2 class="slide-title">AI に R コード生成を依頼する ─ 制約条件が命</h2>
<p class="slide-lead">
前スライドで方法論のコンセンサスが得られたら、<strong class="emphasis">はじめて「その手法のコードを書いて」</strong>と頼む。このときプロンプトには、①方法論的根拠（文献）②バージョン情報 ③再現性制約 ④ハルシネーション抑制制約、を必ず含める。
</p>

<div class="panel">
<div class="panel-title">良いプロンプトの5要素</div>
<div class="article">
<p><strong>要素①：役割設定（Role）</strong> ─「あなたは臨床統計の専門家」</p>
<p><strong>要素②：方法論的根拠（Methodology）</strong> ─「Firth 法を使う根拠は Heinze & Schemper (Stat Med 2002)」のように明示</p>
<p><strong>要素③：バージョン固定（Version Pinning）</strong> ─ R 4.x / logistf 1.26.0 など</p>
<p><strong>要素④：再現性制約（Reproducibility）</strong> ─ <code>set.seed()</code>、<code>sessionInfo()</code>、<code>options(digits=4)</code></p>
<p><strong>要素⑤：ハルシネーション抑制（Constraints）</strong> ─「指定パッケージ以外使用禁止」「未定義関数使用禁止」</p>
</div>
</div>

<div class="panel" style="margin-top:16px">

<pre><span class="com"># 役割</span>

      RootCurvature, RootWidth, HorizontalPosition

<span class="com"># 方法論の前提（前セッションで確認済み）</span>
- EPV = 2.2 で小標本のため、予測モデル構築には限界がある
- Depth C で完全分離 → <span class="hi">Firth 罰則付き最尤推定法</span>を使う

<span class="com"># 解析手順（各ステップで何をするかのコメント必須）</span>

2. データ読み込み（<span class="kw">read.delim</span>）+ 構造確認（<span class="kw">str</span>, <span class="kw">dim</span>, <span class="kw">head</span>）

/* ============ 5-5 単変量OR ============ */
{part:"Part 5", short:"単変量OR報告の再考", html:`
<span class="slide-tag">CRITICAL RECONSIDERATION</span>
<h2 class="slide-title">単変量ORの報告 ─ そもそも現代でも正しい行為なのか？</h2>
<p class="slide-lead">
ここで立ち止まって考える必要がある。Yuasa 2002 で提示された<strong>単変量オッズ比の一覧表（Table 3）</strong>は、<strong class="emphasis">2026年の統計学の観点から、そもそも論文に掲載すべき情報なのだろうか？</strong><br>
この問いに向き合わずに「仮想データでも再現できた」と喜ぶのは、<strong>統計手法の本質的批判からの逃避</strong>になりかねない。
</p>

<div class="panel">
<div class="panel-title">単変量 OR を「ズラッと並べる」ことの統計学的問題</div>
<div class="article">
<p>単変量 OR の表は、見た目には整然としていて説得力があるように見える。しかし、次のような問題がある：</p>

<p><strong>① 交絡の影響を<strong class="emphasis">全く調整していない</strong></strong><br>
たとえば「Depth C の OR = ∞」と報告されても、それは Depth C の患者が年齢・性別・歯根形態などで他とどう違うか考慮していない。<strong>"粗い推定"</strong> にすぎない。</p>

<p><strong>② 多重検定の問題</strong><br>
9因子×複数カテゴリ ＝ <strong>20以上の p 値</strong>が並ぶ。どれかは偶然で有意になる（ファミリーワイズエラーレート）。補正なしで「有意」と言えば過剰検定。</p>

<p><strong>③ Table 1 で群間比較をする伝統と混同</strong><br>
Table 1（背景情報）の目的は「両群は比較可能か」を示すこと。Table 3 のように<strong class="emphasis">アウトカムとの関連を示す表で単変量スクリーニング</strong>をすると、Part 3 で述べた「データ駆動型変数選択」の問題を誘発する。</p>

<p><strong>④ 完全分離のセルで「OR = ∞」と報告する誤誘導</strong><br>
Yuasa 2002 の Depth C は「OR = ∞, 95% CI: 12,298 - ∞」と記載されている。これを見て「Depth C は決定的な予測因子」と解釈するのは、統計学的に誤り。単に<strong>データが足りない</strong>ことを示しているに過ぎない。</p>
</div>
</div>

<h3 style="font-size:calc(22px * var(--fs-mul));color:var(--accent2);margin:22px 0 14px;padding-bottom:6px;border-bottom:1px solid var(--line)">
では、2026年にどう報告すべきか？
</h3>

<div class="grid grid-2">
<div class="panel" style="border-color:rgba(248,113,113,0.4);background:rgba(248,113,113,0.04)">
<div class="panel-title" style="color:var(--bad)">❌ 2002年スタイル（非推奨）</div>
<ul class="bullet">
<li>9因子すべての単変量 OR 一覧表</li>
<li>OR ≥ 2.0 のものを太字や *</li>
<li>p &lt; 0.05 を強調</li>
<li>完全分離のセルもそのまま報告</li>
<li>「これらを候補として多変量に投入」</li>
</ul>
<div class="danger-box" style="margin-top:10px;font-size:calc(14px * var(--fs-mul))">
→ 読者に<strong>"多変量の前の予備解析"</strong>と誤解される。データ駆動型選択を誘発。
</div>
</div>
<div class="panel" style="border-color:rgba(74,222,128,0.4);background:rgba(74,222,128,0.04)">
<div class="panel-title" style="color:var(--ok)">✓ 2026年スタイル（推奨）</div>
<ul class="bullet">
<li>Table 1：両群の<strong>記述統計</strong>（頻度・平均・SD）</li>
<li>群間比較 p 値は<strong>載せない</strong>、または参考値として小さく</li>
<li>Table 2（または本研究での Table 2 相当）：<strong>事前に選んだ</strong>変数で多変量解析を実行</li>
<li>主解析は<strong>多変量のみ</strong>（Firth 回帰）</li>
<li>単変量 OR は<strong>付録（Supplementary）</strong>に</li>
</ul>
<div class="ok-box" style="margin-top:10px;font-size:calc(14px * var(--fs-mul))">
→ 読者は「事前に選んだ変数で、交絡調整した結果」を直接読める。解釈が明確。
</div>
</div>
</div>

<div class="panel" style="margin-top:16px">
<div class="panel-title">"Table 1 の p 値" 問題 ─ 同じ議論が近年盛り上がっている</div>
<div class="article">
<p>臨床研究の伝統では、Table 1（ベースライン特性）に群間比較の p 値を載せる慣習があった。しかし <strong>CONSORT (2010)</strong> 以降、<strong class="emphasis">「RCT では Table 1 に p 値を載せるべきでない」</strong>という指摘が主流化している。</p>
<p>理由は、無作為化により群は定義上"均衡"しており、p 値は意味を持たないから。同じ論理が症例対照研究にも部分的に適用でき、<strong>単変量 OR 表を無批判に並べる文化</strong>そのものが見直されている。</p>

{part:"Part 5", short:"完全分離確認", html:`
<span class="slide-tag">R EXECUTION</span>
<h2 class="slide-title">通常GLMで完全分離を実証する</h2>
<div class="panel">
<div class="panel-title">Rコード</div>
<pre><span class="kw">model_glm</span> &lt;- <span class="kw">glm</span>(Outcome ~ Depth_C + Ramus_3 + Root_Bulb,
                 family = binomial, data = df)
<span class="kw">summary</span>(model_glm)</pre>
</div>
<div class="panel" style="margin-top:14px">
<div class="panel-title">出力（警告 glm.fit: fitted probabilities numerically 0 or 1 occurred）</div>
<pre>              Estimate  Std. Error  z value  Pr(&gt;|z|)
(Intercept)   -1.504     0.700     -2.149    0.032
<span style="color:var(--bad)">Depth_C       18.173  2084.107      0.009    0.993  ← 係数が発散！</span>
Ramus_3        1.537     0.904      1.701    0.089
Root_Bulb      0.711     0.786      0.904    0.366</pre>
</div>
<div class="grid grid-2" style="margin-top:14px">
<div class="danger-box" style="margin:0">
<strong>問題：</strong>Depth_C の係数 = 18.17、標準誤差 = 2084<br>
→ z値 = 0.009 → p = 0.993 となり「有意でない」と誤判定してしまう<br>
→ OR = exp(18.17) ≈ 78,700,000 で解釈不能
</div>
<div class="warn-box" style="margin:0">
<strong>原因：</strong>Control群の Depth C が 0 名（完全分離）。<br>
通常の最尤推定法では、係数を ∞ に飛ばした方が尤度が高くなる。
</div>
</div>
<div class="ok-box">解決策 → <strong>Firth (1993) 罰則付き最尤推定法</strong>。次スライドで実行。</div>
`},

/* ============ 5-7 Firth回帰 ============ */
{part:"Part 5", short:"Firth回帰結果", html:`
<span class="slide-tag">FIRTH REGRESSION</span>
<h2 class="slide-title">Firth 罰則付きロジスティック回帰</h2>

  data = df)
<span class="kw">summary</span>(fit)</pre>
</div>
<div class="note-box" style="margin-top:10px">
Firth法：Jeffreys事前分布に相当する罰則を尤度に加え、係数の発散を防ぐ。有限で解釈可能な推定値が得られる。
</div>
</div>
<div>
<div class="panel">
<div class="panel-title">結果（仮想データでの再解析）</div>
<table style="font-size:12px">
<thead><tr><th>変数</th><th class="center">β</th><th class="center">OR</th><th class="center">95% CI</th><th class="center">p</th></tr></thead>
<tbody>
<tr><td>(Intercept)</td><td class="center">-1.18</td><td class="center">─</td><td class="center">─</td><td class="center">0.010</td></tr>
<tr class="highlight-row"><td><strong>Depth_C</strong></td><td class="center"><strong>2.60</strong></td><td class="center hi"><strong>13.45</strong></td><td class="center">1.06–1918</td><td class="center">0.044</td></tr>
<tr><td>Ramus_3</td><td class="center">1.24</td><td class="center">3.47</td><td class="center">0.58–23.8</td><td class="center">0.168</td></tr>
<tr><td>Root_Bulb</td><td class="center">0.65</td><td class="center">1.92</td><td class="center">0.44–8.37</td><td class="center">0.378</td></tr>
</tbody>
</table>
<div style="background:var(--panel2);padding:10px;border-radius:8px;margin-top:10px;font-size:12px">
