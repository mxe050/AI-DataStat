<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI時代のデータ解析 ─ Yuasa 2002 を題材に</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script>window.MathJax = {tex:{inlineMath:[['$','$'],['\\(','\\)']],displayMath:[['$$','$$'],['\\[','\\]']]}};</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" async></script>
<style>
/* ============================================================
   Light-mode design system
   読み物として成立することを最優先。情報密度より読みやすさ。
============================================================ */
:root{
  /* Background tiers */
  --bg: #faf8f3;            /* 暖かいクリーム */
  --bg-soft: #f4f1ea;       /* 副背景 */
  --surface: #ffffff;       /* カード／パネル */
  --surface-alt: #f8fafc;   /* 副パネル */
  --surface-tinted: #fdfaf3;/* 注釈帯 */

  /* Borders */
  --line: #e5e1d6;
  --line-strong: #d3cdbe;

  /* Text */
  --ink: #1f2937;           /* 本文 */
  --ink-strong: #0f172a;    /* 見出し */
  --ink-muted: #64748b;     /* 補助 */

  /* Accents (深色＋淡背景の対) */
  --blue: #1d4ed8;          --blue-bg:#e0e7ff;
  --amber: #b45309;         --amber-bg:#fef3c7;
  --green: #15803d;         --green-bg:#dcfce7;
  --red: #b91c1c;           --red-bg:#fee2e2;
  --purple: #6d28d9;        --purple-bg:#ede9fe;
  --teal: #0e7490;          --teal-bg:#cffafe;

  /* Box shadows */
  --shadow-sm: 0 1px 2px rgba(15,23,42,.04), 0 1px 3px rgba(15,23,42,.06);
  --shadow: 0 4px 6px rgba(15,23,42,.04), 0 10px 24px rgba(15,23,42,.08);
  --shadow-lg: 0 12px 28px rgba(15,23,42,.10);

  /* Typography */
  --font-sans: "Hiragino Kaku Gothic ProN","Yu Gothic UI","Yu Gothic","Meiryo","Helvetica Neue","Segoe UI",system-ui,sans-serif;
  --font-serif: "Hiragino Mincho ProN","Yu Mincho","YuMincho","Noto Serif JP",Georgia,serif;
  --font-mono: "JetBrains Mono","SF Mono","Consolas","Menlo",monospace;
  --fs-mul: 1;
}

*{box-sizing:border-box;margin:0;padding:0}
html,body{
  height:100%;background:var(--bg);color:var(--ink);
  font-family:var(--font-sans);font-feature-settings:"palt";
  -webkit-font-smoothing:antialiased;font-size:18px;line-height:1.8;
}
body{overflow:hidden}
body.reading-mode{overflow:auto}

/* ============================================================
   App layout
============================================================ */
#app{display:grid;grid-template-columns:300px 1fr;height:100vh;width:100vw;background:var(--bg)}
body.reading-mode #app{height:auto;min-height:100vh}

/* ============================================================
   Sidebar (TOC)
============================================================ */
#sidebar{
  background:var(--bg-soft);border-right:1px solid var(--line);
  overflow-y:auto;padding:18px 0;transition:transform .25s ease;
}
#sidebar::-webkit-scrollbar{width:6px}
#sidebar::-webkit-scrollbar-thumb{background:var(--line-strong);border-radius:3px}

.brand{padding:0 22px 16px;border-bottom:1px solid var(--line);margin-bottom:8px}
.brand h1{font-size:16px;font-weight:800;line-height:1.4;color:var(--ink-strong);letter-spacing:.02em}
.brand p{font-size:12px;color:var(--ink-muted);margin-top:6px;line-height:1.55}
.brand .gh{display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--blue);
  margin-top:8px;padding:4px 8px;background:var(--blue-bg);border-radius:6px;
  text-decoration:none;font-family:var(--font-mono)}

.toc{padding:6px 10px 80px}
.toc-part{margin-bottom:10px}
.toc-title{font-size:11px;font-weight:800;color:var(--blue);padding:10px 12px 4px;
  text-transform:uppercase;letter-spacing:.12em}
.toc-item{display:flex;gap:10px;padding:8px 14px;font-size:13px;color:var(--ink);
  border-radius:6px;cursor:pointer;transition:background .15s,color .15s;
  border-left:2px solid transparent;line-height:1.45}
.toc-item:hover{background:var(--surface);color:var(--ink-strong)}
.toc-item.active{background:var(--blue-bg);color:var(--blue);border-left-color:var(--blue);font-weight:700}
.toc-num{font-variant-numeric:tabular-nums;color:var(--ink-muted);min-width:22px;font-size:11px}
.toc-item.active .toc-num{color:var(--blue)}

/* ============================================================
   Main stage
============================================================ */
#stage{position:relative;overflow:hidden;background:var(--bg)}
body.reading-mode #stage{overflow:visible;height:auto}
#progress{position:fixed;top:0;left:300px;right:0;height:3px;background:var(--line);z-index:30}
#progress-bar{height:100%;background:linear-gradient(90deg,var(--blue),var(--purple));transition:width .25s;width:0}
body.reading-mode #progress{display:none}

#slides{position:relative;height:100%;width:100%}
body.reading-mode #slides{height:auto;max-width:880px;margin:0 auto;padding:40px 28px 120px}

.slide{
  position:absolute;inset:0;padding:60px 80px 110px;overflow-y:auto;
  opacity:0;pointer-events:none;transform:translateX(20px);
  transition:opacity .3s ease,transform .3s ease;
}
.slide.active{opacity:1;pointer-events:auto;transform:translateX(0)}
.slide::-webkit-scrollbar{width:10px}
.slide::-webkit-scrollbar-thumb{background:var(--line-strong);border-radius:5px}
.slide::-webkit-scrollbar-track{background:transparent}

body.reading-mode .slide{
  position:relative;inset:auto;padding:36px 0 56px;overflow:visible;
  opacity:1;pointer-events:auto;transform:none;
  border-bottom:1px dashed var(--line);
}
body.reading-mode .slide:last-child{border-bottom:none}

.slide-inner{max-width:980px;margin:0 auto}

/* ============================================================
   Slide header
============================================================ */
.slide-tag{
  display:inline-block;font-size:calc(12px * var(--fs-mul));font-weight:800;
  color:var(--blue);background:var(--blue-bg);padding:5px 12px;border-radius:999px;
  margin-bottom:14px;letter-spacing:.14em
}
h2.slide-title{
  font-size:calc(34px * var(--fs-mul));font-weight:800;line-height:1.3;
  margin-bottom:14px;color:var(--ink-strong);letter-spacing:-.005em
}
.slide-sub{
  font-size:calc(17px * var(--fs-mul));color:var(--ink-muted);
  margin-bottom:24px;line-height:1.7
}
.slide-lead{
  font-size:calc(17px * var(--fs-mul));color:var(--ink);margin-bottom:22px;line-height:1.85;
  padding:16px 22px;background:var(--surface-tinted);
  border-left:4px solid var(--amber);border-radius:0 8px 8px 0;
}
.slide-lead strong{color:var(--ink-strong)}

/* ============================================================
   Panels
============================================================ */
.panel{
  background:var(--surface);border:1px solid var(--line);border-radius:12px;
  padding:22px 26px;margin-bottom:18px;box-shadow:var(--shadow-sm)
}
.panel.tight{padding:14px 18px}
.panel.flush{padding:18px 22px}
.panel p{font-size:calc(16px * var(--fs-mul));line-height:1.85;color:var(--ink)}
.panel-title{
  font-size:calc(13px * var(--fs-mul));font-weight:800;color:var(--blue);
  text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px;
  display:flex;align-items:center;gap:10px
}
.panel-title::before{content:"";width:4px;height:16px;background:var(--blue);border-radius:2px}
.panel.amber .panel-title{color:var(--amber)}
.panel.amber .panel-title::before{background:var(--amber)}
.panel.green .panel-title{color:var(--green)}
.panel.green .panel-title::before{background:var(--green)}
.panel.red .panel-title{color:var(--red)}
.panel.red .panel-title::before{background:var(--red)}
.panel.purple .panel-title{color:var(--purple)}
.panel.purple .panel-title::before{background:var(--purple)}

/* Grid */
.grid{display:grid;gap:18px;margin-bottom:14px}
.grid-2{grid-template-columns:1fr 1fr}
.grid-3{grid-template-columns:repeat(3,1fr)}
.grid-4{grid-template-columns:repeat(4,1fr)}
.grid-ab{grid-template-columns:1fr 1.4fr}
@media (max-width:1100px){.grid-2,.grid-3,.grid-4,.grid-ab{grid-template-columns:1fr}}

/* ============================================================
   Tables
============================================================ */
table{
  width:100%;border-collapse:separate;border-spacing:0;
  font-size:calc(15px * var(--fs-mul));background:var(--surface);
  border-radius:8px;overflow:hidden;border:1px solid var(--line)
}
th,td{padding:11px 14px;text-align:left;border-bottom:1px solid var(--line);line-height:1.55}
th{
  background:var(--surface-alt);font-size:calc(12px * var(--fs-mul));
  text-transform:uppercase;letter-spacing:.06em;color:var(--blue);font-weight:800
}
tr:last-child td{border-bottom:none}
tr:nth-child(2n) td{background:var(--surface-alt)}
td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
td.center,th.center{text-align:center}
.bad{color:var(--red);font-weight:700}
.ok{color:var(--green);font-weight:700}
.warn{color:var(--amber);font-weight:700}
.hi{color:var(--amber);font-weight:700}

/* ============================================================
   Lists
============================================================ */
ul.bullet{list-style:none;padding-left:0}
ul.bullet li{
  padding:7px 0 7px 26px;position:relative;
  font-size:calc(16px * var(--fs-mul));line-height:1.75;color:var(--ink)
}
ul.bullet li::before{
  content:"▸";position:absolute;left:6px;top:7px;
  color:var(--blue);font-size:calc(15px * var(--fs-mul));font-weight:700
}
ol.num{padding-left:26px}
ol.num li{padding:7px 0;font-size:calc(16px * var(--fs-mul));line-height:1.75}
ol.num li::marker{color:var(--blue);font-weight:700}

/* ============================================================
   Article (long prose)
============================================================ */
.article{font-size:calc(16px * var(--fs-mul));line-height:1.9;color:var(--ink)}
.article p{margin-bottom:12px}
.article p:last-child{margin-bottom:0}
.article h3{
  font-size:calc(19px * var(--fs-mul));color:var(--ink-strong);margin:18px 0 10px;
  padding-bottom:6px;border-bottom:1px solid var(--line);font-weight:700
}
.article h4{font-size:calc(16px * var(--fs-mul));color:var(--blue);margin:14px 0 6px;font-weight:700}
.article strong{color:var(--ink-strong);font-weight:700}

.section-head{
  font-size:calc(20px * var(--fs-mul));color:var(--ink-strong);
  margin:24px 0 14px;padding-bottom:8px;border-bottom:2px solid var(--blue);
  font-weight:800;letter-spacing:.02em
}

/* ============================================================
   Badges & callouts
============================================================ */
.badge{
  display:inline-block;padding:3px 10px;border-radius:5px;font-size:calc(12px * var(--fs-mul));
  font-weight:700;margin-right:5px;letter-spacing:.04em
}
.badge.blue{background:var(--blue-bg);color:var(--blue)}
.badge.amber{background:var(--amber-bg);color:var(--amber)}
.badge.green{background:var(--green-bg);color:var(--green)}
.badge.red{background:var(--red-bg);color:var(--red)}
.badge.purple{background:var(--purple-bg);color:var(--purple)}

.quote{
  border-left:5px solid var(--amber);padding:16px 22px;
  background:var(--amber-bg);font-style:italic;
  font-size:calc(17px * var(--fs-mul));line-height:1.75;
  border-radius:0 8px 8px 0;margin:14px 0;color:var(--ink-strong)
}
.cite{
  font-size:calc(13px * var(--fs-mul));color:var(--ink-muted);
  margin-top:10px;line-height:1.6;font-style:italic
}
.cite a{color:var(--blue);text-decoration:underline;text-decoration-style:dotted}
.emphasis{
  background:linear-gradient(transparent 60%,#fde68a 60%);
  font-weight:700;padding:0 2px
}

/* ============================================================
   Code
============================================================ */
code,pre{font-family:var(--font-mono)}
pre{
  background:#0f172a;color:#e2e8f0;border-radius:8px;padding:16px 20px;
  overflow-x:auto;font-size:calc(14px * var(--fs-mul));line-height:1.7;margin:8px 0;
  border:1px solid var(--line);box-shadow:var(--shadow-sm)
}
code{
  background:var(--surface-alt);padding:2px 6px;border-radius:4px;
  font-size:calc(14px * var(--fs-mul));color:var(--ink-strong);
  border:1px solid var(--line)
}
pre code{background:none;padding:0;color:inherit;border:none}
.kw{color:#c4b5fd}
.str{color:#86efac}
.com{color:#94a3b8;font-style:italic}
.numv{color:#fbbf24}

/* ============================================================
   Stat card
============================================================ */
.stat{
  background:var(--surface);padding:20px 22px;border-radius:10px;
  border:1px solid var(--line);box-shadow:var(--shadow-sm)
}
.stat .label{
  font-size:calc(12px * var(--fs-mul));color:var(--ink-muted);
  text-transform:uppercase;letter-spacing:.1em;font-weight:700
}
.stat .value{
  font-size:calc(32px * var(--fs-mul));font-weight:900;line-height:1.15;
  margin-top:4px;color:var(--blue)
}
.stat .sub{
  font-size:calc(13px * var(--fs-mul));color:var(--ink-muted);
  margin-top:6px;line-height:1.5
}
.stat.amber .value{color:var(--amber)}
.stat.green .value{color:var(--green)}
.stat.red .value{color:var(--red)}
.stat.purple .value{color:var(--purple)}

/* ============================================================
   Callout boxes
============================================================ */
.note-box,.warn-box,.danger-box,.ok-box,.info-box{
  padding:14px 20px;border-radius:0 8px 8px 0;margin:12px 0;
  font-size:calc(15px * var(--fs-mul));line-height:1.75
}
.note-box{background:var(--blue-bg);border-left:4px solid var(--blue);color:#1e3a8a}
.note-box::before{content:"💡 ";margin-right:4px}
.warn-box{background:var(--amber-bg);border-left:4px solid var(--amber);color:#78350f}
.warn-box::before{content:"⚠ ";margin-right:4px;font-weight:900}
.danger-box{background:var(--red-bg);border-left:4px solid var(--red);color:#7f1d1d}
.danger-box::before{content:"🚫 ";margin-right:4px}
.ok-box{background:var(--green-bg);border-left:4px solid var(--green);color:#14532d}
.ok-box::before{content:"✓ ";margin-right:4px;font-weight:900}
.info-box{background:var(--teal-bg);border-left:4px solid var(--teal);color:#155e75}
.note-box strong,.warn-box strong,.danger-box strong,.ok-box strong,.info-box strong{color:inherit}

/* ============================================================
   Flow boxes
============================================================ */
.flow{display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap;padding:14px 0}
.flow.col{flex-direction:column;align-items:stretch;gap:10px}
.flow-box{
  background:var(--surface);border:1px solid var(--line);padding:14px 18px;border-radius:8px;
  font-size:calc(14px * var(--fs-mul));text-align:center;min-width:140px;line-height:1.55;
  box-shadow:var(--shadow-sm)
}
.flow-box.ai{border-color:var(--purple);background:var(--purple-bg)}
.flow-box.human{border-color:var(--green);background:var(--green-bg)}
.flow-box.danger{border-color:var(--red);background:var(--red-bg)}
.flow-arrow{color:var(--blue);font-size:calc(20px * var(--fs-mul));font-weight:700}
.flow.col .flow-arrow{text-align:center}

/* ============================================================
   Title slide
============================================================ */
.title-slide{
  display:flex;flex-direction:column;justify-content:center;align-items:center;
  text-align:center;padding:40px;min-height:80vh
}
.title-slide h1{
  font-size:64px;font-weight:900;line-height:1.15;letter-spacing:-.02em;
  color:var(--ink-strong);margin-bottom:18px
}
.title-slide h1 span{color:var(--blue)}
.title-slide .lead{
  font-size:20px;color:var(--ink-muted);max-width:780px;line-height:1.7;margin-bottom:30px
}
.title-slide .meta{font-size:14px;color:var(--ink-muted);margin-top:36px;line-height:1.7}
.title-deco{
  font-size:14px;letter-spacing:.5em;color:var(--blue);
  text-transform:uppercase;margin-bottom:14px;font-weight:700
}

/* Section divider */
.section-slide{
  display:flex;flex-direction:column;justify-content:center;height:100%;
  background:linear-gradient(180deg,var(--bg) 0%,var(--bg-soft) 100%);
  padding:60px 40px;border-radius:8px
}
.section-slide .part-num{
  font-size:140px;font-weight:900;line-height:1;color:var(--blue);
  opacity:.18;margin-bottom:-50px;font-family:var(--font-mono)
}
.section-slide h2{
  font-size:54px;font-weight:900;line-height:1.15;margin-bottom:18px;color:var(--ink-strong)
}
.section-slide .section-desc{
  font-size:19px;color:var(--ink);max-width:780px;line-height:1.7
}
.section-slide .section-bridge{
  margin-top:24px;padding:18px 22px;background:var(--surface);border:1px solid var(--line);
  border-radius:8px;max-width:780px;font-size:15px;color:var(--ink);line-height:1.7
}
.section-slide .section-bridge strong{color:var(--blue)}

/* ============================================================
   Controls
============================================================ */
#controls{
  position:fixed;bottom:18px;left:50%;transform:translateX(-50%);
  display:flex;align-items:center;gap:8px;background:var(--surface);
  border:1px solid var(--line);padding:8px 14px;border-radius:999px;
  box-shadow:var(--shadow);z-index:25
}
body.reading-mode #controls{position:fixed;bottom:18px}
.ctrl-btn{
  background:transparent;border:none;color:var(--ink);padding:7px 14px;
  border-radius:999px;cursor:pointer;font-size:14px;font-weight:600;
  transition:background .15s,color .15s
}
.ctrl-btn:hover:not(:disabled){background:var(--blue-bg);color:var(--blue)}
.ctrl-btn:disabled{opacity:.35;cursor:not-allowed}
.ctrl-btn.primary{background:var(--blue);color:#fff}
.ctrl-btn.primary:hover:not(:disabled){background:#1e3a8a;color:#fff}
.counter{
  font-size:13px;color:var(--ink-muted);font-variant-numeric:tabular-nums;
  min-width:62px;text-align:center
}
.divider{width:1px;height:22px;background:var(--line)}
.fs-control{display:flex;align-items:center;gap:3px}
.fs-btn{
  background:transparent;border:1px solid var(--line);color:var(--ink);
  width:28px;height:28px;border-radius:6px;cursor:pointer;font-weight:700;
  transition:all .15s;font-size:13px
}
.fs-btn:hover{background:var(--blue-bg);border-color:var(--blue);color:var(--blue)}
.mode-toggle{
  display:inline-flex;align-items:center;gap:6px;background:transparent;
  border:1px solid var(--line);padding:5px 12px;border-radius:999px;cursor:pointer;
  font-size:12px;font-weight:600;color:var(--ink);transition:all .15s
}
.mode-toggle:hover{background:var(--blue-bg);border-color:var(--blue);color:var(--blue)}
.mode-toggle.on{background:var(--blue);color:#fff;border-color:var(--blue)}

/* ============================================================
   Misc
============================================================ */
.kbd{
  display:inline-block;padding:2px 7px;background:var(--surface);
  border:1px solid var(--line);border-radius:4px;
  font-size:11px;font-family:var(--font-mono);color:var(--ink)
}
.svg-wrap{
  background:var(--surface);border-radius:10px;padding:14px;margin:10px 0;
  display:flex;justify-content:center;align-items:center;border:1px solid var(--line)
}
.svg-wrap svg{max-width:100%;height:auto}
.svg-caption{font-size:12px;color:var(--ink-muted);text-align:center;margin-top:6px;font-style:italic}

.chart-wrap{
  background:var(--surface);padding:14px;border-radius:10px;position:relative;height:240px;
  border:1px solid var(--line)
}
.chart-wrap.tall{height:320px}

.slider-container{
  background:var(--surface-alt);padding:14px 16px;border-radius:8px;margin:10px 0;
  border:1px solid var(--line)
}
.slider-container label{display:flex;justify-content:space-between;font-size:13px;margin-bottom:8px;color:var(--ink-muted)}
.slider-container input[type=range]{width:100%;accent-color:var(--blue)}

.data-scroll{max-height:300px;overflow-y:auto;border-radius:8px;border:1px solid var(--line)}
.data-scroll table{font-size:11px}
.data-scroll th,.data-scroll td{padding:5px 8px}
.data-scroll::-webkit-scrollbar{width:6px}
.data-scroll::-webkit-scrollbar-thumb{background:var(--line-strong);border-radius:3px}

.highlight-row{background:var(--amber-bg) !important}
.highlight-row td{color:#78350f}

.vs-grid{display:grid;grid-template-columns:1fr auto 1fr;gap:14px;align-items:stretch}
.vs-divider{display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:var(--blue);padding:0 4px}

/* YouTube button */
.yt-btn{
  display:inline-flex;align-items:center;gap:10px;padding:12px 22px;
  background:#cc0000;color:#fff;text-decoration:none;
  border-radius:10px;font-weight:700;font-size:calc(15px * var(--fs-mul));
  transition:all .15s;box-shadow:var(--shadow);
}
.yt-btn:hover{background:#990000;transform:translateY(-1px);box-shadow:var(--shadow-lg)}
.yt-btn svg{width:22px;height:22px;flex-shrink:0}

/* Reading-mode anchor numbers */
body.reading-mode .slide{padding-top:48px;position:relative}
body.reading-mode .slide-anchor{
  position:absolute;top:8px;left:0;
  font-size:12px;color:var(--ink-muted);font-family:var(--font-mono);
  letter-spacing:.05em
}

#menu-toggle{
  display:none;position:fixed;top:14px;left:14px;z-index:35;
  background:var(--surface);border:1px solid var(--line);border-radius:8px;
  padding:8px 12px;color:var(--ink);cursor:pointer;font-size:14px;
  box-shadow:var(--shadow-sm)
}

/* ============================================================
   Copy-to-clipboard button (pre 内右上) ─ pre.output は除外
============================================================ */
pre{position:relative}
.copy-btn{
  position:absolute;top:8px;right:8px;
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);
  color:#e2e8f0;padding:5px 11px;border-radius:6px;
  font-size:11px;font-weight:600;cursor:pointer;
  font-family:var(--font-sans);transition:all .15s;
  letter-spacing:.04em;line-height:1;
  user-select:none;-webkit-user-select:none
}
.copy-btn:hover{background:rgba(255,255,255,.16);border-color:rgba(255,255,255,.30)}
.copy-btn:active{transform:scale(.96)}
.copy-btn.copied{background:rgba(74,222,128,.25);color:#86efac;border-color:rgba(134,239,172,.4)}
@media (max-width:900px){
  .copy-btn{font-size:10px;padding:4px 9px}
}

/* ============================================================
   実行結果（コピー対象外、別カラー）
============================================================ */
pre.output{
  background:#f1f5f9;color:#1e293b;
  border:1px solid var(--line);
  border-left:3px solid var(--ink-muted);
  font-size:13px;margin-top:6px;margin-bottom:14px;
  border-radius:6px;
  user-select:text
}
pre.output::before{
  content:"↓ 実行結果（コピー不要）";
  display:block;
  font-family:var(--font-sans);
  font-size:11px;color:var(--ink-muted);
  font-weight:700;letter-spacing:.05em;
  margin-bottom:8px;padding-bottom:6px;
  border-bottom:1px dashed var(--line-strong)
}
pre.output .copy-btn{display:none !important}

/* ============================================================
   章導入コラム（青系・初心者向け解説の統一スタイル）
============================================================ */
.intro-block{
  background:#eff6ff;border:1px solid var(--blue);
  border-radius:12px;padding:18px 22px;margin-bottom:16px;
  box-shadow:var(--shadow-sm)
}
.intro-block .intro-label{
  display:inline-block;font-size:11px;font-weight:800;color:var(--blue);
  letter-spacing:.12em;text-transform:uppercase;
  background:white;padding:3px 10px;border-radius:999px;
  border:1px solid var(--blue);margin-bottom:10px
}
.intro-block .intro-title{
  font-size:calc(16px * var(--fs-mul));font-weight:800;
  color:var(--ink-strong);margin-bottom:10px;line-height:1.5
}
.intro-block .intro-body{
  font-size:calc(15px * var(--fs-mul));line-height:1.85;color:var(--ink)
}
.intro-block .intro-body p{margin-bottom:10px}
.intro-block .intro-body p:last-child{margin-bottom:0}
.intro-block .intro-body strong{color:var(--ink-strong)}

/* ステップラベル（緑系・新ワークフローの位置づけ用） */
.step-label{
  background:#dcfce7;border:1px solid var(--green);
  border-radius:10px;padding:10px 16px;margin-bottom:14px;
  display:flex;align-items:center;gap:10px
}
.step-label .step-tag{
  flex-shrink:0;font-size:11px;font-weight:800;color:var(--green);
  letter-spacing:.1em;background:white;padding:3px 9px;
  border-radius:999px;border:1px solid var(--green)
}
.step-label .step-text{
  font-size:calc(14px * var(--fs-mul));line-height:1.65;color:var(--ink)
}
.step-label .step-text strong{color:var(--ink-strong)}

/* ============================================================
   Screenshot placeholder（後日スクショ追加用枠）
============================================================ */
.screenshot{margin:14px 0}
.screenshot.loaded img{
  width:100%;border-radius:10px;border:1px solid var(--line);
  box-shadow:var(--shadow-sm);display:block
}
.screenshot.loaded figcaption{
  font-size:13px;color:var(--ink-muted);margin-top:8px;
  font-style:italic;line-height:1.6;text-align:center
}
.screenshot.empty{
  background:var(--surface-alt);
  border:2px dashed var(--line-strong);
  border-radius:10px;padding:24px 20px;text-align:center
}
.screenshot.empty .ph-icon{font-size:30px;display:block;margin-bottom:6px}
.screenshot.empty .ph-label{
  display:inline-block;font-size:11px;font-weight:800;
  color:var(--blue);background:var(--blue-bg);padding:3px 10px;
  border-radius:999px;letter-spacing:.1em;margin-bottom:8px

.screenshot.empty .ph-src{
  font-size:12px;color:var(--ink-muted);font-family:var(--font-mono);
  word-break:break-all;line-height:1.6;margin-bottom:6px
}
.screenshot.empty .ph-desc{
  font-size:13px;color:var(--ink);font-weight:500;
  line-height:1.6;margin-top:4px
}

============================================================ */

/* ============ 全体構成 ============ */
{part:"序章", short:"全体構成", html:`
<div class="slide-inner">
<span class="slide-tag">ROADMAP</span>
<h2 class="slide-title">全体構成 ─ 7 つのパートと学習の流れ</h2>
<p class="slide-sub">「AIで文献を探す → 題材論文を読む → 統計の問題を見抜く → 自分で再解析する → AIの限界を理解する → 倫理的に開示する → 未来を見据える」という一本の道筋。</p>

<div class="grid grid-2">
  <div class="panel">
    <div class="panel-title">Part 1 ─ AI を研究助手として使う</div>
    <p class="article">PICO 形式でリサーチクエスチョンを定義し、AI に文献検索を依頼する。実例を通じて「AI が自信満々につく嘘」を体験し、検証ワークフローを身につける。</p>
  </div>
  <div class="panel">
    <div class="panel-title">Part 2 ─ 題材論文 Yuasa 2002 を読み解く</div>
    <p class="article">下顎埋伏智歯の分類体系（Winter 1926, Pell &amp; Gregory 1933, Pederson 1988）の系譜のうえに Yuasa 2002 を位置づける。研究デザイン、Table 2〜6 の中身、度数の検算まで踏み込む。</p>
  </div>
  <div class="panel amber">
    <div class="panel-title">Part 3 ─ 2002 年の統計手法の問題点</div>
    <p class="article">同じ論文を 2026 年の基準で吟味する。データ駆動型変数選択、EPV 不足、完全分離、楽観バイアス、再現不能、STROBE チェック ─ 6 つの問題点を可視化する。</p>
  </div>
  <div class="panel green">
    <div class="panel-title">Part 4 ─ もし今やり直すなら：R + AI で再解析</div>
    <p class="article">R/RStudio の準備から、AI への統計手法相談、コード生成プロンプト、エラー対応、Firth 回帰、ROC/AUC まで実演。<strong>AI に頼るところと譲らないところ</strong>を実体験する。</p>
  </div>
  <div class="panel purple">
    <div class="panel-title">Part 5 ─ なぜ AI は嘘をつくのか：ハルシネーション理論</div>
    <p class="article">Part 4 で AI を実際に使ったあとに理論を学ぶ。Kalai et al. (2024, 2025) の証明を通じて、ハルシネーションが<strong>バグではなく統計的必然</strong>であることを理解する。</p>
  </div>
  <div class="panel">
    <div class="panel-title">Part 6 ─ AI 使用の開示・倫理・再現性</div>
    <p class="article">AMEE Guide No.192、Resnik &amp; Hosseini の判断フレームワーク、TRIPOD+AI チェックリスト。<strong>「SPSS を謝罪しないように、AI も謝罪しない」</strong>が、方法論として記載する責務はある。</p>
  </div>
  <div class="panel red" style="grid-column:span 2">
    <div class="panel-title">Part 7 ─ AI 時代の医学データ解析・最前線</div>
    <p class="article">Yuasa 論文を離れて視点を広げる。AI 加速型の自動 p-hacking、Epic Sepsis Model の崩壊、ゼロ・ハルシネーション設計、FDA 規制フレームワーク。そして「AI に頼りまくる、でも肝心なところは譲らない」11 段階ワークフロー。</p>
  </div>
</div>

<div class="note-box">
<strong>原版（2026 年初版）からの変更：</strong>「実践のあとに理論」が学習効果が高いという判断から、<strong>R 再解析（Part 4）→ ハルシネーション理論（Part 5）</strong> の順に並び替えた。AI を実際に触ってから、なぜ AI が嘘をつくのかを学ぶ。
</div>
</div>
`},

/* ============ 1-1 PICO定義 ============ */
{part:"Part 1", short:"PICO で問いを定義", html:`
<div class="slide-inner">
<span class="slide-tag">STEP 1</span>
<h2 class="slide-title">リサーチクエスチョンを PICO で定義する</h2>
<p class="slide-lead">
AI に漠然と「何か解析して」と頼んではいけない。<strong>構造化された質問が、ハルシネーション抑制の第一歩</strong>。PICO（Patient, Intervention, Comparator, Outcome）はそのための古典的な枠組み。
</p>

<div class="panel">
<div class="panel-title">本研究での臨床的疑問</div>
<p style="font-size:21px;font-weight:700;color:var(--ink-strong)">下顎埋伏智歯の抜歯困難度を、<span class="hi">術前に</span>予測できるか？</p>
</div>

<div class="grid grid-4">
  <div class="panel" style="background:#eff6ff">
    <div style="font-size:36px;font-weight:900;color:var(--blue);margin-bottom:6px">P</div>
    <div style="font-size:14px;font-weight:700;color:var(--ink-strong);margin-bottom:6px">Patient（患者）</div>
    <div style="font-size:13px;line-height:1.6">下顎埋伏智歯の抜歯予定患者<br><span style="color:var(--ink-muted)">N=44（実データ）</span></div>
  </div>
  <div class="panel" style="background:#f5f3ff">
    <div style="font-size:36px;font-weight:900;color:var(--purple);margin-bottom:6px">I</div>
    <div style="font-size:14px;font-weight:700;color:var(--ink-strong);margin-bottom:6px">Intervention（評価）</div>
    <div style="font-size:13px;line-height:1.6">術前パノラマ X 線所見<br><span style="color:var(--ink-muted)">深さ・下顎枝・歯根形態</span></div>
  </div>
  <div class="panel" style="background:#fef3c7">
    <div style="font-size:36px;font-weight:900;color:var(--amber);margin-bottom:6px">C</div>
    <div style="font-size:14px;font-weight:700;color:var(--ink-strong);margin-bottom:6px">Comparator（比較）</div>
    <div style="font-size:13px;line-height:1.6">予測なし<br>または Pederson 指数</div>
  </div>
  <div class="panel" style="background:#dcfce7">
    <div style="font-size:36px;font-weight:900;color:var(--green);margin-bottom:6px">O</div>
    <div style="font-size:14px;font-weight:700;color:var(--ink-strong);margin-bottom:6px">Outcome（転帰）</div>
    <div style="font-size:13px;line-height:1.6">抜歯困難<br><span style="color:var(--ink-muted)">手術時間 ≥ 30 分 or 術者判断</span></div>
  </div>
</div>

<div class="ok-box">
PICO で固めた時点で「<strong>何を、何と、何と比べて、どう測るか</strong>」が明確になる。AI への質問もシャープになり、ハルシネーションの余地が減る。
</div>
</div>
`},

/* ============ 1-2 AI文献検索プロンプト ============ */
{part:"Part 1", short:"AI に文献検索を依頼", html:`
<div class="slide-inner">
<span class="slide-tag">STEP 2</span>
<h2 class="slide-title">AI に文献検索を依頼する</h2>
<p class="slide-lead">
制約条件を明示的に書くことが、ハルシネーション抑制の鍵。ただし<strong>制約をどれだけ書いても、ハルシネーションは完全には消えない</strong>（次スライドで実例を示す）。
</p>

<div class="grid grid-ab">
<div class="panel">
<div class="panel-title">推奨プロンプト</div>
<pre><span class="com"># 役割設定</span>
<span class="kw">あなたは</span> 口腔外科の統計解析に詳しい研究者です。

<span class="com"># タスク</span>
下顎埋伏智歯の抜歯困難度予測に関する
主要な論文を 10 件、以下の形式で：

  - 著者（年）
  - タイトル
  - ジャーナル名・巻号・ページ
  - DOI（<span class="hi">実在するもののみ</span>）
  - 研究デザイン・N
  - 使用統計手法
  - 主な結果

<span class="com"># 制約（ハルシネーション防止）</span>
- 存在しない論文は <span class="hi">絶対に含めない</span>
- 不確かな場合は「<span class="hi">確認が必要</span>」と明記
- DOI を捏造しない
</pre>
</div>

<div>
<div class="panel">
<div class="panel-title">なぜこの制約が必要か</div>
<ul class="bullet">
  <li><strong>役割設定</strong>：特定ドメインへのアテンションを集中</li>
  <li><strong>出力形式固定</strong>：構造化により検証が容易になる</li>
  <li><strong>"実在のみ"明示</strong>：ハルシネーション率を下げる効果が報告されている</li>
  <li><strong>不確実性の許可</strong>：「わからない」と答えやすくする ─ Kalai 2025 の処方</li>
</ul>
</div>
<div class="warn-box">
これらの制約をつけても、Kalai et al. (2025) が証明したとおりハルシネーションは完全には消えない。<strong>必ず検証ステップが要る</strong>。
</div>
<div class="cite">参考：Kalai AT, Nachum O, Vempala SS, Zhang E. <em>Why Language Models Hallucinate.</em> arXiv:2509.04664 (2025).</div>
</div>
</div>
</div>
`},

/* ============ 1-4 検証手順 ============ */
{part:"Part 1", short:"引用は DOI で実在確認", html:`
<div class="slide-inner">
<span class="slide-tag">VERIFICATION</span>
<h2 class="slide-title">AI が出力した引用は必ず実在確認する</h2>
<p class="slide-lead">
架空の引用が 1 つでも混入すれば、研究全体の信頼性が損なわれる。<strong>5 ステップの検証手順をルーチン化</strong>し、すべての引用に必ず適用する。
</p>

<div class="grid grid-ab">
<div class="panel">
<div class="panel-title">5 ステップ検証手順</div>
<ol class="num">
  <li>DOI を <code>https://doi.org/[DOI]</code> で直接アクセス</li>
  <li>PubMed / Google Scholar でタイトル完全一致検索</li>
  <li>著者名・年・巻号・ページを原著と照合</li>
  <li>Abstract を読み、AI の要約と内容が一致するか確認</li>
  <li>不一致があれば <strong>AI の出力を破棄</strong> し原著を使用</li>
</ol>
</div>

<div class="panel">
<div class="panel-title">そのまま使える Fact Check プロンプト（前ページの 3 モデル回答用）</div>
<p style="font-size:14px;color:var(--ink-muted);margin-bottom:8px">
前のスライドで 3 つの AI モデルが返した「Adam Kalai の博士論文タイトル」回答の真偽を、別の AI セッションに <strong>事実確認だけ</strong> させるプロンプト。コードブロック右上の 📋 でコピー →&nbsp;新しい AI セッションに貼り付け。
</p>
<pre><span class="com"># 役割</span>
あなたは厳密な書誌情報の <span class="kw">ファクトチェッカー</span> です。
学術論文・学位論文・DOI・PMID・URL の <span class="kw">実在性</span> のみを確認してください。
推測や創作は厳禁。

<span class="com"># 確認してほしい情報（前ページの 3 モデル回答）</span>

【回答 1：ChatGPT (GPT-4o)】
- タイトル： "Boosting, Online Algorithms, and Other Topics in Machine Learning"
- 大学：    CMU
- 年：      2002

【回答 2：DeepSeek】
- タイトル： "Algebraic Methods in Interactive Machine Learning"
- 大学：    Harvard
- 年：      2005

【回答 3：Llama】
- タイトル： "Efficient Algorithms for Learning and Playing Games"
- 大学：    MIT
- 年：      2007

<span class="com"># 出力ルール（厳守）</span>
各回答について、以下を <span class="kw">必ずこの順</span> で答えてください。

1. その学位論文タイトルは <span class="kw">実在しますか？</span>
   → 実在する場合：「実在します」+ 公式 URL / DOI / PMID / リポジトリ URL
   → 実在しない場合：「実在しません」と明記
   → URL が見つからない場合は <span class="kw">「URL はない」</span> と返答（捏造禁止）

2. 著者・大学・年は正しいですか？
   → 一致する点と一致しない点を列挙

3. <span class="kw">合っている／違っている</span> の最終判定を 1 行で

<span class="com"># 制約</span>
- <span class="kw">URL を捏造しないこと</span>
- 推測で「たぶん〜」と返さないこと
- 不確かな場合は「不明」と正直に答える
- 引用元を <span class="kw">必ず</span> 明示する

<span class="com"># 比較用：正解（Kalai 2025 Table 1 より）</span>
タイトル： "Probabilistic and on-line methods in machine learning"
大学：    CMU   /   年： 2001</pre>
<div class="note-box" style="margin-top:10px;font-size:13px">

</div>
</div>
</div>

<div class="ok-box">
この確認作業は省略できない。<strong>ルーチン化し、すべての引用に対して必ず行う</strong>。1 件でもサボると、それが命取りになる。

/* ============ 1-5 AI時代でもPubMed ============ */
{part:"Part 1", short:"AI 時代でも PubMed", html:`
<div class="slide-inner">
<span class="slide-tag">PRINCIPLE</span>
<h2 class="slide-title">AI 時代でも PubMed ─ 医療者が譲れない原則</h2>
<p class="slide-lead">
AI 検索ツールが急増する 2026 年。しかし<strong class="emphasis">医療における情報検索</strong>は、他分野と比べて本質的に要求水準が高い。<strong>データベース（PubMed 等）を自分で引く能力は、AI 時代においてむしろ重要性を増している</strong>。
</p>

<div class="grid grid-2">
  <div class="panel">
    <div class="panel-title">① 医学以外の分野 ─ 比較的シンプル</div>
    <div class="article">
    <p>アカデミア内では比較的市場が広く、主な利用者は<strong>学部生・大学院生</strong>。検索ニーズは「先行研究調査」「研究ギャップ発見」など、新規性や独創性の担保が中心。</p>
    <p><strong class="emphasis">「査読付き論文であること」</strong>が質を保証する主要基準で、Deep Research や Consensus といった学術特化型 AI 検索ツールがそのニーズに応える。</p>
    <div class="ok-box" style="font-size:14px">「網羅性」「新規性確認」が目的なので、AI 要約で十分機能する場面が多い。</div>
    </div>
  </div>
  <div class="panel red">
    <div class="panel-title">② 医学分野 ─ 目的で細かく分かれる専門市場</div>
    <div class="article">
    <p>医学分野の検索は、<strong class="emphasis">目的によって極めて細かく分類される</strong>専門的な市場。</p>
    <p><strong>検索目的の多様性：</strong></p>
    <ul class="bullet" style="margin:6px 0">
      <li>EBM（根拠に基づく医療）</li>
      <li>総論・教科書的情報</li>
      <li>日常の臨床疑問</li>
      <li>システマティックレビュー</li>
    </ul>
    <p>ややこしいのが <strong>EBM と言っても、本質まで理解しているかで大きく異なる</strong> こと。</p>
    </div>
  </div>
</div>

<h3 class="section-head">EBM の理解度で分かれる 2 つのタイプ</h3>

<div class="grid grid-2">
  <div class="panel red">
    <div class="panel-title">A. EBM の理解が不十分な場合</div>
    <div class="article">
    <p>「臨床のための検索」と称していても、検索結果が <strong class="emphasis">「PubMed に掲載されている」というだけで</strong> 質の高い情報だと見なしてしまう傾向がある（インパクトファクターが高ければさらに良い、という単純な基準）。</p>
    <p>医学分野の AI 開発でも、<strong>このレベルが基本</strong>である場合が多い。これでは本来の EBM とは呼べない。</p>
    </div>
  </div>
  <div class="panel green">
    <div class="panel-title">B. EBM の本質を理解している場合</div>
    <div class="article">
    <p>EBM の実践には <strong class="emphasis">「現在手に入る最高のエビデンス」</strong> が必要。透明性はもちろん、極端に言えば SR と異なりブラックボックスでも検索結果に信頼性が担保できれば良い。しかし<strong>それは不可能</strong>（不安感もあるし、ある日突然アルゴリズムが悪意に変わる可能性）。</p>
    <p>よって、<strong>透明性が必要</strong>。しかし AI 開発で全てを公開するのは競争世界では無理。</p>
    </div>
  </div>
</div>

<div class="panel">
  <div class="panel-title">AI 検索の限界 ─ 透明性と学習データの本質問題</div>
  <div class="article">
    <p>現在の AI は、<strong>OpenEvidence</strong>（有名論文ばかりという逆弊害あり）などの限定されたデータの特別な場合を除き、<strong class="emphasis">オープンソースからの学習がほとんど</strong>。これでは透明性以前に、<strong>真摯に患者のための臨床としてダメダメ</strong>なのが理解できる。</p>
    <p><strong>AI でまとめた記事のみを読んで患者に適用するなんて、論外である。</strong></p>
    <p>さらに「AI で検索された論文はチェックすること」との記載があるが、そもそも<strong>引用論文をすべて読んでいない</strong>などは研究者・臨床家としての質が問われる問題で、チェックするのは当たり前。</p>
  </div>
</div>

<div class="panel">
  <div class="panel-title">批判的吟味 ─ AI には代替できない最後の砦</div>
  <div class="article">
    <p>得られた文献（情報）を <strong class="emphasis">批判的吟味</strong> し、本当に患者に適用できるか、他の選択肢がないかも十分に調べなければならない。</p>
    <p>特に <strong>批判的吟味まで行う AI</strong> は、可能としても <strong class="emphasis">一律の判定になる</strong>。その吟味の結果、この研究はどこを注意しながら、どのデータを使えるかまでは <strong>AI では不可能</strong>。</p>
    <p>よって、<strong>医療関係者一人一人のプロ意識が重要</strong>と考える。</p>
  </div>
</div>
</div>
`},

/* ============ 1-6 AIとPubMedの使い分け ============ */
{part:"Part 1", short:"AI と PubMed の使い分け", html:`
<div class="slide-inner">
<span class="slide-tag">USE CASES</span>
<h2 class="slide-title">AI と PubMed の使い分け ─ どちらを、いつ使うか</h2>
<p class="slide-lead">
「AI と PubMed、結局どっちを使えばいいの？」という疑問への素直な答え：<strong class="emphasis">用途で分ければよい</strong>。両方とも気軽に使える状態にしておくのが、AI 時代の医療者の標準装備。
</p>

<div class="grid grid-2">
  <div class="panel purple">
    <div class="panel-title">こんなときは AI が便利</div>
    <ul class="bullet">
      <li><strong>トピックスの俯瞰</strong>：今この分野で何がホットか</li>
      <li><strong>「あの時にあった、アレ」</strong>：うろ覚えの記事や論文の手がかり探し</li>
      <li><strong>背景要因の整理</strong>：ある疾患に関連する因子を網羅的にリストアップ</li>
      <li>研究計画の壁打ち、要約、用語の確認</li>
      <li><strong>PICO に乗らない疑問</strong>：臨床疑問の枠組みに整理しきれない雑多な問い</li>
    </ul>
    <div class="note-box" style="font-size:14px;margin-top:10px">
      ふんわりした入口の段階では、AI のスピードと網羅性が圧倒的に役立つ。
    </div>
    <div class="panel" style="margin-top:10px;background:#f5f3ff;border-color:var(--purple);padding:14px 16px">
      <div style="font-weight:700;color:var(--purple);font-size:13px;margin-bottom:6px">💡 「PICO に乗らない疑問」の具体例</div>
      <p style="font-size:14px;line-height:1.75;color:var(--ink);margin:0">
        たとえば、<strong>「Winter / Pell &amp; Gregory の下顎第三大臼歯分類が "誤って使われている" と指摘している論文を探して」</strong> のような <strong class="emphasis">分類体系の誤用</strong>・概念の混乱・歴史的経緯・命名問題などは、患者・介入・比較・転帰（PICO）の枠に収まりません。<br>
        こうした <strong>"分類学の使われ方そのもの" を扱った疑問</strong> は、PubMed の MeSH では拾いにくく、<strong class="emphasis">AI による横断的な探索が圧倒的に有用</strong>。AI に「批判的レビュー」「誤用」「misuse」「misinterpretation」等のキーワードを含めて聞くと、見落としていた論考が出てくることが多い。
      </p>
    </div>
  </div>

  <div class="panel green">
    <div class="panel-title">こんなときは PubMed が確実</div>
    <ul class="bullet">
      <li><strong>臨床疑問が PICO として明確になった</strong>とき</li>
      <li>特定の患者・介入・転帰に対する <strong>根拠</strong> を取りに行くとき</li>
      <li>引用したい論文の <strong>正確な書誌情報</strong> を確定させるとき</li>
      <li>査読者やレビュアーに「裏取りした」と言える状態を作るとき</li>
    </ul>
    <div class="ok-box" style="font-size:14px;margin-top:10px">
      PICO で問いが固まった瞬間から、PubMed が AI より確実かつ速い局面に変わる。
    </div>
  </div>
</div>

<h3 class="section-head">ハイブリッドの使い方 ─ AI に PubMed の検索式を作らせる</h3>

<div class="panel">
<div class="article">
<p>面白いことに、<strong class="emphasis">PubMed でどう検索式を組めばよいかを AI に作らせる</strong>こともできる。MeSH 用語の組み合わせ、Boolean 演算子（AND / OR / NOT）、Filter（言語・期間・研究デザイン）の指定などを、AI に下書きさせて、自分で PubMed に貼って実行する。</p>
<p>これは「AI で検索する」のではなく「<strong>AI に検索式を書かせて、PubMed で検索する</strong>」という使い方。両者の良いとこ取り。</p>
<p><strong>ただし注意：</strong>システマティックレビュー (SR) の検索式は <strong class="emphasis">普段の検索式とは別物</strong>。網羅性・再現性・透明性が要求され、検索式自体が論文の Methods に丸ごと載る。AI の下書きをそのまま使うと不完全になりがちで、ちょっと分かりにくい世界。SR をやるなら、図書館員（情報専門職）と組むのが王道。</p>
</div>
</div>

<div class="ok-box">
<strong>結論：</strong>AI と PubMed は <strong class="emphasis">どちらも気軽に使える</strong> 状態にしておくのが大切。AI で広く当たり、PICO が固まったら PubMed で確実に取りに行く ─ この往復ができれば、AI 時代の医療者として強い。<br>
そのためには、<strong>PubMed そのものに馴染んでおく</strong>必要がある。次のスライドで PubMed 検索を体系的に学ぶ講座を紹介する。
</div>
</div>
`},

{part:"Part 2", short:"━━ Part 2 開始 ━━", html:`

/* ============ 2-2 研究デザイン ============ */
{part:"Part 2", short:"2 段階の研究デザイン", html:`
<div class="slide-inner">
<span class="slide-tag">STUDY DESIGN</span>
<h2 class="slide-title">Yuasa 2002 の 2 段階アプローチ</h2>

<div class="panel" style="background:#eff6ff;border-color:var(--blue);margin-bottom:14px">
<div class="panel-title">📚 はじめに：「探索的研究」とロジスティック回帰の世界観（統計が初めての方へ）</div>
<div class="article">
<p>Yuasa 2002 のような研究は <strong class="emphasis">「探索的研究（exploratory study）」</strong> と呼ばれます。「結果（抜歯が困難になるか）に影響する要因はどれだろう？」を、複数の候補から探していく研究です。<strong>2002 年から今に至るまで、医学では「ロジスティック回帰分析」が標準的</strong> に使われてきました。聞き慣れない用語が次々出てくるので、下の 4 枚のカードで身近なたとえで整理します。</p>
</div>
</div>

<div class="grid grid-2" style="margin-bottom:14px">
  <div class="panel">
    <div class="panel-title">1. 単変量 vs 多変量 ─ カレーのたとえ</div>
    <p style="font-size:calc(15px * var(--fs-mul));line-height:1.85">「<strong>カレーが辛くなる原因</strong>」を調べたい料理研究家がいるとします。</p>
    <ul class="bullet">
      <li><strong>単変量解析</strong>：唐辛子だけ／胡椒だけ／玉ねぎだけ ─ <strong class="emphasis">1 つずつ別々に</strong> 関係を見る。<strong>勘違い（交絡）</strong> が起きやすい</li>
      <li><strong>多変量解析</strong>：すべての調味料を <strong class="emphasis">同時に</strong> 考慮して、それぞれの独立効果を切り分ける</li>
    </ul>
    <p style="font-size:calc(14px * var(--fs-mul));line-height:1.75;color:var(--ink-muted);margin-top:8px">本研究：歯の深さ・歯根の形・下顎枝との関係などが互いに関係するため、<strong>各因子の独立効果を切り分けるには多変量解析が必要</strong>。</p>
  </div>

  <div class="panel">
    <div class="panel-title">2. なぜ「ロジスティック回帰」？</div>
    <p style="font-size:calc(15px * var(--fs-mul));line-height:1.85"><strong>結果の "形"</strong> によって、使う多変量解析が変わります。</p>
    <ul class="bullet">
      <li>結果が <strong>連続値</strong>（身長・血圧）→ 線形回帰</li>
      <li>結果が <strong>Yes/No</strong>（困難/普通、生存/死亡）→ <strong class="emphasis">ロジスティック回帰</strong></li>
      <li>結果が <strong>時間</strong>（再発までの日数）→ Cox 回帰</li>
    </ul>
    <p style="font-size:calc(14px * var(--fs-mul));line-height:1.75;color:var(--ink-muted);margin-top:8px">本研究は「困難 / 普通」の 2 値判定なので <strong>ロジスティック回帰</strong> を選びます。</p>
  </div>

  <div class="panel">
    <div class="panel-title">3. ロジスティック回帰で何が分かる？</div>
    <p style="font-size:calc(15px * var(--fs-mul));line-height:1.85">各候補因子について、次の数字を <strong>同時に</strong> 計算してくれます：</p>
    <ul class="bullet">
      <li><strong>オッズ比 (OR)</strong>：その因子があると困難になるオッズが何倍か（例：歯根が球状なら 6.5 倍）</li>
      <li><strong>95% 信頼区間 (CI)</strong>：OR の "確からしさ" の幅</li>
      <li><strong>p 値</strong>：偶然にこんな結果が出る確率</li>
    </ul>
    <p style="font-size:calc(14px * var(--fs-mul));line-height:1.75;color:var(--ink-muted);margin-top:8px">これらを並べると <strong>「どの因子が一番効いているか」順位づけ</strong> ができる ─ これが探索的研究で「要因を探す」の正体。</p>
  </div>

  <div class="panel amber">
    <div class="panel-title">4. 2002 年当時の "標準的なやり方"</div>
    <p style="font-size:calc(15px * var(--fs-mul));line-height:1.85">2002 年頃の医学では、ロジスティック回帰を <strong>2 段階</strong> で使うのが定番でした（Yuasa 2002 もこの流れ）：</p>
    <ol class="num">
      <li><strong>Stage 1 単変量解析</strong>：各因子を 1 つずつ結果と比べる</li>
      <li><strong>Stage 2 多変量解析</strong>：Stage 1 で関係が強かった因子だけ集めて回帰へ</li>
    </ol>
    <p style="font-size:calc(14px * var(--fs-mul));line-height:1.75;color:var(--red);margin-top:8px"><strong>現代では「やってはいけない方法」とされています</strong>（理由は Part 3 で詳しく）。</p>
  </div>
</div>

<div class="ok-box">
本章ではまず <strong>「2002 年の標準的な探索的研究のやり方」</strong> を素直に学びます。問題点の指摘は Part 3 でまとめて扱うので、今は「当時はこう考えられていた」を理解してください。
</div>

<p class="slide-sub">専門医の暗黙知を Stage 1 で集約し、Stage 2 で症例データから統計的に検証する設計。</p>

<div class="grid grid-2">
<div class="panel">
<div class="panel-title">Stage 1 ─ 専門医アンケート</div>
<p class="article">
40 名の口腔外科専門医に郵送、36 名が回答（33 男・3 女、25-44 歳）。<strong>23 因子</strong>を Likert 5 段階で評価。<br>
<em>目的：困難度に影響する因子の優先順位を決める。</em>
</p>
<ul class="bullet">
  <li>1 = no relation（関係なし）</li>
  <li>2 = virtually no relation</li>
  <li>3 = weak relation</li>
  <li>4 = relation</li>
  <li>5 = strong relation</li>
</ul>
</div>

<div class="panel">
<div class="panel-title">Stage 2 ─ 症例対照研究</div>
<p class="article">
1997 年 4-10 月、愛知学院大学歯学部で抜歯された 44 名を解析。<strong>Difficult 群</strong>：時間 ≥ 30 分 <em>or</em> 術者が困難と判断。<br>
<em>目的：アンケート上位因子の統計的検証。</em>
</p>
<table style="font-size:13px;margin-top:8px">
  <thead><tr><th></th><th class="center">Difficult</th><th class="center">Control</th></tr></thead>
  <tbody>
    <tr><td>N</td><td class="center"><strong>20</strong></td><td class="center"><strong>24</strong></td></tr>
    <tr><td>年齢（平均）</td><td class="center">27.5</td><td class="center">26.0</td></tr>
    <tr><td>男 / 女</td><td class="center">8 / 12</td><td class="center">6 / 18</td></tr>
  </tbody>
</table>
</div>
</div>

<div class="note-box">
Stage 1 のアンケート結果が、後の変数選択の <strong>"臨床的根拠"</strong> として機能する（Part 3 で再登場）。
</div>
</div>
`},

  <li><strong>VBA マクロでカウント</strong></li>

</ul>

</div>
</div>

<ul class="bullet">
  <li><strong>決定論的</strong>：データと条件が同じなら結果も必ず同じ</li>
  <li><strong>GUI で誰でも操作可能</strong>：コードが書けなくても使える</li>
  <li><strong>再集計が瞬時</strong>：変数を入れ替えて別角度から検証できる</li>
  <li><strong>Excel/Google スプレッドシートの両方で使える</strong>：環境を選ばない</li>
  <li><strong>論文作成で頻用する技術</strong>：一度習得すれば他の研究にも応用可</li>
</ul>
<p><strong>結果：</strong>Yuasa 2002 の Table 3 を数秒で再生成可能。数値が一致すれば「論文の集計は正しい」と確定、不一致なら論文側のミスが判明。</p>
</div>
</div>

<div class="panel" style="background:#eff6ff;border-color:var(--blue)">
<div class="panel-title">📚 コラム：ピボットテーブルの使い方が分からなければ AI に聞こう</div>
<div class="article">
<p>ピボットテーブルの操作が初めてなら、<strong>素直に AI に聞くのが最短ルート</strong>。「Excel のピボットテーブルで、A 列を行、B 列を列、C 列を値にして個数を集計したい。手順を画像つきで初心者向けに教えて」と頼めば、十分に詳しい手順が返ってくる。</p>

<p>さらに重要なのが、<strong class="emphasis">途中で詰まったらすぐスクショを撮って AI に貼り付ける</strong>こと。「画面のここで止まりました」と画像を 1 枚渡せば、AI が状況を読み取って次の一手を教えてくれる。文章で説明するよりはるかに速い。</p>

<h4>スクショを「気軽に」撮れる環境を整える</h4>

<p>このとき効いてくるのが、<strong>スクショを撮るハードルを下げておく</strong>準備。意外と見落とされがちだが、AI 時代の研究者には「気軽にスクショを撮れる状態」が研究効率を直接左右する。</p>

<ul class="bullet">
  <li><strong>Windows</strong>：<span class="kbd">Win + Shift + S</span>（標準の「切り取り＆スケッチ」）／<strong>ShareX</strong> や <strong>Greenshot</strong> といった無料ソフトを入れておくとさらに快適</li>
  <li><strong>Mac</strong>：<span class="kbd">⌘ + Shift + 4</span> で範囲選択、<span class="kbd">⌘ + Shift + 5</span> でツールバー表示。標準でも十分使える</li>
  <li><strong>ブラウザ</strong>：右クリック → 「スクリーンショット」で部分撮影できる（Chrome / Firefox / Edge）</li>
  <li><strong>Excel・RStudio など</strong>：右クリックでスクショは出せないため、上記 OS のショートカットが必須</li>
</ul>

<p>「<strong>分からない場面に遭遇したら、即スクショを撮って AI に貼り付ける</strong>」── この習慣が、調べる時間を圧倒的に短縮する。<strong>AI に聞きやすい環境づくり</strong>は、地味だが本講義の大事なテーマの一つ。</p>

<div class="slide-inner">
<span class="slide-tag">問題 ①</span>
<h2 class="slide-title">データ駆動型変数選択の罠</h2>
<p class="slide-lead">
「<strong class="emphasis">データを見てから変数を選ぶ</strong>」方法はすべて危険である。具体的には、<strong>単変量解析で有意差があった因子のみを多変量に投入する方法</strong>、<strong>ステップワイズ（段階的）選択</strong>、<strong>OR や p 値でのスクリーニング</strong> など、自動選択全般が問題視されている。
</p>

<div class="panel">
<div class="panel-title">何が問題なのか？ ─ 5 つの統計学的根拠</div>
<div class="article">
<p><strong>① 選択バイアス（Selection Bias）</strong><br>
「データから選んだ」変数だけを残すと、<strong class="emphasis">偶然の関連</strong> が本物の関連として紛れ込む。同じ集団で選択と推定を行うため、回帰係数は体系的に過大評価（upward bias）される。</p>

<p><strong>② 抑制変数（Suppressor Variable）の見逃し</strong><br>
単変量では有意でなくても、他の変数と組み合わせた多変量解析で <strong>重要な情報を提供する変数</strong> が存在する。これを "suppressor" と呼ぶ。単変量スクリーニングではこれらを機械的に除外してしまう。</p>

<p><strong>③ 信頼区間の過少評価</strong><br>
変数選択プロセス自体の不確実性を CI が反映していない。実際より "シャープ" に見える CI は誤った安心感を与える。</p>

<p><strong>④ 交絡因子（Confounder）の適切な調整ができない</strong><br>
交絡因子は単変量で有意でなくても、調整のために残すべき。自動選択は「統計的に有意」と「臨床的に重要」を混同する。</p>

<p><strong>⑤ p 値の意味が崩壊する</strong><br>
選択後の p 値は「ある仮説を検定した結果」ではなく、「<strong>選ばれたから目立つ</strong>」値になっている。通常の統計的解釈（type I error = 5%）が成立しない。</p>
</div>
</div>

<div class="grid grid-2">
<div class="panel red">
<div class="panel-title">2002 年当時よく行われた方法</div>
<ul class="bullet">
  <li>単変量解析で <strong>p &lt; 0.05</strong> の因子のみ多変量に投入</li>
  <li>単変量解析で <strong>p &lt; 0.20</strong> の因子のみ多変量に投入（ゆるい基準）</li>
  <li>単変量解析で <strong>OR ≥ 2.0</strong> の因子のみ多変量に投入（Yuasa 2002）</li>
  <li>多変量で <strong>ステップワイズ選択</strong>（backward / forward / stepwise）</li>
  <li>AIC / BIC で自動的に変数を削除</li>
</ul>
<div class="danger-box" style="margin-top:10px">
これらはすべて「データを見てから変数を選ぶ」＝<strong>データ駆動型</strong>であり、上記 ①〜⑤ の問題をもたらす。
</div>
</div>

<div class="panel green">
<div class="panel-title">2026 年の推奨アプローチ</div>
<ul class="bullet">
  <li><strong>事前に臨床知識で変数を固定</strong>（プロトコルで明記）</li>
  <li>本研究なら <strong>Table 2 のアンケート結果</strong> が事前情報になる</li>
  <li>先行研究・メタ分析から重要因子を選定</li>
  <li>交絡候補は p 値に関わらず <strong>強制投入</strong></li>
  <li>事前登録（pre-registration）で変数リストを公開</li>
</ul>
<div class="ok-box" style="margin-top:10px">
EPV が足りない場合は<strong>変数削減ではなく、次元削減</strong>（PCA・合成スコア）や <strong>罰則付き回帰</strong>（LASSO / Ridge）を検討。
</div>
</div>
</div>

<div class="panel">
<div class="panel-title">主要文献による批判</div>
<div class="article">
<p><strong>Sun, Shook &amp; Kay (1996)</strong> は、シミュレーション研究により <strong class="emphasis">単変量スクリーニングが抑制変数を見逃し、交絡調整を誤らせる</strong> ことを実証。真の効果を過小評価するケースも存在することを示した。</p>
<p><strong>Harrell (2015)</strong> は『Regression Modeling Strategies』第 4 章で、ステップワイズ選択の問題を詳細に論じ、「<strong>変数を選ぶなら事前に選べ、データから選ぶな</strong>」と繰り返し警告している。</p>
<p><strong>Royston &amp; Sauerbrei (2008)</strong> は "Multivariable Model-Building" で、厳密な事前計画の重要性とペナルティ付き回帰の有用性を解説。</p>
</div>
</div>

<div class="note-box">
Yuasa 2002 は <strong>Table 2 のアンケート（事前情報）を持っていた</strong>。これを変数選択の根拠として前面に出していれば、問題は大きく軽減されたはず。アンケートは実質的に「臨床知識による事前選択」と同等の機能を果たせる。
</div>

<div class="cite">
Sun GW, Shook TL, Kay GL. <em>J Clin Epidemiol</em> 1996;49(8):907–916. DOI: 10.1016/0895-4356(96)00025-X<br>
Harrell FE Jr. <em>Regression Modeling Strategies.</em> 2nd ed. Springer 2015, Chapter 4.<br>
Royston P, Sauerbrei W. <em>Multivariable Model-Building.</em> Wiley 2008.
</div>
</div>
`},

/* ============ 3-3 問題② EPV ============ */
{part:"Part 3", short:"② EPV 不足", html:`
<div class="slide-inner">
<span class="slide-tag">問題 ②</span>
<h2 class="slide-title">Events Per Variable (EPV) 不足 ─ 初心者向け解説</h2>

<div class="panel" style="background:#eff6ff;border-color:var(--blue);margin-bottom:18px">
<div class="panel-title">なぜここで EPV を学ぶ必要があるのか？</div>
<div class="article">
<p><strong>統計の話はここから少しだけ難しくなります</strong>。アレルギーが出そうな方は、まずこのコラムだけ読んでください。</p>
<p>結論からいうと、<strong class="emphasis">サンプル数（人数）が少ないのに、たくさんの予測因子をモデルに入れすぎると、その解析は信頼できなくなる</strong>のです。</p>
<p>これは料理でいえば、<strong>少ない食材で何品も作ろうとして、どれも中途半端になる</strong>ようなもの。Yuasa 2002 はまさにこの状態でした（44 人のデータで予測因子を 5 〜 9 個も入れた）。</p>
<p>その「サンプルに対して、いくつまで変数を入れていいか」を判定する <strong>とても大事な指標</strong> が EPV です。これを知らずに統計をやると、<strong>どの論文を読んでも信用していいか判断できません</strong>。だからここで一度、ゆっくり身につけておきましょう。</p>
</div>
</div>

<p class="slide-lead">
<strong>EPV とは何か？</strong> ロジスティック回帰では「珍しい方のアウトカム」（本研究では <strong>困難群＝20 名</strong>）を "Event（イベント）" と呼ぶ。このイベント数を、モデルに投入する変数の数で割ったものが EPV（Events Per Variable）。<br>
<strong class="emphasis">EPV は「データがどれだけ贅沢か」の指標</strong> である。
</p>

<div class="panel">
<div class="panel-title">なぜ EPV が重要なのか？ ─ 3 つの理由</div>
<div class="article">
<p><strong>理由 ① 変数が多すぎるとモデルが "暗記" してしまう（過適合）</strong><br>
サンプルに対して変数が多すぎると、モデルは <strong class="emphasis">データのノイズまで学習</strong> してしまう。手元のデータでは感度・特異度が高いが、新規患者ではまったく使えないモデルになる。</p>

<p><strong>理由 ② 回帰係数の推定が不安定になる</strong><br>
1 人データが違うだけで OR が 3 倍変わるような推定になる。<strong>信頼区間が異常に広がり</strong>、数桁にまたがる（例：Yuasa 2002 の 1.59–1216.3）。これは実質的に <strong>解釈不能</strong> な推定。</p>

<p><strong>理由 ③ p 値が偶然でも有意になりやすい</strong><br>
サンプルに対する自由度が不足すると、適合度の指標が操作されやすくなる。過適合したモデルは "見かけ上" 良く見える。</p>
</div>
</div>

<div class="grid grid-ab">
<div class="panel">
<div class="panel-title">本研究での計算 ─ 致命的な不足</div>
<div style="font-size:16px;line-height:2;text-align:center;padding:10px">
  <div style="font-size:13px;color:var(--ink-muted)">イベント数（Difficult 群）</div>
  <div style="font-size:42px;font-weight:900;color:var(--blue)">20</div>
  <div style="font-size:20px;color:var(--ink-muted)">÷</div>
  <div style="font-size:13px;color:var(--ink-muted)">多変量に投入した変数数</div>
  <div style="font-size:42px;font-weight:900;color:var(--blue)">5</div>
  <div style="font-size:20px;color:var(--ink-muted)">=</div>
  <div style="font-size:48px;font-weight:900;color:var(--red)">EPV = 4.0</div>
  <div style="font-size:13px;color:var(--ink-muted)">推奨 ≥ 10 に対し <strong class="bad">60% 不足</strong></div>
</div>
</div>

<div>
<div class="chart-wrap tall"><canvas id="epvChart"></canvas></div>
<div class="panel tight" style="margin-top:10px">
<div class="panel-title">EPV 別の推奨文献</div>
<table>
  <tbody>
    <tr><td>Peduzzi et al. (1996)</td><td class="center">EPV ≥ <strong>10</strong></td></tr>
    <tr><td>van Smeden et al. (2016)</td><td class="center">「10 に根拠なし」</td></tr>
    <tr><td>Riley et al. (2019)</td><td class="center">予測精度で計算</td></tr>
  </tbody>
</table>
</div>
</div>
</div>

<div class="panel">
<div class="panel-title">EPV = 4 は何を意味するのか？ ─ 具体例で理解</div>
<div class="article">
<p><strong>たとえるなら：</strong>20 枚の写真から 5 つの特徴（変数）を見分ける AI を訓練しようとするのと同じ。どうしても <strong class="emphasis">1 枚 1 枚の特徴を丸暗記してしまう</strong> ため、新しい写真では正しく判断できない。</p>
<p>Peduzzi ら (1996) はシミュレーションで <strong>EPV = 10</strong> 以下になると：</p>
<ul class="bullet">
  <li>回帰係数が真値から <strong>平均で 10% 以上ずれる</strong></li>
  <li>CI のカバレッジ率（真値を含む確率）が <strong>名目の 95% を下回る</strong></li>
  <li>収束しない（無限大になる）ケースが増える</li>
</ul>
<p>と報告した。本研究の EPV = 4 はその半分以下 ─ これはもはや<strong>通常のロジスティック回帰を適用すべき状況ではない</strong>。</p>
</div>
</div>

<div class="panel">
<div class="panel-title">EPV が足りないときの選択肢</div>
<div class="article">
<p><strong>A. 変数を減らす</strong> → 事前情報で厳選。本研究なら Table 2 の最上位因子のみ</p>
<p><strong>B. 罰則付き回帰を使う</strong> → <strong>Firth 法</strong>（本研究で採用）、LASSO、Ridge、Elastic Net</p>
<p><strong>C. ベイズ法を使う</strong> → 事前分布による正則化で推定を安定化</p>
<p><strong>D. データを追加する</strong> → 多施設共同研究、登録研究などで N を増やす</p>
<p><strong>E. モデル構築を諦めて記述統計のみ</strong> → 統計的不確実性を正直に認める</p>
</div>
</div>

<div class="cite">
Peduzzi P et al. <em>J Clin Epidemiol</em> 1996;49(12):1373–1379.<br>
van Smeden M et al. <em>BMC Med Res Methodol</em> 2016;16:163. DOI: 10.1186/s12874-016-0267-3<br>
Riley RD et al. <em>Stat Med</em> 2019;38(7):1276–1296. DOI: 10.1002/sim.7992
</div>
</div>

/* ============ 3-4 問題③ 完全分離 ============ */
{part:"Part 3", short:"③ 完全分離（インタラクティブ）", html:`
<div class="slide-inner">
<span class="slide-tag">問題 ③ · INTERACTIVE</span>
<h2 class="slide-title">完全分離（Complete Separation） ─ OR が発散する</h2>

<div class="panel" style="background:#eff6ff;border-color:var(--blue);margin-bottom:18px">
<div class="panel-title">なぜこれを学ぶ必要があるのか？</div>
<div class="article">
<p>ここも統計の話で少し身構えるかもしれませんが、<strong class="emphasis">じつは Yuasa 2002 で「OR = 999」という大きな数字が出てきた直接の原因</strong> がこの「完全分離」です。Part 2 のスライドで一度引っかかったあの数値の正体を、ここで明かします。</p>
<p>身近なたとえでいうと、<strong>料理コンテストで「審査員 5 人がそろって 100 点」</strong> と付けたとき、その料理の本当の実力（90 点なのか 95 点なのか）は分からなくなりますよね。<strong>満点の上にもっと上が「あるはず」だけど、データからは決めようがない</strong>。これが完全分離の感覚です。</p>
<p>統計ソフトはこの状況だと、自動的に「<strong>OR ＝ 999</strong>」「<strong>OR ＝ 78,700,000</strong>」のような <strong class="emphasis">あり得ない大きな数字</strong> を吐き出してしまいます。これを論文にそのまま載せてしまうと、読者に「決定的な予測因子だ」と誤った印象を与えてしまうのです。</p>
<p>このスライドではまず<strong>「なぜ無限大に飛ぶのか」</strong>を直感的につかみ、次にスライダーを動かしながら自分の手で <strong>OR が暴れる様子</strong> を体感します。最後に、これを解決する <strong>Firth 法</strong> という現代の解決策まで紹介します。</p>
</div>
</div>

<p class="slide-lead">
<strong>完全分離とは何か？</strong>　2×2 表（または多次元の分割表）で、<strong class="emphasis">ある変数の値によって結果が完全に予測できる</strong> 状況。例：「Depth = Level C のとき、44 名中 <strong>Difficult 群が全員、Control 群が 0 名</strong>」。このとき、通常のロジスティック回帰では <strong>オッズ比が無限大に飛ぶ</strong>。
</p>

<div class="panel">
<div class="panel-title">なぜ「無限大」になるのか？ ─ 数学的直感</div>
<div class="article">
<p>オッズ比の公式は <code>OR = (a × d) / (b × c)</code>（2×2 表の 4 セル値）。分母に <strong class="emphasis">0 が入るとゼロ除算</strong> が発生し、数学的に定義不能になる。</p>
<p>ロジスティック回帰（最尤推定法）では、尤度関数を最大化する係数を探す。<strong>完全分離があると、係数を大きくすればするほど尤度が上がり続ける</strong> ため、最適解が無限遠に飛んでいく。</p>
<p>ソフトウェアは通常、適当なところで計算を打ち切るため、「OR = 999」「OR = 78,700,000」のような <strong>大きな数字で報告</strong> されることになる（＝ 実質的に「∞」の意味）。</p>
</div>
</div>

<h3 class="section-head">体験してみよう ─ スライダー操作の手順</h3>

<div class="panel">
<div class="article">
<p><strong>下の 2×2 表のスライダーを動かしながら、次のステップで観察しよう：</strong></p>
<ol class="num">
  <li><strong>最初の状態（スライダー = 0）</strong>：Control 群 Level C = 0。右上セルに <span class="bad">0</span> が表示され、OR 表示が <strong class="bad">∞</strong>。グラフは右端が天井に達する形。<br><em>→ これが「完全分離」の状態。原論文 Yuasa 2002 はまさにこの状態だった。</em></li>
  <li><strong>スライダーを 1 に動かす</strong>：Control 群 Level C に 1 名追加。OR が有限値（ここでは <strong>8.0</strong>）になる。CI はまだ広いが、計算可能に。</li>
  <li><strong>スライダーを 3, 5 と増やす</strong>：OR がだんだん下がり、CI が狭くなっていく様子を観察。</li>
  <li><strong>スライダーを最大 10 に</strong>：OR が 1 に近づき、CI も現実的な範囲に収束。<em>→ これがデータが豊富な場合の「健全な」推定。</em></li>
  <li><strong>0 に戻す</strong>：再び OR が発散する瞬間を体感する。</li>
</ol>
</div>
</div>

<div class="grid grid-ab">
<div>
<div class="panel">
<div class="panel-title">2×2 表シミュレーション</div>
<table>
  <thead><tr><th></th><th class="center">Difficult</th><th class="center">Control</th></tr></thead>
  <tbody>
    <tr><td>Level C</td><td class="center" id="cellA">5</td><td class="center" id="cellB" style="font-weight:900;color:var(--red)">0</td></tr>
    <tr><td>Level A/B</td><td class="center" id="cellC">15</td><td class="center" id="cellD">24</td></tr>
  </tbody>
</table>
<div class="slider-container" style="margin-top:12px">
  <label>Control 群 Level C のセル値 <strong id="cellBVal" style="color:var(--amber);font-size:18px">0</strong></label>
  <input type="range" id="cellBSlider" min="0" max="10" step="1" value="0">
</div>
<div style="background:var(--surface-alt);padding:14px;border-radius:8px;margin-top:10px;border:1px solid var(--line)">
  <div style="font-size:13px;color:var(--ink-muted)">計算された OR（オッズ比）</div>
  <div style="font-size:36px;font-weight:900;color:var(--amber)" id="orDisplay">∞</div>
  <div style="font-size:13px;color:var(--ink-muted)" id="ciDisplay">OR = (5 × 24) / (15 × 0) = 0 で除算</div>
</div>
</div>
</div>

<div>
<div class="chart-wrap tall"><canvas id="separationChart"></canvas></div>
<div class="note-box" style="margin-top:10px">
セル値が 0 のとき、尤度関数の最大化点は <strong>無限遠</strong> に飛ぶ。これが「OR = 999」の正体。
</div>
</div>
</div>

<div class="panel">
<div class="panel-title">この問題をどう解決するか？ ─ Firth (1993) 罰則付き最尤法</div>
<div class="article">
<p><strong>David Firth が 1993 年に提案した手法</strong> は、尤度関数に <strong class="emphasis">Jeffreys 事前分布に相当する罰則項</strong> を加えることで、係数が無限大に飛ぶのを防ぐ。</p>
<p>簡単に言えば：「<strong>係数が極端に大きくなることにペナルティを課す</strong>」ことで、有限で解釈可能な推定値を得る手法。ベイズ的な発想だが、事前分布を明示的に選ぶ必要がなく、<strong>頻度論的ロジスティック回帰の自然な拡張</strong>として使える。</p>
<p>R では <code>logistf</code> パッケージ（Heinze &amp; Schemper 2002）で実装されており、通常の <code>glm()</code> と同じ記法で使える。<strong>Part 4 で実際に実演する。</strong></p>
</div>
</div>

<div class="warn-box">
<strong>教訓：</strong>データ集計段階で「0 のセル」を発見したら、通常のロジスティック回帰を適用してはいけない。ソフトウェアが自動的に大きな OR を吐き出すので、気づかず論文に載せてしまう危険が極めて高い。<strong>Firth 法か Bayesian 法に切り替える</strong>。
</div>

<div class="cite">
Firth D. Bias reduction of maximum likelihood estimates. <em>Biometrika</em> 1993;80(1):27–38.<br>
Heinze G, Schemper M. A solution to the problem of separation in logistic regression. <em>Stat Med</em> 2002;21(16):2409–2419.
</div>
</div>
`, onShow:function(){
  const slider = document.getElementById('cellBSlider');
  const ctx = document.getElementById('separationChart');
  if(!slider || !ctx) return;
  let chart = null;
  function update(){
    const b = +slider.value;
    document.getElementById('cellB').textContent = b;
    document.getElementById('cellBVal').textContent = b;
    document.getElementById('cellD').textContent = 24 - b;
    const a = 5, c = 15, d = 24 - b;
    if(b === 0){
      document.getElementById('orDisplay').innerHTML = '<span style="color:var(--red)">∞</span>';
      document.getElementById('ciDisplay').textContent = '完全分離 → ゼロ除算';
      document.getElementById('cellB').style.color = 'var(--red)';
    } else {
      const or = (a * d) / (c * b);
      document.getElementById('orDisplay').textContent = or.toFixed(2);
      const se = Math.sqrt(1/a + 1/b + 1/c + 1/d);
      const lo = Math.exp(Math.log(or) - 1.96*se);
      const hi = Math.exp(Math.log(or) + 1.96*se);
      document.getElementById('ciDisplay').textContent = `95% CI: ${lo.toFixed(2)} – ${hi.toFixed(2)}`;
      document.getElementById('cellB').style.color = '';
    }
    const xs = [], ys = [];
    for(let bb = 0.1; bb <= 10; bb += 0.2){
      xs.push(bb.toFixed(1));
      ys.push((a * (24-bb)) / (c * bb));
    }
    if(chart){ chart.destroy(); }
    chart = new Chart(ctx,{type:'line',data:{labels:xs,datasets:[
      {label:'オッズ比',data:ys,borderColor:'#1d4ed8',backgroundColor:'rgba(29,78,216,0.1)',fill:true,tension:0.2,pointRadius:0},
      {label:'現在のスライダー位置',data:xs.map((x,i)=> Math.abs(+x - b) < 0.2 ? ys[i]: null),
        borderColor:'#b45309',backgroundColor:'#b45309',pointRadius:6,showLine:false}
    ]},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{labels:{color:'#1f2937'}},title:{display:true,text:'Control 群のセル値と OR の関係',color:'#1f2937'}},
        scales:{x:{title:{display:true,text:'Control 群 Level C セル値',color:'#64748b'},ticks:{color:'#64748b'},grid:{color:'rgba(15,23,42,0.05)'}},
          y:{type:'logarithmic',title:{display:true,text:'オッズ比（対数軸）',color:'#64748b'},ticks:{color:'#64748b'},grid:{color:'rgba(15,23,42,0.05)'}}}}});
  }
  slider.oninput = update;
  update();
}},

/* ============ 3-5 問題④ 同一データ評価 ============ */
{part:"Part 3", short:"④ 楽観バイアス", html:`
<div class="slide-inner">
<span class="slide-tag">問題 ④</span>
<h2 class="slide-title">モデル構築データ = 評価データ ─ 楽観バイアス</h2>
<p class="slide-lead">
予測モデルを「<strong class="emphasis">作ったデータそのもので評価する</strong>」と、性能は必ず実際より高く見える。これを <strong>楽観バイアス（optimism bias）</strong> または <strong>apparent performance</strong> と呼ぶ。新規患者に適用した瞬間に、感度も特異度も AUC も確実に下がる。
</p>

<div class="panel">
<div class="panel-title">なぜ楽観的になるのか？ ─ 理論的背景</div>
<div class="article">
<p>モデル構築プロセスでは、回帰係数が <strong>そのデータに最も合うように</strong> 最適化される。これには：</p>
<ul class="bullet">
  <li>シグナル（真の関連）</li>
  <li>ノイズ（偶然の関連、外れ値、測定誤差）</li>
</ul>
<p>の両方が含まれる。モデルは <strong class="emphasis">ノイズの部分まで "学習" してしまう</strong> ため、同じデータで評価すると、ノイズのフィッティングによって性能が水増しされる。</p>
<p>統計学的には、<strong>optimism = apparent performance − true performance</strong> と定義される。サンプルサイズが小さい、変数が多い、モデルが複雑、といった条件ほど optimism が大きくなる。</p>
</div>
</div>

<div class="grid grid-ab">
<div class="panel">
<div class="panel-title">Yuasa 2002 の評価</div>
<table style="font-size:13px">
  <thead><tr><th></th><th class="center">Apparent<br>（同一データ）</th><th class="center">真の性能<br>（推定）</th></tr></thead>
  <tbody>
    <tr><td>感度</td><td class="center hi">0.85</td><td class="center" style="color:var(--ink-muted)">&lt; 0.75 ?</td></tr>
    <tr><td>特異度</td><td class="center hi">0.92</td><td class="center" style="color:var(--ink-muted)">&lt; 0.80 ?</td></tr>
    <tr><td>OR</td><td class="center hi">62.3</td><td class="center" style="color:var(--ink-muted)">&lt; 20 ?</td></tr>
  </tbody>
</table>
<div class="danger-box" style="margin-top:10px">
これらは <strong>N = 44 の同一データでの性能</strong>。新規患者に適用すると必ず低下する。EPV = 4 の小標本では楽観バイアスは <strong>非常に大きい</strong>。
</div>
</div>

<div class="panel">
<div class="panel-title">現代の推奨 (TRIPOD+AI 2024)</div>
<div class="flow col">
  <div class="flow-box human">① 内部検証<br><small>Bootstrap / 交差検証で楽観度を補正</small></div>
  <div class="flow-arrow">↓</div>
  <div class="flow-box human">② 時間的検証<br><small>同じ施設の別期間データで確認</small></div>
  <div class="flow-arrow">↓</div>
  <div class="flow-box human">③ 外部検証<br><small>独立した別施設のデータで性能評価</small></div>
  <div class="flow-arrow">↓</div>
  <div class="flow-box human">④ TRIPOD チェックリストに準拠して報告</div>
</div>
</div>
</div>

<div class="panel">
<div class="panel-title">内部検証の 3 つの方法 ─ 初心者向け</div>
<div class="article">
<p><strong>① Split Sample（単純分割）</strong><br>
データを 70:30 や 80:20 に分け、前者でモデル構築、後者で評価。<strong class="emphasis">小標本では非推奨</strong>（分割でさらにサンプルが減り、推定が不安定になる）。</p>

<p><strong>② Cross-Validation（交差検証）</strong><br>
データを K 個（例：10）に分割し、K−1 個で構築 → 残り 1 個で評価を K 回繰り返し、平均を取る。Split Sample より効率的。</p>

<p><strong>③ Bootstrap（ブートストラップ）</strong><br>
元データから復元抽出で新しいデータセットを作り、そこでモデルを構築 → 元データで評価、を何百回も繰り返す。<strong>Harrell が強く推奨</strong>。optimism を直接推定できる。</p>
</div>
</div>

<div class="panel">
<div class="panel-title">外部検証の重要性</div>
<div class="article">
<p>内部検証は <strong>あくまで同じ集団内での性能評価</strong>。別の施設、別の地域、別の時代、別の機器で撮影されたパノラマ X 線画像に同じモデルが通用するかは、<strong class="emphasis">外部データでしか確認できない</strong>。</p>
<p>予測モデルの真の価値は「Generalizability（一般化可能性）」。<strong>TRIPOD+AI (2024)</strong> は外部検証を強く推奨し、論文発表時にその結果を必ず含めるべきとしている。</p>
<p>理想的には：開発コホート → 内部検証 → 独立したコホートで外部検証 → 臨床実装試験、という 4 段階を踏む。</p>
</div>
</div>

<div class="cite">Collins GS, Moons KGM, Dhiman P, et al. TRIPOD+AI statement: updated guidance for reporting clinical prediction models that use regression or machine learning methods. <em>BMJ</em> 2024;385:e078378.</div>
</div>
`},

/* ============ 3-7 STROBE 紹介 ============ */
{part:"Part 3", short:"⑥ STROBE 声明とは", html:`
<div class="slide-inner">
<span class="slide-tag">問題 ⑥ · REPORTING GUIDELINE</span>
<h2 class="slide-title">STROBE 声明 ─ 観察研究の報告標準を学ぶ</h2>
<p class="slide-lead">
前スライドまでの 5 つの問題（変数選択・EPV・完全分離・同一データ評価・ソフト不記載）は、いずれも <strong>個別の統計学的問題</strong> だった。ここでは視点を変え、<strong class="emphasis">観察研究の "報告" 全体を体系的に評価する国際基準「STROBE 声明」</strong> で Yuasa 2002 をチェックする。
</p>

<div class="panel">
<div class="panel-title">STROBE 声明とは何か？</div>
<div class="article">
<p><strong>STROBE</strong> = <em>STrengthening the Reporting of OBservational studies in Epidemiology</em>（疫学における観察研究の報告の強化）</p>
<p><strong>2007 年</strong> に初版が公開され、<strong>Lancet</strong>, <strong>BMJ</strong>, <strong>PLOS Medicine</strong>, <strong>Annals of Internal Medicine</strong> など世界の主要医学誌に同時掲載された。以降、<strong class="emphasis">観察研究の報告基準として国際的な標準</strong> となっている。</p>
<p>対象となる観察研究：</p>
<ul class="bullet">
  <li>コホート研究（cohort study）</li>
  <li><strong>症例対照研究（case-control study）</strong> ← Yuasa 2002 はこれ</li>
  <li>横断研究（cross-sectional study）</li>
</ul>
<p><strong>22 項目のチェックリスト</strong>：うち <strong>18 項目は 3 デザイン共通</strong>、<strong>4 項目（Items 6, 12, 14, 15）はデザインごとに変動</strong>。</p>
</div>
</div>

<div class="grid grid-2">
<div class="panel">
<div class="panel-title">なぜ STROBE で評価するのか？</div>
<ul class="bullet">
  <li>報告の <strong>網羅性</strong> を客観的に検証できる</li>
  <li>主要医学誌では <strong>投稿時に STROBE チェックリストの添付が必須</strong> になりつつある</li>
  <li>読者が「何が書かれて、何が書かれていないか」を即座に判断</li>
  <li>システマティックレビュー時、研究の質の一次スクリーニングに使われる</li>
  <li>自分の論文を書く際の <strong class="emphasis">チェックリスト</strong> として最強</li>
</ul>
</div>
<div class="panel">
<div class="panel-title">STROBE 声明の公式リソース</div>
<ul class="bullet">
  <li><strong>公式サイト：</strong><a href="https://www.strobe-statement.org/" target="_blank">strobe-statement.org</a></li>
  <li><strong>原典論文：</strong>von Elm et al. <em>Lancet</em> 2007;370:1453–1457</li>
  <li><strong>Explanation &amp; Elaboration：</strong>Vandenbroucke et al. <em>PLoS Med</em> 2007;4:e297</li>
  <li><strong>解説論文：</strong>Cuschieri S. <em>Saudi J Anaesth</em> 2019;13(Suppl 1):S31–S34. <a href="https://pmc.ncbi.nlm.nih.gov/articles/PMC6398292/" target="_blank">PMC6398292</a></li>
  <li><strong>日本語版：</strong><a href="https://www.equator-network.org/wp-content/uploads/2015/10/STROBE-Japanese.pdf" target="_blank">EQUATOR Network 日本語 PDF</a></li>
</ul>
</div>
</div>

<div class="panel">
<div class="panel-title">22 項目の全体構成</div>
<div class="grid grid-3" style="margin-top:6px">
  <div class="stat" style="text-align:center">
    <div class="label">Title &amp; Abstract</div>
    <div class="value" style="font-size:18px">Item 1</div>
    <div class="sub">研究デザインの明示と要約</div>
  </div>
  <div class="stat green" style="text-align:center">
    <div class="label">Introduction</div>
    <div class="value" style="font-size:18px">Items 2-3</div>
    <div class="sub">背景・根拠／目的・仮説</div>
  </div>
  <div class="stat purple" style="text-align:center">
    <div class="label">Methods</div>
    <div class="value" style="font-size:18px">Items 4-12</div>
    <div class="sub">デザイン・参加者・変数・統計</div>
  </div>
  <div class="stat amber" style="text-align:center">
    <div class="label">Results</div>
    <div class="value" style="font-size:18px">Items 13-17</div>
    <div class="sub">参加者フロー・主要結果・部分群</div>
  </div>
  <div class="stat red" style="text-align:center;grid-column:span 2">

    <div class="value" style="font-size:18px">Items 18-22</div>
    <div class="sub">要約・限界・解釈・一般化・資金源</div>
  </div>
</div>
</div>

<div class="warn-box">
<strong>注意：</strong>STROBE は「論文の <strong class="emphasis">質</strong>」の評価ツールではなく、「<strong class="emphasis">報告</strong> の網羅性」のチェックリスト。統計手法そのものの妥当性は別途評価する必要がある（それが Part 3 ①〜⑤ で行ったこと）。
</div>

<div class="cite">
von Elm E, Altman DG, Egger M, et al. The Strengthening the Reporting of Observational Studies in Epidemiology (STROBE) statement. <em>Lancet</em> 2007;370(9596):1453–1457.<br>
Vandenbroucke JP, von Elm E, Altman DG, et al. STROBE Explanation and Elaboration. <em>PLoS Med</em> 2007;4(10):e297.<br>
Cuschieri S. The STROBE guidelines. <em>Saudi J Anaesth</em> 2019;13(Suppl 1):S31–S34.
</div>
</div>
`},

      <td><strong>AI の解釈を自分で検証</strong>（手計算・臨床的妥当性・CI 幅の評価）</td>
      <td class="center"><strong>章 50</strong></td>
    </tr>
    <tr style="background:#dcfce7">
      <td style="color:var(--ink-muted)">─ <em>2002 年にはなかった工程</em></td>
      <td><strong>原論文との比較</strong>（Firth 補正で何がどう変わったか）</td>
      <td class="center"><strong>章 52</strong></td>
    </tr>
  </tbody>
</table>

<div class="grid grid-2" style="margin-top:14px">
  <div class="ok-box" style="margin:0;font-size:14px">
    <strong>① 単変量 OR の機械選別を捨てる</strong><br>
    旧 Step 1-2 → 新方式：事前に臨床知識（Table 2 アンケート結果）で変数を固定。AI には「方法論を先に」相談する。
  </div>
  <div class="ok-box" style="margin:0;font-size:14px">
    <strong>② 「解析して終わり」にしない</strong><br>
    新方式では <strong>AI 解釈 → 自己検証 → 原論文比較</strong> という追加 3 工程を経て、最終的な信頼性を担保する。
  </div>
</div>
</div>

<div class="panel">
<div class="panel-title">なぜ再解析するのか？ ─ 2026 年の視点で</div>
<div class="article">
<p>Yuasa 2002 は当時の標準的手法に従って書かれた論文だが、Part 3 で見たように、現在の統計学の基準からは <strong class="emphasis">5 つの改善余地</strong> がある。</p>
<p>これらを実際に <strong>手を動かして修正</strong> することで、読者は以下を体験的に理解できる：</p>
<ul class="bullet">
  <li>現代の R コードでどのように書き下すのか</li>
  <li>AI を使ってコードを生成する際の <strong>プロンプトの書き方</strong></li>
  <li>完全分離を Firth 回帰で解消する具体手順</li>
  <li>結果をどう検証し、どう批判的に解釈するか</li>
  <li>論文の Methods セクションにどう記載するか</li>
</ul>
</div>
</div>

<div class="panel">
<div class="panel-title">仮想データを使った理由 ─ やむを得ない制約</div>
<div class="article">
<p>本来であれば Yuasa 2002 の <strong>個人レベルの生データ</strong> で再解析するのが理想である。しかし：</p>
<ul class="bullet">
  <li>論文は 2002 年発表、データは 1997-1998 年に収集された紙カルテ時代</li>
  <li>当時は「データ共有」「データレポジトリ」の概念が一般的でなかった</li>
  <li>生データ（症例別の変数データ）は <strong>既に失われている</strong></li>
  <li>公表されているのは Table 3 の <strong>集計表（度数）のみ</strong></li>
</ul>
<p>そこで、公表された度数から個人レベルのデータセットを再構成した <strong>仮想データ（44 症例）</strong> を用いて、今回のシミュレーションを進める。</p>
</div>
</div>

<div class="warn-box">
<strong>重要な注意：</strong>仮想データはあくまで <strong>「解析手順を示すための教材」</strong> であり、本研究の目的は「Yuasa 論文の結論を検証すること」ではない。<strong class="emphasis">検証すべきは、AI 時代の解析作法そのもの</strong> である。以降のスライドでは、各ステップで「なぜこう書くのか」「どう検証するのか」に焦点を当てる。
</div>

<div class="note-box">
個人レベルの変数間相関は周辺度数だけでは完全には再現できないため、多変量 OR の具体値は原論文と乖離する。しかし <strong>単変量 OR はほぼ完全に一致</strong> する。ただし「単変量 OR を報告すべきか」自体が現代では批判の対象となる（後述）。
</div>

</div>
`},

/* ============ 4-3 R/RStudio 準備 ============ */
{part:"Part 4", short:"Step 1 ─ R / RStudio 準備", html:`
<div class="slide-inner">
<span class="slide-tag">STEP 1 · SETUP</span>
<h2 class="slide-title">R と RStudio を準備する ─ 完全初心者向け</h2>

<div style="background:linear-gradient(135deg,#fef3c7,#fde68a);border:2px solid var(--amber);border-radius:12px;padding:18px 22px;margin-bottom:20px;box-shadow:var(--shadow-sm)">
  <div style="font-size:13px;font-weight:800;color:var(--amber);letter-spacing:.1em;margin-bottom:8px">⚠ 重要なお知らせ</div>
  <p style="font-size:17px;font-weight:700;line-height:1.7;color:var(--ink-strong);margin:0">
    初心者は <strong style="color:var(--amber)">EZR</strong>（神田善伸先生による R-Commander 拡張）の方が使いやすいと思いますが、<br>
    今後の <strong style="color:var(--blue)">AI 時代の汎用性</strong> を踏まえて、本講義では <strong style="color:var(--blue)">R</strong> に挑戦しましょう。
  </p>
</div>

<p class="slide-lead">
まず環境を整える。<strong class="emphasis">R は統計解析エンジン本体</strong>、<strong class="emphasis">RStudio はその快適な作業環境（IDE）</strong>。両方ともオープンソースで無料。なぜ SPSS や Excel でなく R なのかは、<strong>再現性・コード公開・パッケージエコシステム</strong> の 3 点が決定的。
</p>

<div class="grid grid-2">
<div class="panel">
<div class="panel-title">なぜ R を使うのか？</div>
<div class="article">
<p><strong>① 完全無料・オープンソース</strong><br>
SPSS ライセンスは年間数十万円。R は CRAN から誰でも無料ダウンロード可能。</p>
<p><strong>② コードで解析全体が記録される</strong><br>
マウス操作で解析した SPSS は「どんな手順だったか」再現が難しい。R は <strong class="emphasis">全手順がスクリプトとして残る</strong> ため、論文の Methods にコード URL を載せて完全再現可能。</p>
<p><strong>③ 最新の統計手法がすぐ使える</strong><br>
Firth 法、Bayes ロジスティック、機械学習まで <strong>20,000 以上のパッケージ</strong> が CRAN と Bioconductor で提供されている。</p>
<p><strong>④ AI との相性が良い</strong><br>
GPT、Claude など主要な LLM の訓練データには R コードが大量に含まれる。AI が最もコード生成しやすい統計言語の一つ。</p>
</div>
</div>

<div class="panel">
<div class="panel-title">インストール手順（Windows / Mac 共通）─ 完全初心者向け</div>
<div class="article">
<p><strong>大事な前提：</strong>「コマンドラインで …」と言われると不安になる方も大丈夫。ここでは <strong class="emphasis">公式サイトの "Download" ボタンを押すだけ</strong> で進めます。下記 3 つのリソースのうち、好きなものを 1 つ選んで進めてください。</p>

<h4>方法 A：公式サイトを直接訪問する（最も標準・10 分）</h4>
<ol class="num">
  <li><strong>R 本体</strong> を <a href="https://cran.r-project.org/" target="_blank" style="color:var(--blue)">cran.r-project.org</a> から ─ ページ上部の「Download R for Windows」または「Download R for macOS」をクリック → さらに「base」または最新版インストーラをダウンロード → ダブルクリックで実行（途中の選択肢はすべて初期設定で OK）</li>
  <li><strong>RStudio Desktop</strong> を <a href="https://posit.co/download/rstudio-desktop/" target="_blank" style="color:var(--blue)">posit.co/download/rstudio-desktop</a> から ─ 無料版（FREE 列）の「DOWNLOAD RSTUDIO DESKTOP」をクリック → 自動で OS 判別 → インストーラを実行</li>
  <li>RStudio をスタートメニュー／Launchpad から起動。下のような 4 ペイン画面が出たら成功。</li>
</ol>

<h4>方法 B：YouTube 動画で手順を見ながら進める（おすすめ・15 分）</h4>
<p>「<strong>R RStudio インストール 初心者</strong>」または「<strong>install R RStudio Windows</strong>」「<strong>install R RStudio Mac</strong>」で YouTube 検索。<strong>2024〜2026 年の動画</strong>を選ぶと最新画面と一致しやすい。再生回数が多く、コメント欄が活発なものを選ぶのがコツ。</p>
<p>動画を見ながら一時停止しつつ進めれば、初めての方でも 15〜20 分で終わります。</p>

<h4>方法 C：AI に「私のために手順を書いて」と頼む（最近はこれが最速）</h4>
<p>ChatGPT や Claude、Gemini にコピペして使えるプロンプトを用意しました。コードブロック右上の <strong>📋 コピー</strong> でコピーして、AI に貼り付けてください。</p>
<pre><span class="com"># 役割</span>
あなたは、コマンドラインを触ったことがない完全初心者に
<span class="kw">画面を見せながら教えるサポーター</span>です。
専門用語は使わず、必ず「どこをクリックするか」を一手ずつ示してください。

<span class="com"># 私の状況</span>
- 使用 OS：[Windows 11 / macOS Sequoia など、自分の OS とバージョン]
- R も RStudio も <span class="kw">一度も使ったことがありません</span>

<span class="com"># 教えてほしいこと</span>

   インストールする手順（クリックする場所を 1 ステップずつ）
2. 続いて RStudio Desktop（無料版）を <span class="kw">posit.co</span> から
   ダウンロード → インストールする手順
3. RStudio を起動して、画面が 4 つに分かれていることを確認する手順
4. R のバージョンを Console で確認する方法（"R.version.string" と打つだけ）

<span class="com"># お願い</span>
- 各ステップに <span class="kw">「ここで詰まったら」</span>の対処法も添えてください
- インストーラの選択肢は <span class="kw">すべて初期設定でよい</span> ことを明記してください
- 途中でわからなくなったら、<span class="kw">スクリーンショットを貼ります</span>ので

<div class="ok-box" style="font-size:14px">
このプロンプトを貼ると、AI があなたの OS に合わせた手順を 1 ステップずつ提示してくれます。詰まったら <strong>その画面のスクショを撮って AI に貼る</strong>のが最速の解決法。
</div>

<h4>動作確認（インストール後の最終チェック）</h4>
<p>RStudio を起動 → 左下の「Console」と書かれた領域に下のコードをコピペして <span class="kbd">Enter</span> を押す：</p>

<p>"R version 4.4.x" のような文字列が表示されれば、<strong>インストール成功</strong>。次のステップに進めます。</p>
</div>
</div>
</div>
