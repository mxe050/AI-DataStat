</div>
</div>
</div>
</div>
<div class="ok-box"><strong>改善点：</strong>Depth_C の OR が ∞ → 13.45 へ。解釈可能な値に。ただしCI幅は 1.06-1918 と依然広く、<strong>サンプルサイズの限界</strong>を如実に反映。</div>
`},

/* ============ 5-x 結果をAIに渡して解釈 ============ */
{part:"Part 5", short:"結果をAIに解釈させる", html:`
<span class="slide-tag">STEP 6 · INTERPRET</span>
<h2 class="slide-title">解析結果を AI に渡して意味を確認する</h2>
<p class="slide-lead">
R の出力をそのまま論文に貼るのではなく、<strong class="emphasis">まず AI に「この結果は何を意味するか」を説明させる</strong>。重要なのは、AI に<strong>方法論文献を引用させながら</strong>解釈させ、こちら側でクロスチェックできる状態にすること。
</p>

<div class="panel">
<div class="panel-title">なぜ結果を AI に戻すのか？</div>
<div class="article">
<p><strong>①「自分が理解できる言葉」に翻訳させる</strong><br>
統計ソフトの出力は <code>coef</code>, <code>se(coef)</code>, <code>Chisq</code> など数値の羅列。これを「臨床的にどういう意味か」「何に注意すべきか」まで言語化するのは手間がかかる。AI はこの言語化が得意。</p>
<p><strong>② 見落としや異常値を検出させる</strong><br>
「CI が 1.06 - 1918 と異常に広い」「p 値が有意でも臨床的意義は別」など、<strong class="emphasis">数値表を眺めるだけでは気づきにくい注意点</strong>を AI が指摘してくれることがある。</p>
<p><strong>③ 論文文章のドラフトを作らせる</strong><br>
「Results セクション用の3文で要約して」と頼めば、方法論的に妥当な表現のドラフトが得られる。ただし<strong>最終責任は自分</strong>。</p>
</div>
</div>

<div class="panel" style="margin-top:16px">
<div class="panel-title">結果解釈プロンプトの実例</div>
<pre><span class="com"># 役割</span>
あなたは臨床統計に精通した研究者です。
解釈は <span class="hi">方法論文献を引用</span>しながら慎重に行ってください。

<span class="com"># Firth ロジスティック回帰の結果（R の logistf 出力）</span>
Model: Outcome ~ Depth_C + Ramus_3 + Root_Bulb
N = 44 (Events = 20)

Variable       coef    se(coef)    OR     95% CI (profile)    p
Intercept     -1.183   0.460       -      -                   0.010
Depth_C        2.599   1.289       13.45  1.06 - 1918.0       0.044
Ramus_3        1.244   0.900       3.47   0.58 - 23.80        0.168
Root_Bulb      0.651   0.735       1.92   0.44 - 8.37         0.378

Likelihood ratio test: Chisq = 8.32, df = 3, p = 0.010

<span class="com"># 質問</span>
1. このモデルの<span class="hi">全体の意義</span>を、Likelihood ratio test の結果も踏まえて
   解釈してください。

2. 各変数の OR を<span class="hi">臨床的に</span>どう読むべきですか？
   特に Depth_C の OR = 13.45 と CI = 1.06 - 1918 をどう解釈すべき？
   Greenland et al. (Am J Epidemiol 2016) の推奨を参考に。

3. このモデルを<span class="hi">論文 Results に載せる</span>なら、
   どの数値をどう表記すべき？TRIPOD+AI (BMJ 2024) に従って
   チェックリストを作ってください。

4. この結果に<span class="hi">異常値や見落とし</span>があれば指摘して。

5. 同じデータで感度分析するなら何を試すべき？
   （例：Bayes、LASSO、exact logistic など）</pre>
</div>

<div class="panel" style="margin-top:16px">
<div class="panel-title">期待される AI 応答の構造</div>
<div class="article">
<p><strong>① 全体モデル：</strong>LR test p = 0.010 で、3変数が全体として有意にアウトカムと関連。ただし<strong class="emphasis">モデル有意 ≠ 予測精度が高い</strong>（Pepe 2004, Am J Epidemiol）。</p>
<p><strong>② Depth_C：</strong>OR = 13.45 は点推定として大きいが、95% CI が <strong>1.06 - 1918 と3桁またぎ</strong>で実質的に解釈不能。完全分離の残存影響。Greenland (2016) は「CIが広すぎる場合、点推定を強調しない」ことを推奨。</p>
<p><strong>③ 他の2変数：</strong>Ramus_3 (OR=3.47) と Root_Bulb (OR=1.92) は両方とも CI が 1 をまたぎ、<strong>統計的には "非有意"</strong>。ただし臨床的意義はサンプル数を増やせば出うる規模。</p>
<p><strong>④ 論文記載例：</strong>"Depth at occlusal level C was independently associated with extraction difficulty (adjusted OR 13.5, 95% CI 1.1–1918, p=0.044), albeit with wide imprecision reflecting the small sample size (EPV = 6.7) and complete separation in the original data."</p>
<p><strong>⑤ 感度分析提案：</strong>(a) Bayes ロジスティック（Gelman priors）、(b) exact logistic regression (elrm パッケージ)、(c) Bootstrap 内部検証で optimism-adjusted AUC を算出。</p>
</div>
</div>

<div class="warn-box">
<strong>AI 解釈の限界：</strong>AI は統計量の読み方は上手だが、「<strong class="emphasis">この数字を信じていいかどうか</strong>」の判断は苦手。完全分離後の Firth 推定値でも「13.45」と自信を持って返答することがある。必ず<strong>CIの幅</strong>を自分で確認し、過信を避ける。
</div>

<div class="cite">
Greenland S, Senn SJ, Rothman KJ, et al. Statistical tests, P values, confidence intervals, and power: a guide to misinterpretations. <em>Eur J Epidemiol</em> 2016;31(4):337-350.<br>
Pepe MS, Janes H, Longton G, Leisenring W, Newcomb P. Limitations of the odds ratio in gauging the performance of a diagnostic, prognostic, or screening marker. <em>Am J Epidemiol</em> 2004;159(9):882-890.
</div>
`},

/* ============ 5-y 自分で検証する ============ */
{part:"Part 5", short:"自分で意味を検証", html:`
<span class="slide-tag">STEP 7 · VERIFY</span>
<h2 class="slide-title">AIの解釈を、自分で検証する</h2>
<p class="slide-lead">
AI の解釈をそのまま採用してはいけない。「<strong class="emphasis">本当にそうか？</strong>」を自分で確認する。これが<strong>研究者としての最低限の責任</strong>であり、ハルシネーション検出の最後の砦。以下の3つのチェックは必ず実行する。
</p>

<div class="panel">
<div class="panel-title">チェック① 手計算で OR の値を検算</div>
<div class="article">
<p><strong>Depth_C の単変量 OR を手計算で検算してみる：</strong></p>
<pre><span class="com"># 仮想データの2×2表（Part 5-2 の table() 出力から）</span>
            Control  Difficult
Depth = C       0        5
Depth = A/B    24       15

<span class="com"># OR の公式: OR = (a × d) / (b × c)</span>
a = 5 (Difficult かつ Depth=C)
b = 15 (Difficult かつ Depth=A/B)
c = 0 (Control かつ Depth=C)
d = 24 (Control かつ Depth=A/B)

OR = (5 × 24) / (15 × 0) = <span class="hi">∞ （ゼロ除算）</span>

<span class="com"># Haldane 補正で 0.5 を加えた場合</span>
OR = ((5+.5) × (24+.5)) / ((15+.5) × (0+.5))
   = 134.75 / 7.75
   = <span class="hi">17.4</span></pre>
<p>→ 手計算と R の出力が<strong>ほぼ一致</strong>することを確認。もし大きく違えば、R コードか手計算のどちらかに誤りがある。</p>
</div>
</div>

<div class="grid grid-2" style="margin-top:16px">
<div class="panel">
<div class="panel-title">チェック② 臨床的な妥当性</div>
<div class="article">
<p><strong>「この結果、臨床的に理にかなっているか？」</strong>と自問する：</p>
<ul class="bullet">
<li>Depth C（深位埋伏）で抜歯が難しい → <strong>臨床経験と一致</strong> ✓</li>
<li>Root Bulbous（歯根球状）で困難 → 抜歯路が狭まる意味で合理的 ✓</li>
<li>Ramus 3（下顎枝内）で困難 → アクセスが物理的に困難 ✓</li>
</ul>
<p>全て方向性としては臨床常識と一致する。<strong class="emphasis">もし「年齢が若いほど困難」などの違和感があれば、データかコードを疑う</strong>。</p>
</div>
</div>
<div class="panel">
<div class="panel-title">チェック③ CI の信頼性を見極める</div>
<div class="article">
<p><strong>OR の点推定だけを見ず、必ず CI の広さを評価：</strong></p>
<table>
<thead><tr><th>変数</th><th class="center">CI 幅比率<br>(upper/lower)</th><th class="center">評価</th></tr></thead>
<tbody>
<tr><td>Depth_C</td><td class="center bad">1810倍</td><td class="center bad">解釈不能</td></tr>
<tr><td>Ramus_3</td><td class="center warn">41倍</td><td class="center warn">不安定</td></tr>
<tr><td>Root_Bulb</td><td class="center warn">19倍</td><td class="center warn">不安定</td></tr>
</tbody>
</table>
<p>→ <strong>どの変数も CI が広すぎる</strong>。これは<strong class="emphasis">EPV 不足の直接的な証拠</strong>であり、点推定を臨床応用すべきでない明確なサイン。</p>
</div>
</div>
</div>

<div class="panel" style="margin-top:16px">
<div class="panel-title">教科書で確認するクセ ─ 推奨書籍</div>
<div class="article">
<p>AI の説明に違和感があったら、<strong>定評ある教科書</strong>で照合する。以下は著者が特に推奨する3冊：</p>
<ul class="bullet">
<li><strong>Harrell FE Jr.</strong> <em>Regression Modeling Strategies.</em> 2nd ed. Springer 2015.<br>
→ 回帰モデリング全般の権威書。変数選択・サンプルサイズ・検証すべてを網羅。</li>
<li><strong>Hosmer DW, Lemeshow S, Sturdivant RX.</strong> <em>Applied Logistic Regression.</em> 3rd ed. Wiley 2013.<br>
→ ロジスティック回帰専門書。完全分離・Firth 法も解説。</li>
<li><strong>Steyerberg EW.</strong> <em>Clinical Prediction Models.</em> 2nd ed. Springer 2019.<br>
→ 臨床予測モデルの定本。TRIPOD 準拠の実践ガイド。</li>
</ul>
</div>
</div>

<div class="ok-box">
<strong>黄金律：</strong>AI に聞く → R で実行 → 結果を AI に戻す → <strong class="emphasis">教科書・原論文で検証</strong> → 自分の言葉で再解釈 → 論文に書く。この <strong>5ステップ</strong>を省略しないこと。AI に「論文文章」を書かせて最終とするのは<strong>危険</strong>。
</div>

<div class="danger-box">
<strong>実話：</strong>2024年の研究では、AI生成の医学引用の <strong>47.4%</strong> が誤り（JMIR 2024; PMC11325115）。生成コードは <strong>31.7%</strong> が再現不能（arXiv:2512.22387, 2025）。<strong class="emphasis">AIを信じ切る研究者は、遠からず致命的な論文を出す</strong>。自分で検証するクセは、キャリアを守る盾である。
</div>
`},

/* ============ 5-10 臨床解釈 ============ */
{part:"Part 5", short:"臨床解釈は人間", html:`
<span class="slide-tag">INTERPRETATION</span>
<h2 class="slide-title">臨床的解釈は<strong>研究者の仕事</strong></h2>
<div class="grid grid-2">
<div class="panel" style="border-color:var(--purple)">
<div class="panel-title" style="color:var(--purple)">AIができること</div>
<ul class="bullet">
<li>コード生成・実行</li>
<li>OR / CI / p値の計算</li>
<li>グラフ作成（ggplot2, Chart.js等）</li>
<li>統計的有意性の判定</li>
<li>記述統計の要約</li>
<li>論文ドラフトの文章化</li>
</ul>
</div>
<div class="panel" style="border-color:var(--ok)">
<div class="panel-title" style="color:var(--ok)">AIができないこと</div>
<ul class="bullet">
<li>「OR=13.45 は臨床的に意味があるか？」</li>
<li>「CIが 1.06-1918 で実用的か？」</li>
<li>「新規患者に一般化できるか？」</li>
<li>「研究デザインは妥当か？」</li>
<li>「この結論を論文にすべきか？」</li>

<div class="cite">Masters K, Benjamin J, Agrawal A, et al. When and how to disclose AI use in academic publishing: AMEE Guide No.192. Med Teach 2026;48(4):542-553.</div>

/* ============ 7-1 Take-home 1-5 ============ */
{part:"Part 7", short:"Take-home 1-5", html:`
<span class="slide-tag">TAKE-HOME MESSAGES 1–5</span>
<h2 class="slide-title">統計手法編</h2>
<div class="grid grid-2">
<div class="panel">
<div class="panel-title" style="color:var(--accent2)">① 古い論文を鵜呑みにしない</div>
<p style="font-size:13px;line-height:1.6">
査読済みでも度数不整合や統計的問題が存在する。<strong>批判的吟味は研究者の基本スキル</strong>。
</p>
</div>
<div class="panel">
<div class="panel-title" style="color:var(--accent2)">② 変数選択は臨床知識で</div>
<p style="font-size:13px;line-height:1.6">
単変量スクリーニング（p&lt;0.20, OR≥2.0）は選択バイアス。事前知識に基づく選択が推奨（Harrell 2015 / Sun 1996）。
</p>
</div>
<div class="panel">
<div class="panel-title" style="color:var(--accent2)">③ 完全分離には Firth 回帰</div>
<p style="font-size:13px;line-height:1.6">
ゼロセル時のOR=999 は解釈不能。Firth (1993) 罰則付き最尤推定で有限な推定値を。<code>logistf</code> パッケージ。
</p>
</div>
<div class="panel">
<div class="panel-title" style="color:var(--accent2)">④ EPV を守る</div>
<p style="font-size:13px;line-height:1.6">
イベント数 ÷ 変数数 ≥ 10。N=44 / イベント20 なら最大2-3変数（van Smeden 2016 / Riley 2019）。
</p>
</div>
<div class="panel" style="grid-column:span 2">
<div class="panel-title" style="color:var(--accent2)">⑤ モデル検証を忘れない</div>
<p style="font-size:13px;line-height:1.6">
構築データ＝評価データは楽観的バイアス。<strong>Bootstrap 内部検証 + 外部検証</strong>が理想（TRIPOD+AI 2024）。統計ソフト・パッケージ・バージョンは必ず明記。
</p>
</div>
</div>
`},

/* ============ 7-2 Take-home 6-11 ============ */
{part:"Part 7", short:"Take-home 6-11", html:`
<span class="slide-tag">TAKE-HOME MESSAGES 6–11</span>
<h2 class="slide-title">AI編</h2>
<div class="grid grid-2">
<div class="panel">
<div class="panel-title" style="color:var(--purple)">⑥ ハルシネーションは統計的に不可避</div>
<p style="font-size:13px;line-height:1.6">
Kalai & Vempala (2024) の数学的証明。訓練データに1回しか出ない事実に関してLLMは必ず誤る。
</p>
</div>
<div class="panel">
<div class="panel-title" style="color:var(--purple)">⑦ ベンチマークが推測を報酬している</div>
<p style="font-size:13px;line-height:1.6">
二値採点（正答1/不正答0/IDK=0）はIDKを罰する。Kalai et al. (2025) Observation 1。
</p>
</div>
<div class="panel">
<div class="panel-title" style="color:var(--purple)">⑧ AIコードは必ず実行・検証</div>
<p style="font-size:13px;line-height:1.6">
Analyst-Inspector 方式で再現性を確認。関数・パッケージの実在を必ず確認。Zeng et al. (2025)。
</p>
</div>
<div class="panel">
<div class="panel-title" style="color:var(--purple)">⑨ AI使用は開示する</div>
<p style="font-size:13px;line-height:1.6">
統計コード生成は「実質的」使用。方法論セクションで記載必須。AMEE Guide No.192 / Resnik & Hosseini 2025。
</p>
</div>
<div class="panel">
<div class="panel-title" style="color:var(--purple)">⑩ 臨床解釈はAIではなく研究者</div>
<p style="font-size:13px;line-height:1.6">
AIは計算を補助。「この結果に臨床的意味があるか」を判断できるのは専門家だけ。
</p>
</div>
<div class="panel">
<div class="panel-title" style="color:var(--purple)">⑪ AIを"助手"として位置づける</div>
<p style="font-size:13px;line-height:1.6">
SPSS や R と同じ「道具」。検証・解釈・責任は常に自分が持つ。AI時代でも批判的思考は最重要スキル。
</p>
</div>
</div>
`},

]; /* /SLIDES */

/* ============================================================
   ナビゲーション
============================================================ */
let current = 0;
const slidesEl = document.getElementById('slides');
const tocEl = document.getElementById('toc');

// スライド要素を生成
SLIDES.forEach((s, i) => {
  const div = document.createElement('div');
  div.className = 'slide';
  div.dataset.idx = i;
  div.innerHTML = s.html;
  slidesEl.appendChild(div);
});

// 目次を生成
const parts = {};
SLIDES.forEach((s, i) => {
  if(!parts[s.part]) parts[s.part] = [];
  parts[s.part].push({idx:i, title:s.short});
});

for(const part in parts){
  const wrap = document.createElement('div');
  wrap.className = 'toc-part';
  if(part !== '表紙' && part !== 'Overview' && !part.startsWith('Part')){
    // default case
  }
  if(part !== '表紙'){
    const title = document.createElement('div');
    title.className = 'toc-title';
    title.textContent = part;
    wrap.appendChild(title);
  }
  parts[part].forEach(item => {
    // セクション見出しスライドは目次から除外（━━で始まるもの）
    if(item.title.startsWith('━━')) return;
    const btn = document.createElement('div');
    btn.className = 'toc-item';
    btn.dataset.idx = item.idx;
    btn.innerHTML = `<span class="toc-num">${String(item.idx+1).padStart(2,'0')}</span><span>${item.title}</span>`;
    btn.onclick = () => goTo(item.idx);
    wrap.appendChild(btn);
  });
  tocEl.appendChild(wrap);
}

function goTo(idx){
  if(idx < 0 || idx >= SLIDES.length) return;
  document.querySelectorAll('.slide').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.toc-item').forEach(t => t.classList.remove('active'));
  const slideEl = document.querySelector(`.slide[data-idx="${idx}"]`);
  slideEl.classList.add('active');
  slideEl.scrollTop = 0;
  const tocItem = document.querySelector(`.toc-item[data-idx="${idx}"]`);
  if(tocItem){
    tocItem.classList.add('active');
    tocItem.scrollIntoView({behavior:'smooth',block:'nearest'});
  }
  current = idx;
  document.getElementById('counter').textContent = `${idx+1} / ${SLIDES.length}`;
  document.getElementById('progress-bar').style.width = `${((idx+1)/SLIDES.length)*100}%`;
  document.getElementById('prev').disabled = idx === 0;
  document.getElementById('next').disabled = idx === SLIDES.length-1;
  // 初期化関数実行
  setTimeout(() => {
    if(SLIDES[idx].onShow) try { SLIDES[idx].onShow(); } catch(e){ console.warn(e); }
    if(window.MathJax && window.MathJax.typesetPromise) window.MathJax.typesetPromise([slideEl]);
  }, 50);
  // モバイル: メニュー閉じる
  document.getElementById('sidebar').classList.remove('open');
}

document.getElementById('prev').onclick = () => goTo(current - 1);
document.getElementById('next').onclick = () => goTo(current + 1);
document.getElementById('menu-toggle').onclick = () => {
  document.getElementById('sidebar').classList.toggle('open');
};

/* ============================================================
   フォントサイズ制御
============================================================ */
const FS_LEVELS = [0.85, 0.95, 1.0, 1.15, 1.3, 1.5, 1.75];
let fsIdx = parseInt(localStorage.getItem('fsIdx') ?? '3');
function applyFs(){
  fsIdx = Math.max(0, Math.min(FS_LEVELS.length-1, fsIdx));
  document.documentElement.style.setProperty('--fs-mul', FS_LEVELS[fsIdx]);
  localStorage.setItem('fsIdx', fsIdx);
  document.getElementById('fsReset').textContent = fsIdx===3 ? 'A' : 'A·' + Math.round(FS_LEVELS[fsIdx]*100)+'%';
}
document.getElementById('fsMinus').onclick = () => { fsIdx--; applyFs(); };
document.getElementById('fsPlus').onclick = () => { fsIdx++; applyFs(); };
document.getElementById('fsReset').onclick = () => { fsIdx = 3; applyFs(); };
applyFs();
document.addEventListener('keydown', e => {
  if(e.target.tagName === 'INPUT') return;
  if(e.key === 'ArrowRight' || e.key === 'PageDown' || e.key === ' ') { e.preventDefault(); goTo(current+1); }
  else if(e.key === 'ArrowLeft' || e.key === 'PageUp') { e.preventDefault(); goTo(current-1); }
  else if(e.key === 'Home') goTo(0);
  else if(e.key === 'End') goTo(SLIDES.length-1);
  else if(e.key === 'f' || e.key === 'F'){
    if(!document.fullscreenElement) document.documentElement.requestFullscreen();
    else document.exitFullscreen();
  }
});

// 初期表示
goTo(0);
</script>
